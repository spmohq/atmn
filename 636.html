<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PinPro Studio | Dynamic Text Wrapping</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Galada&family=Hind+Siliguri:wght@400;700&family=Montserrat:wght@400;700;900&family=Noto+Serif+Bengali:wght@400;700&family=Playfair+Display:wght@700;900&family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #E60023;
            --bg-app: #0f0f0f;
            --bg-card: #1a1a1a;
            --text-main: #d1d1d1;
            --border: #333;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Poppins', 'Hind Siliguri', sans-serif; }
        body { background-color: var(--bg-app); color: var(--text-main); height: 100vh; overflow: hidden; display: flex; flex-direction: column; }

        header {
            background: #000;
            padding: 8px 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
            height: 50px;
        }

        .logo { font-weight: 700; color: var(--primary); font-size: 1rem; }

        main { display: grid; grid-template-columns: 290px 1fr 290px; height: calc(100vh - 50px); overflow: hidden; }

        .sidebar { background: var(--bg-card); overflow-y: auto; padding: 12px; border-right: 1px solid var(--border); display: flex; flex-direction: column; gap: 10px; }
        .sidebar-right { border-right: none; border-left: 1px solid var(--border); }

        .section-title {
            font-size: 0.65rem; font-weight: 800; text-transform: uppercase; color: var(--primary);
            border-bottom: 1px solid #333; padding-bottom: 4px; margin-bottom: 5px;
            display: flex; justify-content: space-between; align-items: center;
        }

        .control-group { background: #222; border: 1px solid #333; padding: 10px; border-radius: 6px; margin-bottom: 5px; }
        label { font-size: 0.55rem; color: #777; text-transform: uppercase; margin-bottom: 3px; display: block; }
        
        input[type="text"], select {
            width: 100%; padding: 6px; border: 1px solid #444; background: #111; color: #fff;
            border-radius: 4px; font-size: 0.75rem; margin-bottom: 6px;
        }

        .slider-box { display: flex; flex-direction: column; margin-bottom: 5px; }
        .slider-box span { font-size: 0.55rem; color: #666; display: flex; justify-content: space-between; }

        input[type="range"] { accent-color: var(--primary); height: 3px; cursor: pointer; width: 100%; margin: 4px 0;}

        .canvas-container { display: flex; align-items: center; justify-content: center; padding: 15px; background: #0a0a0a; overflow: hidden; position: relative; }
        #pin-canvas { max-width: 100%; max-height: 100%; object-fit: contain; background: #fff; box-shadow: 0 0 30px rgba(0,0,0,0.5); cursor: crosshair; }

        .ratio-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; margin-bottom: 10px; }
        .ratio-btn { background: #333; border: 1px solid #444; color: #888; padding: 8px; font-size: 0.7rem; cursor: pointer; border-radius: 4px; text-align: center; }
        .ratio-btn.active { border-color: var(--primary); color: #fff; background: #222; font-weight: bold; }

        .btn { padding: 6px 10px; border-radius: 4px; font-weight: 600; cursor: pointer; border: none; font-size: 0.7rem; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-outline { background: transparent; border: 1px solid #555; color: #ccc; }
        .btn-danger { background: #442222; color: #ff8888; font-size: 0.55rem; padding: 2px 5px; }

        .para-item { border-left: 2px solid var(--primary); padding-left: 8px; margin-bottom: 8px; background: rgba(0,0,0,0.2); padding: 6px; }
        .align-btns { display: grid; grid-template-columns: repeat(3, 1fr); gap: 4px; margin-top: 5px; }
        .align-btn { background: #333; border: 1px solid #444; color: #fff; font-size: 0.6rem; padding: 3px; cursor: pointer; border-radius: 3px; }
        .align-btn.active { background: var(--primary); border-color: var(--primary); }

        .color-dot { width: 100%; height: 20px; border-radius: 3px; cursor: pointer; border: 1px solid rgba(255,255,255,0.1); }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #444; border-radius: 10px; }
    </style>
</head>
<body>

    <header>
        <div class="logo">PINPRO STUDIO <span id="ratio-indicator" style="opacity: 0.5; font-size: 0.7rem; margin-left: 10px;">4:5 DESIGNER</span></div>
        <div>
            <button class="btn btn-outline" onclick="document.getElementById('file-input').click()">Upload BG</button>
            <button class="btn btn-primary" onclick="exportPin()">Download Design</button>
        </div>
    </header>

    <main>
        <!-- Left Sidebar -->
        <aside class="sidebar">
            <div class="section-title">Canvas Ratio</div>
            <div class="ratio-grid">
                <div id="ratio-45" class="ratio-btn active" onclick="setRatio('4:5')">4:5</div>
                <div id="ratio-34" class="ratio-btn" onclick="setRatio('3:4')">3:4</div>
                <div id="ratio-11" class="ratio-btn" onclick="setRatio('1:1')">1:1</div>
            </div>

            <div class="section-title">Headline</div>
            <div class="control-group">
                <input type="text" value="সাফল্যের মূলমন্ত্র" oninput="updateState('headline', this.value)">
                <div class="slider-box"><span>Font Size</span><input type="range" min="30" max="250" value="100" oninput="updateState('headlineSize', parseInt(this.value))"></div>
                <div class="slider-box"><span>Box Width</span><input type="range" min="100" max="1000" value="900" oninput="updateState('headlineW', parseInt(this.value))"></div>
            </div>

            <div class="section-title">Paragraphs <button class="btn-primary" style="font-size: 0.5rem; padding: 1px 5px;" onclick="addParagraph()">+ ADD</button></div>
            <div id="paragraphs-container"></div>

            <div class="section-title">Website Branding</div>
            <div class="control-group">
                <input type="text" value="WWW.YOURWEBSITE.COM" oninput="updateState('brand', this.value)">
                <div class="slider-box"><span>Font Size</span><input type="range" min="10" max="60" value="25" oninput="updateState('brandSize', parseInt(this.value))"></div>
                <div class="slider-box"><span>Box Width</span><input type="range" min="100" max="1000" value="800" oninput="updateState('brandW', parseInt(this.value))"></div>
            </div>
        </aside>

        <!-- Preview Area -->
        <div class="canvas-container">
            <canvas id="pin-canvas" width="1000" height="1250"></canvas>
            <input type="file" id="file-input" hidden accept="image/*" onchange="handleImageUpload(event)">
        </div>

        <!-- Right Sidebar -->
        <aside class="sidebar sidebar-right">
            <div class="section-title">Logo Branding</div>
            <div class="control-group">
                <button class="btn btn-outline" style="width:100%; margin-bottom:8px;" onclick="document.getElementById('logo-input').click()">Upload Logo</button>
                <input type="file" id="logo-input" hidden accept="image/*" onchange="handleLogoUpload(event)">
                <div class="slider-box"><span>Logo Size</span><input type="range" min="20" max="500" value="100" oninput="updateState('logoW', parseInt(this.value))"></div>
            </div>

            <div class="section-title">Header (Top Fixed)</div>
            <div class="control-group">
                <label><input type="checkbox" checked onchange="toggleBanner('header', this.checked)"> Active</label>
                <div class="slider-box"><span>Height</span><input type="range" min="0" max="600" value="120" oninput="updateBanner('header', 'h', parseInt(this.value))"></div>
                <div class="slider-box"><span>Opacity</span><input type="range" min="0" max="100" value="100" oninput="updateBanner('header', 'opacity', this.value/100)"></div>
            </div>

            <div class="section-title">Middle (Flexible)</div>
            <div class="control-group">
                <label><input type="checkbox" checked onchange="toggleBanner('middle', this.checked)"> Active</label>
                <div class="slider-box"><span>W / H</span>
                    <input type="range" min="50" max="1000" value="900" oninput="updateBanner('middle', 'w', parseInt(this.value))">
                    <input type="range" min="10" max="800" value="350" oninput="updateBanner('middle', 'h', parseInt(this.value))">
                </div>
                <div class="slider-box"><span>Opacity</span><input type="range" min="0" max="100" value="100" oninput="updateBanner('middle', 'opacity', this.value/100)"></div>
            </div>

            <div class="section-title">Footer (Bot Fixed)</div>
            <div class="control-group">
                <label><input type="checkbox" checked onchange="toggleBanner('footer', this.checked)"> Active</label>
                <div class="slider-box"><span>Height</span><input type="range" min="0" max="600" value="100" oninput="updateBanner('footer', 'h', parseInt(this.value))"></div>
                <div class="slider-box"><span>Opacity</span><input type="range" min="0" max="100" value="100" oninput="updateBanner('footer', 'opacity', this.value/100)"></div>
            </div>

            <div class="section-title">Global Settings</div>
            <div class="control-group">
                <select onchange="updateState('fontFamily', this.value)">
                    <option value="Hind Siliguri">Hind Siliguri</option>
                    <option value="Galada">Galada</option>
                    <option value="Noto Serif Bengali">Noto Serif</option>
                    <option value="Poppins">Poppins</option>
                </select>
                <div id="color-palette" style="display:grid; grid-template-columns: repeat(5, 1fr); gap: 4px; margin-top:5px;"></div>
                <div class="slider-box" style="margin-top:10px;">
                    <span>BG Photo Dim</span>
                    <input type="range" min="0" max="100" value="40" oninput="updateState('overlayOpacity', this.value/100)">
                </div>
                <label>Text Color</label>
                <input type="color" value="#ffffff" oninput="updateState('textColor', this.value)" style="width:100%; height:25px; border:none; background:none; cursor:pointer;">
            </div>
        </aside>
    </main>

    <script>
        let state = {
            ratio: '4:5',
            headline: "সাফল্যের মূলমন্ত্র", headlineX: 500, headlineY: 450, headlineSize: 100, headlineW: 900,
            brand: "WWW.YOURWEBSITE.COM", brandX: 500, brandY: 1180, brandSize: 25, brandW: 800,
            paragraphs: [{ id: Date.now(), text: "আপনার লক্ষ্যকে স্থির রাখুন এবং নিয়মিত কাজ করুন।", x: 500, y: 650, size: 35, align: 'center', w: 850 }],
            banners: {
                header: { active: true, h: 120, opacity: 1.0 },
                middle: { active: true, x: 500, y: 625, w: 900, h: 350, opacity: 1.0 },
                footer: { active: true, h: 100, opacity: 1.0 }
            },
            accentColor: '#E60023', textColor: '#ffffff', overlayOpacity: 0.4,
            fontFamily: 'Hind Siliguri', bgImage: null,
            logoImage: null, logoX: 500, logoY: 150, logoW: 100
        };

        const canvas = document.getElementById('pin-canvas');
        const ctx = canvas.getContext('2d');
        let dragTarget = null, startX, startY, hitZones = [], showVGuide = false, showHGuide = false;

        const COLORS = ['#E60023', '#000000', '#2D3436', '#0984E3', '#00B894', '#6C5CE7', '#FDCB6E', '#FF7675', '#ffffff', '#111111'];

        window.onload = () => { initUI(); initDragEvents(); render(); };

        function initUI() {
            const palette = document.getElementById('color-palette');
            COLORS.forEach(c => {
                const d = document.createElement('div');
                d.className = 'color-dot'; d.style.backgroundColor = c;
                d.onclick = () => updateState('accentColor', c);
                palette.appendChild(d);
            });
            renderParagraphControls();
        }

        function setRatio(r) {
            const prevH = canvas.height;
            state.ratio = r;
            if (r === '4:5') canvas.height = 1250;
            else if (r === '3:4') canvas.height = 1333;
            else if (r === '1:1') canvas.height = 1000;

            const hDiff = canvas.height - prevH;
            state.brandY += hDiff;
            if (state.brandY > canvas.height) state.brandY = canvas.height - 50;

            document.getElementById('ratio-45').classList.toggle('active', r === '4:5');
            document.getElementById('ratio-34').classList.toggle('active', r === '3:4');
            document.getElementById('ratio-11').classList.toggle('active', r === '1:1');
            
            document.getElementById('ratio-indicator').innerText = r + ' DESIGNER';
            render();
        }

        function updateState(key, val) { state[key] = val; render(); }
        function toggleBanner(type, val) { state.banners[type].active = val; render(); }
        function updateBanner(type, prop, val) { state.banners[type][prop] = val; render(); }

        function addParagraph() {
            state.paragraphs.push({ id: Date.now(), text: "নতুন লাইন...", x: 500, y: 800, size: 30, align: 'center', w: 800 });
            renderParagraphControls(); render();
        }

        function removeParagraph(id) {
            state.paragraphs = state.paragraphs.filter(p => p.id !== id);
            renderParagraphControls(); render();
        }

        function updatePara(id, key, val) {
            const p = state.paragraphs.find(p => p.id === id);
            if(p) p[key] = val; render();
        }

        function renderParagraphControls() {
            const container = document.getElementById('paragraphs-container');
            container.innerHTML = '';
            state.paragraphs.forEach(p => {
                const div = document.createElement('div');
                div.className = 'para-item';
                div.innerHTML = `
                    <div style="display:flex;gap:5px;margin-bottom:5px">
                        <input type="text" value="${p.text}" oninput="updatePara(${p.id}, 'text', this.value)" style="margin:0">
                        <button class="btn-danger" onclick="removeParagraph(${p.id})">✕</button>
                    </div>
                    <div class="slider-box"><span>Size</span><input type="range" min="10" max="100" value="${p.size}" oninput="updatePara(${p.id}, 'size', parseInt(this.value))"></div>
                    <div class="slider-box"><span>Box Width</span><input type="range" min="100" max="1000" value="${p.w}" oninput="updatePara(${p.id}, 'w', parseInt(this.value))"></div>
                    <div class="align-btns">
                        <button class="align-btn ${p.align==='left'?'active':''}" onclick="updatePara(${p.id}, 'align', 'left')">L</button>
                        <button class="align-btn ${p.align==='center'?'active':''}" onclick="updatePara(${p.id}, 'align', 'center')">C</button>
                        <button class="align-btn ${p.align==='right'?'active':''}" onclick="updatePara(${p.id}, 'align', 'right')">R</button>
                    </div>
                `;
                container.appendChild(div);
            });
        }

        function render() {
            const w = canvas.width, h = canvas.height;
            ctx.clearRect(0, 0, w, h);
            hitZones = [];

            if (state.bgImage) drawImageCover(state.bgImage, 0, 0, w, h);
            else { ctx.fillStyle = '#1a1a1a'; ctx.fillRect(0,0,w,h); }

            ctx.fillStyle = `rgba(0,0,0,${state.overlayOpacity})`;
            ctx.fillRect(0, 0, w, h);

            // Banners
            if (state.banners.header.active) {
                ctx.save(); ctx.globalAlpha = state.banners.header.opacity;
                ctx.fillStyle = state.accentColor;
                ctx.fillRect(0, 0, 1000, state.banners.header.h);
                ctx.restore();
            }
            if (state.banners.footer.active) {
                ctx.save(); ctx.globalAlpha = state.banners.footer.opacity;
                ctx.fillStyle = state.accentColor;
                ctx.fillRect(0, h - state.banners.footer.h, 1000, state.banners.footer.h);
                ctx.restore();
            }
            if (state.banners.middle.active) {
                const b = state.banners.middle;
                ctx.save(); ctx.globalAlpha = b.opacity; ctx.fillStyle = state.accentColor;
                const bx = b.x - b.w / 2, by = b.y - b.h / 2;
                ctx.fillRect(bx, by, b.w, b.h);
                hitZones.push({ id: `banner-middle`, x: bx, y: by, w: b.w, h: b.h });
                ctx.restore();
            }

            // Logo
            if (state.logoImage) {
                const aspect = state.logoImage.height / state.logoImage.width;
                const logoH = state.logoW * aspect;
                const lx = state.logoX - state.logoW / 2;
                const ly = state.logoY - logoH / 2;
                ctx.drawImage(state.logoImage, lx, ly, state.logoW, logoH);
                hitZones.push({ id: 'logo', x: lx, y: ly, w: state.logoW, h: logoH });
            }

            // Guides
            if (showVGuide) { ctx.setLineDash([10, 10]); ctx.strokeStyle = 'rgba(255,255,255,0.5)'; ctx.beginPath(); ctx.moveTo(w/2, 0); ctx.lineTo(w/2, h); ctx.stroke(); }
            if (showHGuide) { ctx.setLineDash([10, 10]); ctx.strokeStyle = 'rgba(255,255,255,0.5)'; ctx.beginPath(); ctx.moveTo(0, h/2); ctx.lineTo(w, h/2); ctx.stroke(); }
            ctx.setLineDash([]);

            ctx.textBaseline = 'middle'; ctx.fillStyle = state.textColor;

            // Headline
            ctx.textAlign = 'center'; ctx.font = `900 ${state.headlineSize}px '${state.fontFamily}'`;
            hitZones.push({ id: 'headline', ...wrapText(ctx, state.headline, state.headlineX, state.headlineY, state.headlineW, state.headlineSize*1.2, 'center') });

            // Paragraphs
            state.paragraphs.forEach(p => {
                ctx.textAlign = p.align; ctx.font = `400 ${p.size}px '${state.fontFamily}'`;
                hitZones.push({ id: `para-${p.id}`, ...wrapText(ctx, p.text, p.x, p.y, p.w, p.size*1.4, p.align) });
            });

            // Brand
            ctx.textAlign = 'center'; ctx.font = `700 ${state.brandSize}px '${state.fontFamily}'`;
            hitZones.push({ id: 'brand', ...wrapText(ctx, state.brand, state.brandX, state.brandY, state.brandW, state.brandSize*1.2, 'center') });
        }

        function wrapText(ctx, text, x, y, maxWidth, lineHeight, align) {
            const words = text.split(' '), lines = []; let line = '';
            for (let n = 0; n < words.length; n++) {
                let testLine = line + words[n] + ' ';
                if (ctx.measureText(testLine).width > maxWidth && n > 0) { lines.push(line); line = words[n] + ' '; }
                else line = testLine;
            }
            lines.push(line);
            let startY = y - ((lines.length - 1) * lineHeight) / 2;
            const initialY = startY;
            lines.forEach(l => {
                let drawX = x;
                if(align === 'left') drawX = x - maxWidth/2;
                if(align === 'right') drawX = x + maxWidth/2;
                ctx.fillText(l, drawX, startY);
                startY += lineHeight;
            });
            return { x: x - maxWidth/2, y: initialY - lineHeight/2, w: maxWidth, h: lines.length * lineHeight };
        }

        function initDragEvents() {
            canvas.onmousedown = (e) => {
                const pos = getMousePos(e);
                for (let i = hitZones.length - 1; i >= 0; i--) {
                    const zone = hitZones[i];
                    if (pos.x >= zone.x && pos.x <= zone.x + zone.w && pos.y >= zone.y && pos.y <= zone.y + zone.h) {
                        dragTarget = zone;
                        if (zone.id === 'banner-middle') {
                            startX = pos.x - state.banners.middle.x; startY = pos.y - state.banners.middle.y;
                        } else if (zone.id.startsWith('para-')) {
                            const p = state.paragraphs.find(para => `para-${para.id}` === zone.id);
                            startX = pos.x - p.x; startY = pos.y - p.y;
                        } else if (zone.id === 'logo') {
                            startX = pos.x - state.logoX; startY = pos.y - state.logoY;
                        } else {
                            startX = pos.x - state[zone.id + 'X']; startY = pos.y - state[zone.id + 'Y'];
                        }
                        return;
                    }
                }
            };
            window.onmousemove = (e) => {
                if (!dragTarget) return;
                const pos = getMousePos(e);
                let newX = Math.round(pos.x - startX), newY = Math.round(pos.y - startY);
                showVGuide = Math.abs(newX - 500) < 15; if(showVGuide) newX = 500;
                showHGuide = Math.abs(newY - (canvas.height/2)) < 15; if(showHGuide) newY = canvas.height/2;

                if (dragTarget.id === 'banner-middle') {
                    state.banners.middle.x = newX; state.banners.middle.y = newY;
                } else if (dragTarget.id.startsWith('para-')) {
                    const p = state.paragraphs.find(para => `para-${para.id}` === dragTarget.id);
                    p.x = newX; p.y = newY;
                } else if (dragTarget.id === 'logo') {
                    state.logoX = newX; state.logoY = newY;
                } else {
                    state[dragTarget.id + 'X'] = newX; state[dragTarget.id + 'Y'] = newY;
                }
                render();
            };
            window.onmouseup = () => { dragTarget = null; showVGuide = false; showHGuide = false; render(); };
        }

        function getMousePos(e) {
            const rect = canvas.getBoundingClientRect();
            return { x: (e.clientX - rect.left) * (canvas.width / rect.width), y: (e.clientY - rect.top) * (canvas.height / rect.height) };
        }

        function drawImageCover(img, x, y, w, h) {
            const r = img.width/img.height, cr = w/h;
            let sx, sy, sw, sh;
            if (r > cr) { sh = img.height; sw = sh * cr; sx = (img.width - sw)/2; sy = 0; }
            else { sw = img.width; sh = sw/cr; sx = 0; sy = (img.height - sh)/2; }
            ctx.drawImage(img, sx, sy, sw, sh, x, y, w, h);
        }

        function handleImageUpload(e) {
            const file = e.target.files[0]; if(!file) return;
            const reader = new FileReader();
            reader.onload = (ev) => {
                const img = new Image();
                img.onload = () => { state.bgImage = img; render(); };
                img.src = ev.target.result;
            };
            reader.readAsDataURL(file);
        }

        function handleLogoUpload(e) {
            const file = e.target.files[0]; if(!file) return;
            const reader = new FileReader();
            reader.onload = (ev) => {
                const img = new Image();
                img.onload = () => { state.logoImage = img; render(); };
                img.src = ev.target.result;
            };
            reader.readAsDataURL(file);
        }

        function exportPin() {
            const link = document.createElement('a');
            link.download = `pinpro-design-${Date.now()}.png`;
            link.href = canvas.toDataURL('image/png', 1.0);
            link.click();
        }
    </script>
</body>
</html>
