<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Social Media Copywriter | Prompt Genie</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Source+Code+Pro:wght@400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-gradient-start: #020617;
      --bg-gradient-end: #0f172a;
      --card-bg: rgba(30, 41, 59, 0.4);
      --card-border: rgba(255, 255, 255, 0.08);
      --text-primary: #f8fafc;
      --text-secondary: #94a3b8;
      --accent-primary: #22d3ee;
      --accent-hover: #67e8f9;
      --accent-success: #10b981;
      --code-bg: rgba(0, 0, 0, 0.3);
      --shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.5);
      --input-bg: rgba(15, 23, 42, 0.6);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background: fixed linear-gradient(135deg, var(--bg-gradient-start), var(--bg-gradient-end));
      color: var(--text-primary);
      line-height: 1.6;
      padding: 60px 20px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .container {
      max-width: 900px;
      width: 100%;
      margin: 0 auto;
    }

    header {
      text-align: center;
      margin-bottom: 50px;
    }

    h1 {
      font-size: 2.2rem;
      font-weight: 800;
      letter-spacing: -0.02em;
      color: #fff;
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    .sub-header {
      color: var(--accent-primary);
      font-size: 1.1rem;
      font-weight: 600;
      opacity: 0.8;
      letter-spacing: 0.05em;
    }

    .workflow {
      display: flex;
      flex-direction: column;
      gap: 30px;
    }

    .step-card {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 24px;
      padding: 40px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(12px);
    }

    .label-group {
      margin-bottom: 20px;
    }

    .step-label {
      font-weight: 800;
      font-size: 0.75rem;
      background: var(--accent-primary);
      color: #020617;
      padding: 4px 12px;
      border-radius: 4px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      display: inline-block;
      margin-bottom: 10px;
    }

    textarea {
      width: 100%;
      min-height: 120px;
      background: var(--input-bg);
      border: 1px solid var(--card-border);
      border-radius: 12px;
      padding: 20px;
      color: var(--text-primary);
      font-family: 'Inter', sans-serif;
      font-size: 1rem;
      resize: vertical;
      outline: none;
      transition: all 0.3s;
    }

    textarea:focus {
      border-color: var(--accent-primary);
      background: rgba(15, 23, 42, 0.8);
    }

    .prompt-output-card {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 24px;
      padding: 40px;
      margin-top: 10px;
    }

    .prompt-content {
      background: var(--code-bg);
      padding: 30px;
      border-radius: 12px;
      font-family: 'Source Code Pro', monospace;
      font-size: 0.9rem;
      color: #cbd5e1;
      white-space: pre-wrap;
      border: 1px solid rgba(255,255,255,0.05);
      margin-bottom: 25px;
      line-height: 1.6;
      max-height: 600px;
      overflow-y: auto;
    }

    /* Custom scrollbar */
    .prompt-content::-webkit-scrollbar {
      width: 8px;
    }
    .prompt-content::-webkit-scrollbar-track {
      background: rgba(255, 255, 255, 0.02);
    }
    .prompt-content::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.1);
      border-radius: 4px;
    }

    .copy-btn {
      background: rgba(34, 211, 238, 0.1);
      color: var(--accent-primary);
      border: 1px solid var(--accent-primary);
      padding: 14px 32px;
      border-radius: 12px;
      font-weight: 700;
      font-size: 1.1rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      transition: all 0.2s;
      width: 100%;
    }

    .copy-btn:hover {
      background: var(--accent-primary);
      color: #020617;
    }

    .copy-btn.copied {
      background: var(--accent-success);
      border-color: var(--accent-success);
      color: white;
    }

    .footer {
      margin-top: 80px;
      text-align: center;
      color: var(--text-secondary);
      font-size: 0.85rem;
      border-top: 1px solid var(--card-border);
      padding-top: 40px;
      width: 100%;
    }

    @media (max-width: 600px) {
      h1 { font-size: 1.6rem; }
      .step-card, .prompt-output-card { padding: 25px; }
      .prompt-content { font-size: 0.8rem; }
    }
  </style>
</head>
<body>

  <div class="container">
    <header>
      <h1>SOCIAL MEDIA COPYWRITER</h1>
      <p class="sub-header">Standalone Follow-up Prompt Template</p>
    </header>

    <div class="workflow">
      
      <!-- Input Section -->
      <div class="step-card">
        <div class="label-group">
          <span class="step-label">Blueprint Input</span>
        </div>
        <textarea id="blueprintInput" placeholder="Paste your Post Blueprint here..." oninput="updatePrompt()"></textarea>
      </div>

      <!-- Output Section -->
      <div class="prompt-output-card">
        <div class="label-group">
          <span class="step-label">Generated System Prompt</span>
        </div>
        <div class="prompt-content" id="finalPrompt"></div>
        <button class="copy-btn" onclick="copyText('finalPrompt', this)">
          <span>Copy Copywriting Prompt</span>
        </button>
      </div>

    </div>

    <footer class="footer">
      <p>Copyright &copy; <script>document.write(new Date().getFullYear())</script> Siva Prasad Mukherjee. All Rights Reserved.</p>
    </footer>
  </div>

  <script>
    const baseTemplate = `This prompt is designed to be used immediately after the "Social Media Post Architect."

The previous response already contains the complete strategy and outline.

Use that as the only source of truth.

Do NOT redesign the outline.

Do NOT change the core strategy.

Do NOT invent a different belief shift.

Your job is to transform the outline into a polished, engaging social media post.

--------------------------------------------------
INPUT
--------------------------------------------------

Post Blueprint

[Post Blueprint]

--------------------------------------------------
ROLE
--------------------------------------------------

You are a world-class Copywriter, Storytelling Expert, Consumer Psychologist, Social Media Strategist, Content Marketing Expert, and Educational Communicator.

You write posts that:

• capture attention quickly

• keep readers engaged

• change beliefs

• build trust

• create curiosity

• encourage meaningful discussion

• naturally lead readers toward wanting to learn more

without sounding salesy.

--------------------------------------------------
BENGALI LOCALIZATION LAYER
--------------------------------------------------

Please write the output of the PROMPT below in the most spontaneous, natural-sounding modern conversational Bengali as spoken in Kolkata, West Bengal, India.

The writing should be easy for a 21-year-old to understand while maintaining high editorial quality, clarity, precision, and natural readability.

Strict Rules

- Reflect Kolkata conversational cadence through sentence rhythm and phrasing by using slightly formal, polite, and smoothly flowing sentence structures with balanced pacing. Avoid slang, regional grammar, overly literary wording, or awkward literal translations.
- Always use the formal "আপনি", never "তুমি".
- The tone should remain warm, conversational, approachable, confident, and quietly authoritative.
- Write as if speaking directly to one person in a natural face-to-face conversation.
- Do not translate literally. Rewrite naturally so the output feels as though it was originally written in Bengali.
- Preserve the original meaning, intent, emotional tone, and persuasive effect without adding, removing, or changing information.

--------------------------------------------------
YOUR TASK
--------------------------------------------------

Transform the blueprint into ONE complete social media post.

Stay faithful to the blueprint.

Do not redesign it.

Do not reveal proprietary knowledge.

Do not teach the implementation.

--------------------------------------------------
WRITING OBJECTIVES
--------------------------------------------------

The post should

• challenge an existing belief

• replace it with a better belief

• make readers think

• provide genuine value

• create an "Aha!" moment

• naturally increase curiosity

• encourage engagement

--------------------------------------------------
WRITING STYLE
--------------------------------------------------

Write naturally.

Write conversationally.

Avoid corporate language.

Avoid sounding like a lecture.

Avoid hype.

Avoid clickbait.

Avoid exaggeration.

Avoid manipulation.

Avoid unnecessary emojis.

Use short paragraphs.

Maintain excellent reading flow.

Every sentence should naturally lead to the next.

--------------------------------------------------
POST STRUCTURE
--------------------------------------------------

Create

1.
Primary Hook

2.
Opening

3.
Problem

4.
Belief Challenge

5.
New Perspective

6.
Supporting Example or Story

7.
Reflection

8.
Key Takeaway

9.
Natural Transition

10.
Call to Action

--------------------------------------------------
HOOK
--------------------------------------------------

Generate

10 alternative hooks.

Each should use a different style.

Examples

Question

Contrarian

Observation

Story

Pattern Interrupt

Myth

Unexpected Fact

Emotional

Curiosity

Bold Statement

--------------------------------------------------
CTA
--------------------------------------------------

Generate

10 CTA options.

Examples

Comment

Share

Save

Reflect

Ask a Question

Continue the Conversation

Visit the Private Platform

Join the Community

Learn More

Soft Invitation

The CTAs should feel natural.

--------------------------------------------------
OUTPUT FORMAT
--------------------------------------------------

Provide

Version A

The primary post.

--------------------------------------------------

Alternative Hooks

10 options

--------------------------------------------------

Alternative CTAs

10 options

--------------------------------------------------

Self Review

Evaluate the post on

Clarity

Belief Shift

Curiosity

Trust

Readability

Authenticity

Engagement Potential

Emotional Impact

Give each a score out of 10.

Then suggest 3 improvements.

--------------------------------------------------
RULES
--------------------------------------------------

Do NOT teach the proprietary technique.

Do NOT reveal implementation.

Do NOT expose premium knowledge.

Do NOT rewrite the strategy.

Do NOT redesign the outline.

Focus on changing beliefs, not teaching skills.

The reader should finish the post thinking:

"I've never looked at it that way before."

and

"I want to learn more."

without feeling pressured or sold to.`;

    function updatePrompt() {
      const blueprintValue = document.getElementById('blueprintInput').value.trim() || "[Post Blueprint]";
      
      // Replace the placeholder with input value
      let updated = baseTemplate.replace("[Post Blueprint]", blueprintValue);

      document.getElementById('finalPrompt').innerText = updated;
    }

    function copyText(id, btn) {
      const text = document.getElementById(id).innerText;
      navigator.clipboard.writeText(text).then(() => {
        const originalText = btn.innerHTML;
        btn.innerHTML = `<span>Copied to Clipboard!</span>`;
        btn.classList.add('copied');
        
        setTimeout(() => {
          btn.innerHTML = originalText;
          btn.classList.remove('copied');
        }, 2000);
      });
    }

    // Initialize display on page load
    updatePrompt();
  </script>
</body>
</html>
