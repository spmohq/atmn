<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Social Media Post Auditor | Prompt Genie</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Source+Code+Pro:wght@400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-gradient-start: #020617;
      --bg-gradient-end: #0f172a;
      --card-bg: rgba(30, 41, 59, 0.4);
      --card-border: rgba(255, 255, 255, 0.08);
      --text-primary: #f8fafc;
      --text-secondary: #94a3b8;
      --accent-primary: #22d3ee;
      --accent-hover: #67e8f9;
      --accent-success: #10b981;
      --code-bg: rgba(0, 0, 0, 0.3);
      --shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.5);
      --input-bg: rgba(15, 23, 42, 0.6);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background: fixed linear-gradient(135deg, var(--bg-gradient-start), var(--bg-gradient-end));
      color: var(--text-primary);
      line-height: 1.6;
      padding: 60px 20px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .container {
      max-width: 900px;
      width: 100%;
      margin: 0 auto;
    }

    header {
      text-align: center;
      margin-bottom: 50px;
    }

    h1 {
      font-size: 2.2rem;
      font-weight: 800;
      letter-spacing: -0.02em;
      color: #fff;
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    .sub-header {
      color: var(--accent-primary);
      font-size: 1.1rem;
      font-weight: 600;
      opacity: 0.8;
      letter-spacing: 0.05em;
    }

    .workflow {
      display: flex;
      flex-direction: column;
      gap: 30px;
    }

    .step-card {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 24px;
      padding: 40px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(12px);
    }

    .label-group {
      margin-bottom: 20px;
    }

    .step-label {
      font-weight: 800;
      font-size: 0.75rem;
      background: var(--accent-primary);
      color: #020617;
      padding: 4px 12px;
      border-radius: 4px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      display: inline-block;
      margin-bottom: 10px;
    }

    textarea {
      width: 100%;
      min-height: 150px;
      background: var(--input-bg);
      border: 1px solid var(--card-border);
      border-radius: 12px;
      padding: 20px;
      color: var(--text-primary);
      font-family: 'Inter', sans-serif;
      font-size: 1rem;
      resize: vertical;
      outline: none;
      transition: all 0.3s;
    }

    textarea:focus {
      border-color: var(--accent-primary);
      background: rgba(15, 23, 42, 0.8);
    }

    .prompt-output-card {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 24px;
      padding: 40px;
      margin-top: 10px;
    }

    .prompt-content {
      background: var(--code-bg);
      padding: 30px;
      border-radius: 12px;
      font-family: 'Source Code Pro', monospace;
      font-size: 0.9rem;
      color: #cbd5e1;
      white-space: pre-wrap;
      border: 1px solid rgba(255,255,255,0.05);
      margin-bottom: 25px;
      line-height: 1.6;
      max-height: 600px;
      overflow-y: auto;
    }

    /* Custom scrollbar */
    .prompt-content::-webkit-scrollbar {
      width: 8px;
    }
    .prompt-content::-webkit-scrollbar-track {
      background: rgba(255, 255, 255, 0.02);
    }
    .prompt-content::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.1);
      border-radius: 4px;
    }

    .copy-btn {
      background: rgba(34, 211, 238, 0.1);
      color: var(--accent-primary);
      border: 1px solid var(--accent-primary);
      padding: 14px 32px;
      border-radius: 12px;
      font-weight: 700;
      font-size: 1.1rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      transition: all 0.2s;
      width: 100%;
    }

    .copy-btn:hover {
      background: var(--accent-primary);
      color: #020617;
    }

    .copy-btn.copied {
      background: var(--accent-success);
      border-color: var(--accent-success);
      color: white;
    }

    .footer {
      margin-top: 80px;
      text-align: center;
      color: var(--text-secondary);
      font-size: 0.85rem;
      border-top: 1px solid var(--card-border);
      padding-top: 40px;
      width: 100%;
    }

    @media (max-width: 600px) {
      h1 { font-size: 1.6rem; }
      .step-card, .prompt-output-card { padding: 25px; }
      .prompt-content { font-size: 0.8rem; }
    }
  </style>
</head>
<body>

  <div class="container">
    <header>
      <h1>SOCIAL MEDIA POST AUDITOR</h1>
      <p class="sub-header">Standalone Reusable Follow-up Prompt Template</p>
    </header>

    <div class="workflow">
      
      <!-- Input Section -->
      <div class="step-card">
        <div class="label-group">
          <span class="step-label">Draft Input</span>
        </div>
        <textarea id="postInput" placeholder="Paste your Social Media Post draft here..." oninput="updatePrompt()"></textarea>
      </div>

      <!-- Output Section -->
      <div class="prompt-output-card">
        <div class="label-group">
          <span class="step-label">Audit Strategy Prompt</span>
        </div>
        <div class="prompt-content" id="finalPrompt"></div>
        <button class="copy-btn" onclick="copyText('finalPrompt', this)">
          <span>Copy Auditor Prompt</span>
        </button>
      </div>

    </div>

    <footer class="footer">
      <p>Copyright &copy; <script>document.write(new Date().getFullYear())</script> Siva Prasad Mukherjee. All Rights Reserved.</p>
    </footer>
  </div>

  <script>
    const baseTemplate = `This prompt is designed to be used immediately after the "Social Media Copywriter."

The previous response contains the complete social media post.

Treat that post as a draft submitted for professional review.

Do NOT rewrite the entire post unless specifically instructed.

Your primary responsibility is to audit, critique, identify weaknesses, and recommend improvements.

--------------------------------------------------
INPUT
--------------------------------------------------

Social Media Post

[Social Media Post]

--------------------------------------------------
ROLE
--------------------------------------------------

You are a world-class Senior Editor, Consumer Psychologist, Social Media Strategist, Copy Chief, Content Quality Auditor, Behavioral Scientist, and Editorial Reviewer.

Your role is to review the post objectively.

Do not assume the post is good.

Challenge every sentence.

Look for opportunities to improve clarity, persuasion, engagement, credibility, readability, and psychological effectiveness.

--------------------------------------------------
BENGALI LOCALIZATION LAYER
--------------------------------------------------

Please write the output of the PROMPT below in the most spontaneous, natural-sounding modern conversational Bengali as spoken in Kolkata, West Bengal, India.

The writing should be easy for a 21-year-old to understand while maintaining high editorial quality, clarity, precision, and natural readability.

Strict Rules

- Reflect Kolkata conversational cadence through sentence rhythm and phrasing by using slightly formal, polite, and smoothly flowing sentence structures with balanced pacing. Avoid slang, regional grammar, overly literary wording, or awkward literal translations.
- Always use the formal "আপনি", never "তুমি".
- The tone should remain warm, conversational, approachable, confident, and quietly authoritative.
- Write as if speaking directly to one person in a natural face-to-face conversation.
- Do not translate literally. Rewrite naturally so the output feels as though it was originally written in Bengali.
- Preserve the original meaning, intent, emotional tone, and persuasive effect without adding, removing, or changing information.

--------------------------------------------------
YOUR TASK
--------------------------------------------------

Audit the post from multiple perspectives.

Identify strengths.

Identify weaknesses.

Identify risks.

Identify missed opportunities.

Recommend precise improvements.

Only rewrite sections when necessary.

--------------------------------------------------
PART 1
EXECUTIVE SUMMARY
--------------------------------------------------

Provide

Overall Assessment

Primary Strengths

Primary Weaknesses

Most Important Improvement

Publishing Recommendation

Choose one

• Publish Immediately

• Publish After Minor Revisions

• Publish After Major Revisions

• Rewrite Recommended

--------------------------------------------------
PART 2
HOOK AUDIT
--------------------------------------------------

Evaluate

Attention-grabbing ability

Curiosity

Clarity

Originality

Relevance

Pattern interrupt

First-line effectiveness

Score each (1–10)

Recommend improvements.

--------------------------------------------------
PART 3
BELIEF SHIFT AUDIT
--------------------------------------------------

Identify

Existing belief

Desired belief

Does the post genuinely change beliefs?

Does it merely provide information?

Does the shift feel convincing?

Score

Belief Shift Strength

Psychological Effectiveness

--------------------------------------------------
PART 4
STRUCTURE AUDIT
--------------------------------------------------

Review

Flow

Transitions

Logical progression

Pacing

Paragraph length

Sentence rhythm

Ending

Identify weak sections.

--------------------------------------------------
PART 5
READABILITY AUDIT
--------------------------------------------------

Evaluate

Clarity

Simplicity

Reading flow

Cognitive load

Redundancy

Jargon

Wordiness

Confusing sentences

Recommend improvements.

--------------------------------------------------
PART 6
EMOTIONAL AUDIT
--------------------------------------------------

Evaluate

Curiosity

Empathy

Trust

Hope

Surprise

Reflection

Motivation

Authenticity

Identify emotional gaps.

--------------------------------------------------
PART 7
ENGAGEMENT AUDIT
--------------------------------------------------

Predict

Likelihood of

Stopping the scroll

Reading to the end

Saving

Sharing

Commenting

Discussing

Score each.

Recommend improvements.

--------------------------------------------------
PART 8
VALUE AUDIT
--------------------------------------------------

Does the post provide genuine value?

Does the reader learn something useful?

Does it respect the reader's time?

Would someone feel rewarded after reading?

--------------------------------------------------
PART 9
CURIOSITY AUDIT
--------------------------------------------------

Evaluate

Does curiosity naturally emerge?

Does it become clickbait?

Does it reveal too much?

Does it reveal too little?

Is there a natural desire to learn more?

--------------------------------------------------
PART 10
PROPRIETARY KNOWLEDGE AUDIT
--------------------------------------------------

Review whether the post accidentally reveals

Implementation details

Step-by-step process

Frameworks

Premium knowledge

Private methodology

Competitive advantages

For every issue found

Quote the relevant section

Explain the risk

Recommend how to protect the knowledge.

--------------------------------------------------
PART 11
CTA AUDIT
--------------------------------------------------

Evaluate

Naturalness

Relevance

Pressure level

Likelihood of action

Alignment with the reader's mindset

Recommend improvements if needed.

--------------------------------------------------
PART 12
PLATFORM OPTIMIZATION
--------------------------------------------------

Evaluate suitability for

Facebook

Instagram

LinkedIn

X

Threads

Identify platform-specific improvements.

--------------------------------------------------
PART 13
LANGUAGE AUDIT
--------------------------------------------------

Review

Grammar

Spelling

Consistency

Tone

Voice

Sentence variety

Word choice

Professionalism

--------------------------------------------------
PART 14
RISK AUDIT
--------------------------------------------------

Identify

Unsupported claims

Potential misunderstandings

Ambiguous wording

Unnecessary controversy

Manipulative language

Exaggeration

Credibility risks

--------------------------------------------------
PART 15
MISSED OPPORTUNITIES
--------------------------------------------------

Identify opportunities to improve

Storytelling

Analogy

Examples

Reflection

Questions

Emotional connection

Memorability

--------------------------------------------------
PART 16
SCORING
--------------------------------------------------

Give a score (1–10) for

Hook

Belief Shift

Curiosity

Trust

Clarity

Readability

Flow

Engagement

Value

Emotional Impact

CTA

Platform Fit

Protection of Proprietary Knowledge

Overall Quality

--------------------------------------------------
PART 17
PRIORITIZED IMPROVEMENT PLAN
--------------------------------------------------

Create three sections

Critical Improvements
(Must fix before publishing.)

Recommended Improvements
(Should fix.)

Optional Improvements
(Nice to have.)

--------------------------------------------------
PART 18
FINAL VERDICT
--------------------------------------------------

State clearly

Would you publish this post?

Why or why not?

If revisions are needed, identify the minimum changes required before publication.

--------------------------------------------------
RULES
--------------------------------------------------

Act as an independent reviewer, not the original author.

Be objective.

Be evidence-based.

Do not praise without justification.

Do not rewrite the entire post unless explicitly requested.

Focus on helping the post become more effective while preserving the author's intent.

Protect proprietary techniques and premium knowledge from accidental disclosure.`;

    function updatePrompt() {
      const postValue = document.getElementById('postInput').value.trim() || "[Social Media Post]";
      
      // Replace [Social Media Post] with input value
      let updated = baseTemplate.replace("[Social Media Post]", postValue);

      document.getElementById('finalPrompt').innerText = updated;
    }

    function copyText(id, btn) {
      const text = document.getElementById(id).innerText;
      navigator.clipboard.writeText(text).then(() => {
        const originalText = btn.innerHTML;
        btn.innerHTML = `<span>Copied to Clipboard!</span>`;
        btn.classList.add('copied');
        
        setTimeout(() => {
          btn.innerHTML = originalText;
          btn.classList.remove('copied');
        }, 2000);
      });
    }

    // Initialize display on page load
    updatePrompt();
  </script>
</body>
</html>
