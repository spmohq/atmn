<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Image Quality Auditor | Prompt Genie</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Source+Code+Pro:wght@400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-gradient-start: #020617;
      --bg-gradient-end: #0f172a;
      --card-bg: rgba(30, 41, 59, 0.4);
      --card-border: rgba(255, 255, 255, 0.08);
      --text-primary: #f8fafc;
      --text-secondary: #94a3b8;
      --accent-primary: #22d3ee;
      --accent-hover: #67e8f9;
      --accent-success: #10b981;
      --code-bg: rgba(0, 0, 0, 0.3);
      --shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.5);
      --input-bg: rgba(15, 23, 42, 0.6);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background: fixed linear-gradient(135deg, var(--bg-gradient-start), var(--bg-gradient-end));
      color: var(--text-primary);
      line-height: 1.6;
      padding: 60px 20px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .container {
      max-width: 900px;
      width: 100%;
      margin: 0 auto;
    }

    header {
      text-align: center;
      margin-bottom: 50px;
    }

    h1 {
      font-size: 2.2rem;
      font-weight: 800;
      letter-spacing: -0.02em;
      color: #fff;
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    .workflow {
      display: flex;
      flex-direction: column;
      gap: 30px;
    }

    .step-card {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 24px;
      padding: 40px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(12px);
    }

    .label-group {
      margin-bottom: 20px;
    }

    .step-label {
      font-weight: 800;
      font-size: 0.75rem;
      background: var(--accent-primary);
      color: #020617;
      padding: 4px 12px;
      border-radius: 4px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      display: inline-block;
      margin-bottom: 10px;
    }

    textarea {
      width: 100%;
      min-height: 150px;
      background: var(--input-bg);
      border: 1px solid var(--card-border);
      border-radius: 12px;
      padding: 20px;
      color: var(--text-primary);
      font-family: 'Inter', sans-serif;
      font-size: 1rem;
      resize: vertical;
      outline: none;
      transition: all 0.3s;
    }

    textarea:focus {
      border-color: var(--accent-primary);
      background: rgba(15, 23, 42, 0.8);
    }

    .prompt-output-card {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 24px;
      padding: 40px;
      margin-top: 10px;
    }

    .prompt-content {
      background: var(--code-bg);
      padding: 30px;
      border-radius: 12px;
      font-family: 'Source Code Pro', monospace;
      font-size: 0.95rem;
      color: #cbd5e1;
      white-space: pre-wrap;
      border: 1px solid rgba(255,255,255,0.05);
      margin-bottom: 25px;
      line-height: 1.6;
      max-height: 600px;
      overflow-y: auto;
    }

    /* Custom scrollbar for output */
    .prompt-content::-webkit-scrollbar {
      width: 8px;
    }
    .prompt-content::-webkit-scrollbar-track {
      background: rgba(255, 255, 255, 0.02);
    }
    .prompt-content::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.1);
      border-radius: 4px;
    }

    .copy-btn {
      background: rgba(34, 211, 238, 0.1);
      color: var(--accent-primary);
      border: 1px solid var(--accent-primary);
      padding: 14px 32px;
      border-radius: 12px;
      font-weight: 700;
      font-size: 1.1rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      transition: all 0.2s;
      width: 100%;
    }

    .copy-btn:hover {
      background: var(--accent-primary);
      color: #020617;
    }

    .copy-btn.copied {
      background: var(--accent-success);
      border-color: var(--accent-success);
      color: white;
    }

    .footer {
      margin-top: 80px;
      text-align: center;
      color: var(--text-secondary);
      font-size: 0.85rem;
      border-top: 1px solid var(--card-border);
      padding-top: 40px;
      width: 100%;
    }

    @media (max-width: 600px) {
      h1 { font-size: 1.6rem; }
      .step-card, .prompt-output-card { padding: 25px; }
      .prompt-content { font-size: 0.85rem; }
    }
  </style>
</head>
<body>

  <div class="container">
    <header>
      <h1>IMAGE QUALITY AUDITOR</h1>
    </header>

    <div class="workflow">
      
      <!-- Input Section -->
      <div class="step-card">
        <div class="label-group">
          <span class="step-label">Input Source</span>
          <p style="font-size: 0.9rem; color: var(--text-secondary); margin-bottom: 10px;">[Approved Social Media Post]</p>
        </div>
        <textarea id="briefInput" placeholder="Paste your approved social media post / creative brief here..." oninput="updatePrompt()"></textarea>
      </div>

      <!-- Output Section -->
      <div class="prompt-output-card">
        <div class="label-group">
          <span class="step-label">Generated Audit Prompt</span>
        </div>
        <div class="prompt-content" id="finalPrompt"></div>
        <button class="copy-btn" onclick="copyText('finalPrompt', this)">
          <span>Copy Audit Prompt</span>
        </button>
      </div>

    </div>

    <footer class="footer">
      <p>Copyright &copy; <script>document.write(new Date().getFullYear())</script> Siva Prasad Mukherjee. All Rights Reserved.</p>
    </footer>
  </div>

  <script>
    const baseTemplate = `This prompt is designed to be used immediately after the AI image has been generated.

The previous steps have already established the communication strategy.

Treat the Approved Creative Brief as the source of truth.

Treat the generated image as a creative draft.

Your responsibility is to audit the image—not regenerate it.

--------------------------------------------------
INPUT
--------------------------------------------------

INPUT 1

Approved Creative Brief

[Approved Creative Brief]

--------------------------------------------------

INPUT 2

Generated Image

Uploaded image.

--------------------------------------------------
ROLE
--------------------------------------------------

You are a world-class Creative Director, Advertising Art Director, Editorial Designer, Visual Communication Expert, UX Designer, Consumer Psychologist, Brand Designer, Photography Critic, and Image Quality Reviewer.

Your responsibility is to evaluate whether the image successfully communicates the intended message.

Be objective.

Assume nothing.

Evaluate everything.

--------------------------------------------------
BENGALI LOCALIZATION LAYER
--------------------------------------------------

Please write the output of the PROMPT below in the most spontaneous, natural-sounding modern conversational Bengali as spoken in Kolkata, West Bengal, India.

The writing should be easy for a 21-year-old to understand while maintaining high editorial quality, clarity, precision, and natural readability.

Strict Rules

- Reflect Kolkata conversational cadence through sentence rhythm and phrasing by using slightly formal, polite, and smoothly flowing sentence structures with balanced pacing. Avoid slang, regional grammar, overly literary wording, or awkward literal translations.
- Always use the formal "আপনি", never "তুমি".
- The tone should remain warm, conversational, approachable, confident, and quietly authoritative.
- Write as if speaking directly to one person in a natural face-to-face conversation.
- Do not translate literally. Rewrite naturally so the output feels as though it was originally written in Bengali.
- Preserve the original meaning, intent, emotional tone, and persuasive effect without adding, removing, or changing information.

--------------------------------------------------
YOUR TASK
--------------------------------------------------

Compare the generated image against the Approved Creative Brief.

Identify

• strengths

• weaknesses

• inconsistencies

• missed opportunities

• communication failures

• technical problems

• emotional mismatches

Recommend precise improvements.

--------------------------------------------------
PART 1
EXECUTIVE SUMMARY
--------------------------------------------------

Provide

Overall Assessment

Primary Strengths

Primary Weaknesses

Publishing Recommendation

Choose one

• Ready to Publish

• Minor Improvements Needed

• Major Improvements Needed

• Regenerate Image Recommended

--------------------------------------------------
PART 2
MESSAGE MATCH
--------------------------------------------------

Evaluate

Does the image communicate the intended message?

Does it reinforce the social media post?

Does the visual support the desired belief shift?

Score

Message Clarity

Belief Shift Support

Communication Effectiveness

--------------------------------------------------
PART 3
FIRST IMPRESSION
--------------------------------------------------

Within the first 3 seconds

What does the viewer notice?

What emotion is created?

What idea is immediately understood?

Would someone stop scrolling?

--------------------------------------------------
PART 4
VISUAL HIERARCHY
--------------------------------------------------

Review

Focal point

Eye movement

Balance

Composition

Depth

Cropping

Negative space

Visual weight

--------------------------------------------------
PART 5
EMOTIONAL IMPACT
--------------------------------------------------

Evaluate

Curiosity

Trust

Hope

Recognition

Surprise

Reflection

Confidence

Transformation

Does the emotional response match the Creative Brief?

--------------------------------------------------
PART 6
TECHNICAL QUALITY
--------------------------------------------------

Review

Resolution

Sharpness

Lighting

Contrast

Perspective

Anatomy (if applicable)

Textures

Color consistency

Background quality

Artifacts

Typography quality (if applicable)

--------------------------------------------------
PART 7
BRAND CONSISTENCY
--------------------------------------------------

Evaluate

Visual style

Mood

Professionalism

Brand personality

Consistency with previous visuals

--------------------------------------------------
PART 8
READABILITY
--------------------------------------------------

If text appears in the image

Evaluate

Legibility

Font choice

Hierarchy

Spacing

Contrast

Placement

--------------------------------------------------
PART 9
DISTRACTIONS
--------------------------------------------------

Identify

Visual clutter

Competing focal points

Unnecessary elements

Confusing symbolism

Misleading details

Anything that weakens the message

--------------------------------------------------
PART 10
PSYCHOLOGICAL EFFECTIVENESS
--------------------------------------------------

Evaluate whether the image strengthens

Curiosity

Attention

Memory

Understanding

Recognition

Belief Change

Emotional Connection

--------------------------------------------------
PART 11
MISSED OPPORTUNITIES
--------------------------------------------------

Identify opportunities to improve

Composition

Lighting

Emotion

Storytelling

Symbolism

Color

Perspective

Focus

--------------------------------------------------
PART 12
IMPROVEMENT PLAN
--------------------------------------------------

For every issue found

Describe

The Issue

Why it matters

Recommended Change

Expected Improvement

Priority

Critical

Important

Optional

--------------------------------------------------
PART 13
PROMPT FEEDBACK
--------------------------------------------------

Based on the image

Infer which parts of the image-generation prompt should be improved.

Do NOT rewrite the entire prompt.

Only recommend targeted improvements.

--------------------------------------------------
PART 14
QUALITY SCORECARD
--------------------------------------------------

Give a score (1–10)

Communication

Belief Shift

Visual Impact

Scroll-Stopping Power

Composition

Emotion

Storytelling

Readability

Brand Fit

Technical Quality

Professional Appearance

Overall Effectiveness

--------------------------------------------------
PART 15
FINAL VERDICT
--------------------------------------------------

Clearly state

Would you approve this image for publication?

Why?

If not,

What is the minimum set of improvements required before approval?

--------------------------------------------------
RULES
--------------------------------------------------

Do NOT regenerate the image.

Do NOT rewrite the Creative Brief.

Do NOT redesign the concept.

Evaluate only.

Provide precise, actionable recommendations.

Always prioritize communication effectiveness over visual beauty.

A visually beautiful image that fails to communicate the intended message should NOT receive a high rating.`;

    function updatePrompt() {
      const inputValue = document.getElementById('briefInput').value.trim() || "[Approved Creative Brief]";
      
      // Replace [Approved Creative Brief] placeholder in template
      let updated = baseTemplate.replace("[Approved Creative Brief]", inputValue);

      document.getElementById('finalPrompt').innerText = updated;
    }

    function copyText(id, btn) {
      const text = document.getElementById(id).innerText;
      navigator.clipboard.writeText(text).then(() => {
        const originalText = btn.innerHTML;
        btn.innerHTML = `<span>Copied to Clipboard!</span>`;
        btn.classList.add('copied');
        
        setTimeout(() => {
          btn.innerHTML = originalText;
          btn.classList.remove('copied');
        }, 2000);
      });
    }

    // Initialize display on page load
    updatePrompt();
  </script>
</body>
</html>
