<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Facebook Publishing Optimizer | Prompt Genie</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Source+Code+Pro:wght@400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-gradient-start: #020617;
      --bg-gradient-end: #0f172a;
      --card-bg: rgba(30, 41, 59, 0.4);
      --card-border: rgba(255, 255, 255, 0.08);
      --text-primary: #f8fafc;
      --text-secondary: #94a3b8;
      --accent-primary: #22d3ee;
      --accent-hover: #67e8f9;
      --accent-success: #10b981;
      --code-bg: rgba(0, 0, 0, 0.3);
      --shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.5);
      --input-bg: rgba(15, 23, 42, 0.6);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background: fixed linear-gradient(135deg, var(--bg-gradient-start), var(--bg-gradient-end));
      color: var(--text-primary);
      line-height: 1.6;
      padding: 60px 20px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .container {
      max-width: 900px;
      width: 100%;
      margin: 0 auto;
    }

    header {
      text-align: center;
      margin-bottom: 50px;
    }

    h1 {
      font-size: 2.2rem;
      font-weight: 800;
      letter-spacing: -0.02em;
      color: #fff;
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    .workflow {
      display: flex;
      flex-direction: column;
      gap: 30px;
    }

    .step-card {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 24px;
      padding: 40px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(12px);
    }

    .label-group {
      margin-bottom: 20px;
    }

    .step-label {
      font-weight: 800;
      font-size: 0.75rem;
      background: var(--accent-primary);
      color: #020617;
      padding: 4px 12px;
      border-radius: 4px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      display: inline-block;
      margin-bottom: 10px;
    }

    textarea {
      width: 100%;
      min-height: 150px;
      background: var(--input-bg);
      border: 1px solid var(--card-border);
      border-radius: 12px;
      padding: 20px;
      color: var(--text-primary);
      font-family: 'Inter', sans-serif;
      font-size: 1rem;
      resize: vertical;
      outline: none;
      transition: all 0.3s;
    }

    textarea:focus {
      border-color: var(--accent-primary);
      background: rgba(15, 23, 42, 0.8);
    }

    .prompt-output-card {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 24px;
      padding: 40px;
      margin-top: 10px;
    }

    .prompt-content {
      background: var(--code-bg);
      padding: 30px;
      border-radius: 12px;
      font-family: 'Source Code Pro', monospace;
      font-size: 0.95rem;
      color: #cbd5e1;
      white-space: pre-wrap;
      border: 1px solid rgba(255,255,255,0.05);
      margin-bottom: 25px;
      line-height: 1.6;
      max-height: 600px;
      overflow-y: auto;
    }

    /* Custom scrollbar for output */
    .prompt-content::-webkit-scrollbar {
      width: 8px;
    }
    .prompt-content::-webkit-scrollbar-track {
      background: rgba(255, 255, 255, 0.02);
    }
    .prompt-content::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.1);
      border-radius: 4px;
    }

    .copy-btn {
      background: rgba(34, 211, 238, 0.1);
      color: var(--accent-primary);
      border: 1px solid var(--accent-primary);
      padding: 14px 32px;
      border-radius: 12px;
      font-weight: 700;
      font-size: 1.1rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      transition: all 0.2s;
      width: 100%;
    }

    .copy-btn:hover {
      background: var(--accent-primary);
      color: #020617;
    }

    .copy-btn.copied {
      background: var(--accent-success);
      border-color: var(--accent-success);
      color: white;
    }

    .footer {
      margin-top: 80px;
      text-align: center;
      color: var(--text-secondary);
      font-size: 0.85rem;
      border-top: 1px solid var(--card-border);
      padding-top: 40px;
      width: 100%;
    }

    @media (max-width: 600px) {
      h1 { font-size: 1.6rem; }
      .step-card, .prompt-output-card { padding: 25px; }
      .prompt-content { font-size: 0.85rem; }
    }
  </style>
</head>
<body>

  <div class="container">
    <header>
      <h1>FACEBOOK PUBLISHING OPTIMIZER</h1>
    </header>

    <div class="workflow">
      
      <!-- Input Section -->
      <div class="step-card">
        <div class="label-group">
          <span class="step-label">Final Post Input</span>
        </div>
        <textarea id="postInput" placeholder="Paste your final approved post here..." oninput="updatePrompt()"></textarea>
      </div>

      <!-- Output Section -->
      <div class="prompt-output-card">
        <div class="label-group">
          <span class="step-label">Optimization System Prompt</span>
        </div>
        <div class="prompt-content" id="finalPrompt"></div>
        <button class="copy-btn" onclick="copyText('finalPrompt', this)">
          <span>Copy Optimizer Prompt</span>
        </button>
      </div>

    </div>

    <footer class="footer">
      <p>Copyright &copy; <script>document.write(new Date().getFullYear())</script> Siva Prasad Mukherjee. All Rights Reserved.</p>
    </footer>
  </div>

  <script>
    const baseTemplate = `This prompt is designed to be used immediately after the "Caption & Visual Alignment Auditor."

The social media post has already been written, audited, and approved.

The visual has already been designed, generated, audited, and approved.

Treat both as final.

Your responsibility is NOT to rewrite them.

Your responsibility is to prepare them for maximum effectiveness on Facebook.

--------------------------------------------------
INPUT
--------------------------------------------------

INPUT 1

Approved Facebook Post

[The final approved post]

--------------------------------------------------

INPUT 2

Approved Facebook Image

Uploaded image.

--------------------------------------------------
ROLE
--------------------------------------------------

You are a world-class Facebook Growth Strategist, Social Media Editor, Consumer Psychologist, Content Distribution Specialist, Accessibility Expert, Engagement Strategist, and Facebook Algorithm Specialist.

Your responsibility is to optimize—not rewrite—the content for publishing.

--------------------------------------------------
BENGALI LOCALIZATION LAYER
--------------------------------------------------

Please write the output of the PROMPT below in the most spontaneous, natural-sounding modern conversational Bengali as spoken in Kolkata, West Bengal, India.

The writing should be easy for a 21-year-old to understand while maintaining high editorial quality, clarity, precision, and natural readability.

Strict Rules

- Reflect Kolkata conversational cadence through sentence rhythm and phrasing by using slightly formal, polite, and smoothly flowing sentence structures with balanced pacing. Avoid slang, regional grammar, overly literary wording, or awkward literal translations.
- Always use the formal "আপনি", never "তুমি".
- The tone should remain warm, conversational, approachable, confident, and quietly authoritative.
- Write as if speaking directly to one person in a natural face-to-face conversation.
- Do not translate literally. Rewrite naturally so the output feels as though it was originally written in Bengali.
- Preserve the original meaning, intent, emotional tone, and persuasive effect without adding, removing, or changing information.

--------------------------------------------------
YOUR TASK
--------------------------------------------------

Review the complete Facebook post and its accompanying image.

Assume they are already approved.

Optimize only the publishing package.

Do NOT redesign the content.

--------------------------------------------------
PART 1
PUBLISHING READINESS
--------------------------------------------------

Determine whether the package is fully ready for publication.

If not,

identify only the remaining publishing issues.

--------------------------------------------------
PART 2
MOBILE EXPERIENCE
--------------------------------------------------

Evaluate

• readability on mobile

• paragraph spacing

• scanning experience

• image clarity

• text visibility (if applicable)

Recommend improvements if necessary.

--------------------------------------------------
PART 3
FIRST-SCREEN EXPERIENCE
--------------------------------------------------

Evaluate what a Facebook user sees before tapping "See more."

Review

• opening lines

• visual impact

• curiosity

• clarity

Explain whether the first screen encourages continued reading.

--------------------------------------------------
PART 4
ENGAGEMENT POTENTIAL
--------------------------------------------------

Estimate the likelihood of

• stopping the scroll

• reading to the end

• commenting

• sharing

• saving

Explain your reasoning.

--------------------------------------------------
PART 5
CTA REVIEW
--------------------------------------------------

Evaluate whether the CTA

• matches the reader's mindset

• feels natural

• encourages meaningful engagement

Recommend improvements only if necessary.

--------------------------------------------------
PART 6
ACCESSIBILITY
--------------------------------------------------

Create

• concise, descriptive alt text for the image

Review

• text readability

• contrast (if text appears in the image)

• accessibility considerations

--------------------------------------------------
PART 7
COMMENT STRATEGY
--------------------------------------------------

Suggest

• an optional first comment (if beneficial)

• follow-up questions to sustain discussion

• responses to likely audience reactions

Do not duplicate the CTA.

--------------------------------------------------
PART 8
RISK REVIEW
--------------------------------------------------

Identify any remaining risks, such as

• confusing wording

• accidental controversy

• unsupported claims

• accidental disclosure of proprietary knowledge

--------------------------------------------------
PART 9
PUBLISHING CHECKLIST
--------------------------------------------------

Create a final pre-publication checklist.

Examples

□ Caption approved

□ Image approved

□ Caption and image aligned

□ Mobile readability verified

□ Accessibility reviewed

□ CTA verified

□ Brand consistency confirmed

□ Proprietary knowledge protected

□ Ready for publication

--------------------------------------------------
PART 10
FINAL SCORECARD
--------------------------------------------------

Score (1–10)

Scroll-Stopping Potential

Readability

Curiosity

Belief Shift

Engagement Potential

Accessibility

Brand Consistency

Publishing Readiness

Overall Facebook Readiness

--------------------------------------------------
PART 11
FINAL VERDICT
--------------------------------------------------

Choose one

• Ready to Publish

• Ready After Minor Publishing Adjustments

• Hold for Revision

Explain your decision clearly.

--------------------------------------------------
RULES
--------------------------------------------------

Do NOT rewrite the caption.

Do NOT redesign the image.

Do NOT regenerate anything.

Focus exclusively on preparing the approved content package for successful publication on Facebook.

Optimize for user experience, accessibility, engagement, and publishing readiness while preserving the original communication strategy.`;

    function updatePrompt() {
      const postValue = document.getElementById('postInput').value.trim() || "[The final approved post]";
      
      // Replace placeholder with input value
      let updated = baseTemplate.replace("[The final approved post]", postValue);

      document.getElementById('finalPrompt').innerText = updated;
    }

    function copyText(id, btn) {
      const text = document.getElementById(id).innerText;
      navigator.clipboard.writeText(text).then(() => {
        const originalText = btn.innerHTML;
        btn.innerHTML = `<span>Copied to Clipboard!</span>`;
        btn.classList.add('copied');
        
        setTimeout(() => {
          btn.innerHTML = originalText;
          btn.classList.remove('copied');
        }, 2000);
      });
    }

    // Initialize display on page load
    updatePrompt();
  </script>
</body>
</html>
