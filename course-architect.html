<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>COURSE ARCHITECT & CURRICULUM DESIGN SYSTEM</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Source+Code+Pro:wght@400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-gradient-start: #020617;
      --bg-gradient-end: #0f172a;
      --card-bg: rgba(30, 41, 59, 0.4);
      --card-border: rgba(255, 255, 255, 0.08);
      --text-primary: #f8fafc;
      --text-secondary: #94a3b8;
      --accent-primary: #22d3ee;
      --accent-hover: #67e8f9;
      --accent-success: #10b981;
      --code-bg: rgba(0, 0, 0, 0.3);
      --shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.5);
      --input-bg: rgba(15, 23, 42, 0.6);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background: fixed linear-gradient(135deg, var(--bg-gradient-start), var(--bg-gradient-end));
      color: var(--text-primary);
      line-height: 1.6;
      padding: 60px 20px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .container {
      max-width: 900px;
      width: 100%;
      margin: 0 auto;
    }

    header {
      text-align: center;
      margin-bottom: 50px;
    }

    h1 {
      font-size: 2.2rem;
      font-weight: 800;
      letter-spacing: -0.02em;
      color: #fff;
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    .workflow {
      display: flex;
      flex-direction: column;
      gap: 30px;
    }

    .step-card {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 24px;
      padding: 40px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(12px);
    }

    .label-group {
      margin-bottom: 20px;
    }

    .step-label {
      font-weight: 800;
      font-size: 0.75rem;
      background: var(--accent-primary);
      color: #020617;
      padding: 4px 12px;
      border-radius: 4px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      display: inline-block;
      margin-bottom: 10px;
    }

    .field-title {
      display: block;
      font-size: 1.1rem;
      font-weight: 700;
      color: #fff;
      margin-bottom: 8px;
    }

    textarea {
      width: 100%;
      min-height: 120px;
      background: var(--input-bg);
      border: 1px solid var(--card-border);
      border-radius: 12px;
      padding: 20px;
      color: var(--text-primary);
      font-family: 'Inter', sans-serif;
      font-size: 1rem;
      resize: vertical;
      outline: none;
      transition: all 0.3s;
    }

    textarea:focus {
      border-color: var(--accent-primary);
      background: rgba(15, 23, 42, 0.8);
    }

    .prompt-output-card {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 24px;
      padding: 40px;
      margin-top: 10px;
    }

    .prompt-content {
      background: var(--code-bg);
      padding: 30px;
      border-radius: 12px;
      font-family: 'Source Code Pro', monospace;
      font-size: 0.95rem;
      color: #cbd5e1;
      white-space: pre-wrap;
      border: 1px solid rgba(255,255,255,0.05);
      margin-bottom: 25px;
      line-height: 1.6;
      max-height: 600px;
      overflow-y: auto;
    }

    /* Custom scrollbar for output */
    .prompt-content::-webkit-scrollbar {
      width: 8px;
    }
    .prompt-content::-webkit-scrollbar-track {
      background: rgba(255, 255, 255, 0.02);
    }
    .prompt-content::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.1);
      border-radius: 4px;
    }

    .copy-btn {
      background: rgba(34, 211, 238, 0.1);
      color: var(--accent-primary);
      border: 1px solid var(--accent-primary);
      padding: 14px 32px;
      border-radius: 12px;
      font-weight: 700;
      font-size: 1.1rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      transition: all 0.2s;
      width: 100%;
    }

    .copy-btn:hover {
      background: var(--accent-primary);
      color: #020617;
    }

    .copy-btn.copied {
      background: var(--accent-success);
      border-color: var(--accent-success);
      color: white;
    }

    .footer {
      margin-top: 80px;
      text-align: center;
      color: var(--text-secondary);
      font-size: 0.85rem;
      border-top: 1px solid var(--card-border);
      padding-top: 40px;
      width: 100%;
    }

    @media (max-width: 600px) {
      h1 { font-size: 1.6rem; }
      .step-card, .prompt-output-card { padding: 25px; }
      .prompt-content { font-size: 0.85rem; }
    }
  </style>
</head>
<body>

  <div class="container">
    <header>
      <h1>COURSE ARCHITECT & CURRICULUM DESIGN SYSTEM</h1>
    </header>

    <div class="workflow">
      
      <!-- Field 1 -->
      <div class="step-card">
        <div class="label-group">
          <span class="step-label">Variable 1</span>
          <span class="field-title">[Target Audience]</span>
        </div>
        <textarea id="in_audience" placeholder="Who are the learners? (e.g. Graphic Designers, Small Business Owners...)" oninput="updatePrompt()"></textarea>
      </div>

      <!-- Field 2 -->
      <div class="step-card">
        <div class="label-group">
          <span class="step-label">Variable 2</span>
          <span class="field-title">[Concept Behind the Process]</span>
        </div>
        <textarea id="in_concept" placeholder="Explain the underlying principles or theory..." oninput="updatePrompt()"></textarea>
      </div>

      <!-- Field 3 -->
      <div class="step-card">
        <div class="label-group">
          <span class="step-label">Variable 3</span>
          <span class="field-title">[Process - Step by Step]</span>
        </div>
        <textarea id="in_process" placeholder="Paste the exact technical steps or workflow here..." oninput="updatePrompt()"></textarea>
      </div>

      <!-- Output Section -->
      <div class="prompt-output-card">
        <div class="label-group">
          <span class="step-label">Generated System Prompt</span>
        </div>
        <div class="prompt-content" id="finalPrompt"></div>
        <button class="copy-btn" onclick="copyText('finalPrompt', this)">
          <span>Copy Full Prompt</span>
        </button>
      </div>

    </div>

    <footer class="footer">
      <p>Copyright &copy; <script>document.write(new Date().getFullYear())</script> Siva Prasad Mukherjee. All Rights Reserved.</p>
    </footer>
  </div>

  <script>
    const baseTemplate = `You are an expert Instructional Designer, Curriculum Architect, Learning Experience Designer, AI Workflow Educator, and Adult Learning Specialist.

Your responsibility is not to simply organize lessons.

Your responsibility is to design a complete, learner-centered, logically structured, outcome-driven course that transforms a learner from their current state to the desired end result.

Think like a professional curriculum designer, not a content writer.

---

BENGALI LOCALIZATION LAYER

Please write the output of the PROMPT below in the most spontaneous, natural-sounding modern conversational Bengali as spoken in Kolkata, West Bengal, India.

The writing should be easy for a 21-year-old to understand while maintaining high editorial quality, clarity, precision, and natural readability.

Strict Rules

- Reflect Kolkata conversational cadence through sentence rhythm and phrasing by using slightly formal, polite, and smoothly flowing sentence structures with balanced pacing. Avoid slang, regional grammar, overly literary wording, or awkward literal translations.
- Always use the formal **"আপনি"**, never **"তুমি"**.
- The tone should remain warm, conversational, approachable, confident, and quietly authoritative.
- Write as if speaking directly to one person in a natural face-to-face conversation.
- Do **not** translate literally. Rewrite naturally so the output feels as though it was originally written in Bengali.
- Preserve the original meaning, intent, emotional tone, and persuasive effect without adding, removing, or changing information.

---

INPUT

1. Target Audience

[Target Audience]

---

2. Concept Behind the Process

[Concept Behind the Process]

---

3. Exact Process (Step by Step)

[Process - Step by Step]

---

DESIGN PROCESS

Follow this exact workflow.

Phase 1 — Analyze the Learner

Identify:

- Who the learners are
- Their current knowledge level
- Their current skill level
- Their goals
- Their frustrations
- Their misconceptions
- Their likely obstacles
- Their desired transformation

---

Phase 2 — Analyze the Concept

Identify:

- Core concept
- Purpose
- Underlying principles
- Assumptions
- Mental models
- Frameworks
- Transferable principles
- Common misconceptions
- Common mistakes
- Required mindset

---

Phase 3 — Identify Prerequisites

Before designing the course, determine everything learners genuinely need beforehand.

Separate prerequisites into:

Prerequisite Knowledge

What learners should already know.

Prerequisite Skills

What learners should already be able to do.

Required Tools & Accounts

Software, services, accounts, devices, or platforms required.

Recommended Resources

Optional books, websites, videos, or references that would help learners succeed.

Required Mindset

Attitudes or expectations necessary for successful learning.

IMPORTANT:

Do NOT create unnecessary prerequisites.

If a prerequisite can reasonably be taught within the course, recommend including it as an introductory lesson instead of listing it as a prerequisite.

---

Phase 4 — Analyze the Process

Study the complete workflow.

Treat every supplied process step as a potential lesson.

If necessary:

- merge steps
- split steps
- reorder steps

ONLY when it improves learning.

Explain every major restructuring decision.

---

Phase 5 — Design the Learning Journey

Create a logical learning progression.

Each lesson should naturally prepare learners for the next lesson.

Group lessons into meaningful modules.

Modules should represent stages of mastery—not arbitrary chapter divisions.

---

Phase 6 — Create Module Titles

Module titles should represent learner progress.

Avoid generic names like:

Module 1

Module 2

Module 3

Use transformation-oriented titles.

---

Phase 7 — Create Lesson Titles

Lesson titles should clearly communicate what learners will accomplish.

Avoid vague titles.

Each title should describe a specific outcome.

---

Phase 8 — Design Every Lesson

For every lesson generate:

Lesson Title

Lesson Objective

Why this lesson matters

Exact Process

AI Prompts

For every prompt include:

- Prompt
- Purpose
- Why to use
- When to use
- How to use
- Expected output

Common mistakes

Best practices

Practical To-Do Checklist

Expected Lesson Output

Transition to the Next Lesson

---

Phase 9 — Write the Course Introduction

Create a professional introduction including:

- Welcome
- Who this course is for
- Who should NOT take this course
- Why this course exists
- Problem it solves
- Learning objectives
- Course roadmap
- Recommended learning strategy
- How to get maximum value
- Expected transformation

---

Phase 10 — Write the Course Conclusion

Create a professional conclusion including:

- Congratulations
- What learners have accomplished
- Skills developed
- Common next challenges
- Recommended practice plan
- Suggested next learning path
- Advanced recommendations
- Final encouragement
- Call to action

---

OUTPUT FORMAT

Course Overview

- Course Title
- Course Subtitle
- Course Promise
- One-sentence Value Proposition

---

Target Audience Summary

---

Learner Transformation

Current State

↓

Desired State

---

Learning Outcomes

---

Prerequisite Knowledge

---

Prerequisite Skills

---

Required Tools & Accounts

---

Recommended Resources

---

Required Mindset

---

Recommended Learning Strategy

---

Complete Module Structure

For every module include:

- Module Title
- Module Objective
- Learning Outcome

For every lesson include:

- Lesson Title
- Lesson Objective
- Why this lesson matters
- Exact Process
- AI Prompts
    - Prompt
    - Purpose
    - Why
    - When
    - How
    - Expected Output
- Common Mistakes
- Best Practices
- To-Do Checklist
- Expected Lesson Output
- Transition to Next Lesson

---

Complete Course Introduction

---

Complete Course Conclusion

---

Quality Checklist

Before finishing, verify that:

✓ Every lesson contributes to the final transformation.

✓ Every module represents a meaningful stage of mastery.

✓ The learning sequence is logical.

✓ Prerequisites are minimal and justified.

✓ Anything that can be taught inside the course has NOT been unnecessarily listed as a prerequisite.

✓ Lesson titles are outcome-oriented.

✓ Module titles reflect learner progression.

✓ Every AI prompt has a clear purpose, timing, usage instructions, and expected output.

✓ Every lesson ends with a practical deliverable before moving to the next lesson.

✓ The entire course feels like one coherent learning journey rather than a collection of unrelated lessons.

The final output should be professional enough to serve as the complete blueprint for building a high-quality online course.`;

    function updatePrompt() {
      const audience = document.getElementById('in_audience').value.trim() || "[Target Audience]";
      const concept = document.getElementById('in_concept').value.trim() || "[Concept Behind the Process]";
      const process = document.getElementById('in_process').value.trim() || "[Process - Step by Step]";
      
      let updated = baseTemplate.replace("[Target Audience]", audience);
      updated = updated.replace("[Concept Behind the Process]", concept);
      updated = updated.replace("[Process - Step by Step]", process);

      document.getElementById('finalPrompt').innerText = updated;
    }

    function copyText(id, btn) {
      const text = document.getElementById(id).innerText;
      navigator.clipboard.writeText(text).then(() => {
        const originalText = btn.innerHTML;
        btn.innerHTML = `<span>Copied to Clipboard!</span>`;
        btn.classList.add('copied');
        
        setTimeout(() => {
          btn.innerHTML = originalText;
          btn.classList.remove('copied');
        }, 2000);
      });
    }

    // Initialize display on page load
    updatePrompt();
  </script>
</body>
</html>
