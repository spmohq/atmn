<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Content Planning Process | Strategist Genie</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Source+Code+Pro:wght@400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-gradient-start: #020617;
      --bg-gradient-end: #0f172a;
      --card-bg: rgba(30, 41, 59, 0.4);
      --card-border: rgba(255, 255, 255, 0.08);
      --text-primary: #f8fafc;
      --text-secondary: #94a3b8;
      --accent-primary: #22d3ee;
      --accent-hover: #67e8f9;
      --accent-success: #10b981;
      --code-bg: rgba(0, 0, 0, 0.3);
      --shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.5);
      --input-bg: rgba(15, 23, 42, 0.6);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background: fixed linear-gradient(135deg, var(--bg-gradient-start), var(--bg-gradient-end));
      color: var(--text-primary);
      line-height: 1.6;
      padding: 60px 20px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .container {
      max-width: 800px;
      width: 100%;
      margin: 0 auto;
    }

    header {
      text-align: center;
      margin-bottom: 50px;
    }

    h1 {
      font-size: 2.5rem;
      font-weight: 800;
      letter-spacing: -0.02em;
      color: #fff;
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    .workflow {
      display: flex;
      flex-direction: column;
      gap: 30px;
    }

    .step-card {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 24px;
      padding: 40px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(12px);
    }

    .label-group {
      margin-bottom: 20px;
    }

    .step-label {
      font-weight: 800;
      font-size: 0.75rem;
      background: var(--accent-primary);
      color: #020617;
      padding: 4px 12px;
      border-radius: 4px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      display: inline-block;
      margin-bottom: 10px;
    }

    .field-title {
      display: block;
      font-size: 1.1rem;
      font-weight: 700;
      color: #fff;
      margin-bottom: 8px;
    }

    textarea {
      width: 100%;
      min-height: 100px;
      background: var(--input-bg);
      border: 1px solid var(--card-border);
      border-radius: 12px;
      padding: 20px;
      color: var(--text-primary);
      font-family: 'Inter', sans-serif;
      font-size: 1rem;
      resize: vertical;
      outline: none;
      transition: all 0.3s;
    }

    textarea:focus {
      border-color: var(--accent-primary);
      background: rgba(15, 23, 42, 0.8);
    }

    .prompt-output-card {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 24px;
      padding: 40px;
      margin-top: 10px;
    }

    .prompt-content {
      background: var(--code-bg);
      padding: 30px;
      border-radius: 12px;
      font-family: 'Source Code Pro', monospace;
      font-size: 0.95rem;
      color: #cbd5e1;
      white-space: pre-wrap;
      border: 1px solid rgba(255,255,255,0.05);
      margin-bottom: 25px;
      line-height: 1.6;
      max-height: 600px;
      overflow-y: auto;
    }

    /* Custom scrollbar for output */
    .prompt-content::-webkit-scrollbar {
      width: 8px;
    }
    .prompt-content::-webkit-scrollbar-track {
      background: rgba(255, 255, 255, 0.02);
    }
    .prompt-content::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.1);
      border-radius: 4px;
    }

    .copy-btn {
      background: rgba(34, 211, 238, 0.1);
      color: var(--accent-primary);
      border: 1px solid var(--accent-primary);
      padding: 16px 32px;
      border-radius: 12px;
      font-weight: 700;
      font-size: 1.1rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      transition: all 0.2s;
      width: 100%;
    }

    .copy-btn:hover {
      background: var(--accent-primary);
      color: #020617;
    }

    .copy-btn.copied {
      background: var(--accent-success);
      border-color: var(--accent-success);
      color: white;
    }

    .footer {
      margin-top: 80px;
      text-align: center;
      color: var(--text-secondary);
      font-size: 0.85rem;
      border-top: 1px solid var(--card-border);
      padding-top: 40px;
      width: 100%;
    }

    @media (max-width: 600px) {
      h1 { font-size: 1.8rem; }
      .step-card { padding: 25px; }
      .prompt-content { font-size: 0.85rem; }
    }
  </style>
</head>
<body>

  <div class="container">
    <header>
      <h1>Content Planning Process</h1>
    </header>

    <div class="workflow">
      
      <!-- Field 1 -->
      <div class="step-card">
        <div class="label-group">
          <span class="step-label">Input #1</span>
          <span class="field-title">1. The Core Belief:</span>
        </div>
        <textarea id="in_belief" placeholder="Enter the Core Belief..." oninput="updatePrompt()"></textarea>
      </div>

      <!-- Field 2 -->
      <div class="step-card">
        <div class="label-group">
          <span class="step-label">Input #2</span>
          <span class="field-title">2. The Target Audience:</span>
        </div>
        <textarea id="in_audience" placeholder="Enter the Target Audience..." oninput="updatePrompt()"></textarea>
      </div>

      <!-- Field 3 -->
      <div class="step-card">
        <div class="label-group">
          <span class="step-label">Input #3</span>
          <span class="field-title">3. The Issue:</span>
        </div>
        <textarea id="in_issue" placeholder="Enter the Issue..." oninput="updatePrompt()"></textarea>
      </div>

      <!-- Field 4 -->
      <div class="step-card">
        <div class="label-group">
          <span class="step-label">Input #4</span>
          <span class="field-title">4. The Purpose of the Content:</span>
        </div>
        <textarea id="in_purpose" placeholder="Enter the Purpose of the Content..." oninput="updatePrompt()"></textarea>
      </div>

      <!-- Output Section -->
      <div class="prompt-output-card">
        <div class="label-group">
          <span class="step-label">Final Generation Prompt</span>
        </div>
        <div class="prompt-content" id="finalPrompt"></div>
        <button class="copy-btn" onclick="copyText('finalPrompt', this)">
          <span>Copy Full Prompt</span>
        </button>
      </div>

    </div>

    <footer class="footer">
      <p>Copyright &copy; <script>document.write(new Date().getFullYear())</script> Siva Prasad Mukherjee. All Rights Reserved.</p>
    </footer>
  </div>

  <script>
    const baseTemplate = `ROLE

You are a world-class Content Strategist, Consumer Psychologist, Brand Messaging Expert, Copywriter, and Content Marketing Consultant.

Your expertise lies in understanding how people's beliefs, emotions, motivations, and behaviors influence their decisions. You excel at transforming business goals, audience insights, and core beliefs into clear, persuasive, and strategically structured content.

Always think step by step. Each output should logically build upon the previous one.

---

BENGALI LOCALIZATION LAYER

Please write the output of the PROMPT below in the most spontaneous, natural-sounding modern conversational Bengali as spoken in Kolkata, West Bengal, India.

The writing should be easy for a 21-year-old to understand while maintaining high editorial quality, clarity, precision, and natural readability.

Strict Rules

- Reflect Kolkata conversational cadence through sentence rhythm and phrasing by using slightly formal, polite, and smoothly flowing sentence structures with balanced pacing. Avoid slang, regional grammar, overly literary wording, or awkward literal translations.
- Always use the formal "আপনি", never "তুমি".
- The tone should remain warm, conversational, approachable, confident, and quietly authoritative.
- Write as if speaking directly to one person in a natural face-to-face conversation.
- Do not translate literally. Rewrite naturally so the output feels as though it was originally written in Bengali.
- Preserve the original meaning, intent, emotional tone, and persuasive effect without adding, removing, or changing information.

---

The Proper Process

Please read and review the following inputs:

1. The Core Belief:
[The Core Belief]
2. The Target Audience:
[The Target Audience]
3. The Issue:
[The Issue]
4. The Purpose of the Content:
[The Purpose of the Content]
---

TASK

Based on the inputs above, complete the following steps in order. Treat each answer as the foundation for the next.

1. Analyze the Impact

What is the impact of the issue on the target audience?

---

2. Analyze the Audience's Reaction

How does the target audience typically think, feel, behave, or react as a result of the issue and its impact?

---

3. Identify the Desired Transformation

What transformation does the affected target audience ultimately want?

Also, summarize the transformation in the following format:

From: →

To: →

---

4. Identify the Primary Barrier

What misconception, limiting belief, knowledge gap, habit, or obstacle is preventing the target audience from achieving the desired transformation?

---

5. Recommend the Best Solution

Considering the target audience's current knowledge, limitations, and circumstances, what is the most effective solution to the issue?

---

6. Determine the Primary Content Angle

What should be the primary content angle that best achieves the Purpose of the Content while remaining aligned with the Core Belief and addressing the Issue?

---

7. Generate the Core Message

Use the following formula:

Core Message = Core Belief + Content Angle

Based on this formula, generate the core message that best fulfills the Purpose of the Content.

---

8. Recommend the Most Effective Pattern Interrupts

Which Pattern Interrupts would most effectively capture the target audience's attention while naturally leading them into the core message?

---

9. Generate the Hook

Use the following formula:

Hook = Pattern Interrupt + Core Message

Based on this formula, generate the most compelling hook that best fulfills the Purpose of the Content.

---

10. Select the Best Content Framework

Which content framework is most appropriate for achieving the Purpose of the Content while effectively communicating the core message?

Examples include (but are not limited to):

- Problem → Solution
- Problem → Insight → Action
- PAS (Problem → Agitation → Solution)
- AIDA
- Before → After → Bridge
- Story Framework
- Listicle
- Myth vs. Reality

Briefly explain why the selected framework is the best choice.

---

11. Create the Content Outline

Based on the selected framework, generate a clear, logical, and detailed outline that can be used to write the first draft of the content.

---

OUTPUT REQUIREMENTS

- Follow the steps sequentially. Do not skip any step.
- Each answer must logically build upon the previous one.
- Keep all outputs aligned with the Core Belief, Target Audience, Issue, and Purpose of the Content.
- Avoid generic advice. Tailor every answer specifically to the provided inputs.
- Be strategic, practical, and audience-centric throughout the entire process.`;

    function updatePrompt() {
      const belief = document.getElementById('in_belief').value || "[The Core Belief]";
      const audience = document.getElementById('in_audience').value || "[The Target Audience]";
      const issue = document.getElementById('in_issue').value || "[The Issue]";
      const purpose = document.getElementById('in_purpose').value || "[The Purpose of the Content]";
      
      let updated = baseTemplate;
      updated = updated.replace("[The Core Belief]", belief);
      updated = updated.replace("[The Target Audience]", audience);
      updated = updated.replace("[The Issue]", issue);
      updated = updated.replace("[The Purpose of the Content]", purpose);

      document.getElementById('finalPrompt').innerText = updated;
    }

    function copyText(id, btn) {
      const text = document.getElementById(id).innerText;
      navigator.clipboard.writeText(text).then(() => {
        const originalText = btn.innerHTML;
        btn.innerHTML = `<span>Copied to Clipboard!</span>`;
        btn.classList.add('copied');
        
        setTimeout(() => {
          btn.innerHTML = originalText;
          btn.classList.remove('copied');
        }, 2000);
      });
    }

    // Initialize display on page load
    updatePrompt();
  </script>
</body>
</html>
