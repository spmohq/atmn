<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Bengali Curated Newsletter System</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Source+Code+Pro:wght@400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-gradient-start: #020617;
      --bg-gradient-end: #0f172a;
      --card-bg: rgba(30, 41, 59, 0.4);
      --card-border: rgba(255, 255, 255, 0.08);
      --text-primary: #f8fafc;
      --text-secondary: #94a3b8;
      --accent-primary: #22d3ee;
      --accent-hover: #67e8f9;
      --accent-success: #10b981;
      --code-bg: rgba(0, 0, 0, 0.3);
      --shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.5);
      --input-bg: rgba(15, 23, 42, 0.6);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background: fixed linear-gradient(135deg, var(--bg-gradient-start), var(--bg-gradient-end));
      color: var(--text-primary);
      line-height: 1.6;
      padding: 60px 20px;
      min-height: 100vh;
    }

    .container {
      max-width: 1100px;
      margin: 0 auto;
    }

    header {
      text-align: center;
      margin-bottom: 40px;
    }

    h1 {
      font-size: 2.5rem;
      font-weight: 800;
      letter-spacing: -0.02em;
      color: #fff;
      margin-bottom: 10px;
      text-transform: uppercase;
    }

    .sub-header {
      color: var(--accent-primary);
      font-size: 1.1rem;
      font-weight: 600;
      letter-spacing: 0.05em;
    }

    .input-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 20px;
      margin-bottom: 40px;
    }

    .input-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .full-width {
      grid-column: span 2;
    }

    label {
      font-size: 0.75rem;
      font-weight: 800;
      text-transform: uppercase;
      color: var(--accent-primary);
      letter-spacing: 0.08em;
    }

    textarea {
      background: var(--input-bg);
      border: 1px solid var(--card-border);
      border-radius: 12px;
      padding: 12px;
      color: #fff;
      font-family: 'Inter', sans-serif;
      font-size: 0.9rem;
      resize: vertical;
      min-height: 80px;
      transition: all 0.3s;
      outline: none;
    }

    textarea:focus {
      border-color: var(--accent-primary);
      box-shadow: 0 0 0 2px rgba(34, 211, 238, 0.1);
    }

    .prompt-workflow {
      display: flex;
      flex-direction: column;
      gap: 30px;
    }

    .step-card {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 20px;
      padding: 30px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(12px);
    }

    .step-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }

    .step-label {
      font-weight: 800;
      font-size: 0.85rem;
      background: var(--accent-primary);
      color: #020617;
      padding: 4px 14px;
      border-radius: 6px;
      text-transform: uppercase;
    }

    .prompt-content {
      background: var(--code-bg);
      padding: 25px;
      border-radius: 12px;
      font-family: 'Source Code Pro', monospace;
      font-size: 0.95rem;
      color: #cbd5e1;
      white-space: pre-wrap;
      border: 1px solid rgba(255,255,255,0.05);
      margin-bottom: 20px;
      line-height: 1.5;
      max-height: 500px;
      overflow-y: auto;
    }

    .copy-btn {
      background: rgba(34, 211, 238, 0.1);
      color: var(--accent-primary);
      border: 1px solid var(--accent-primary);
      padding: 12px 28px;
      border-radius: 8px;
      font-weight: 700;
      font-size: 1rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      transition: all 0.2s;
      width: 100%;
    }

    .copy-btn:hover {
      background: var(--accent-primary);
      color: #020617;
    }

    .copy-btn.copied {
      background: var(--accent-success);
      border-color: var(--accent-success);
      color: white;
    }

    .footer {
      margin-top: 80px;
      text-align: center;
      color: var(--text-secondary);
      font-size: 0.85rem;
      border-top: 1px solid var(--card-border);
      padding-top: 40px;
    }

    @media (max-width: 850px) {
      .input-grid { grid-template-columns: 1fr; }
      .full-width { grid-column: span 1; }
      h1 { font-size: 1.8rem; }
    }
  </style>
</head>
<body>

  <div class="container">
    <header>
      <h1>Bengali Curated Newsletter</h1>
      <p class="sub-header">Synthesis & Curation Workflow</p>
    </header>

    <div class="input-grid">
      <div class="input-group">
        <label>Paste Source Here</label>
        <textarea id="val1" oninput="updatePrompts()"></textarea>
      </div>
      <div class="input-group">
        <label>Paste Multiple Source Insights Here</label>
        <textarea id="val2" oninput="updatePrompts()"></textarea>
      </div>
      <div class="input-group">
        <label>Paste Theme & Insights Here</label>
        <textarea id="val3" oninput="updatePrompts()"></textarea>
      </div>
      <div class="input-group">
        <label>Paste Blueprint Here</label>
        <textarea id="val4" oninput="updatePrompts()"></textarea>
      </div>
      <div class="input-group full-width">
        <label>Paste Newsletter Here</label>
        <textarea id="val5" oninput="updatePrompts()"></textarea>
      </div>
    </div>

    <div class="prompt-workflow">
      <!-- Prompt #1 -->
      <div class="step-card">
        <div class="step-header">
          <span class="step-label">Prompt #1: Source Intelligence Extractor</span>
        </div>
        <div class="prompt-content" id="p1_out"></div>
        <button class="copy-btn" onclick="copyText('p1_out', this)">
          <span>Copy Source Prompt</span>
        </button>
      </div>

      <!-- Prompt #2 -->
      <div class="step-card">
        <div class="step-header">
          <span class="step-label">Prompt #2: Pattern & Theme Synthesizer</span>
        </div>
        <div class="prompt-content" id="p2_out"></div>
        <button class="copy-btn" onclick="copyText('p2_out', this)">
          <span>Copy Synthesizer Prompt</span>
        </button>
      </div>

      <!-- Prompt #3 -->
      <div class="step-card">
        <div class="step-header">
          <span class="step-label">Prompt #3: Blueprint Builder</span>
        </div>
        <div class="prompt-content" id="p3_out"></div>
        <button class="copy-btn" onclick="copyText('p3_out', this)">
          <span>Copy Blueprint Prompt</span>
        </button>
      </div>

      <!-- Prompt #4 -->
      <div class="step-card">
        <div class="step-header">
          <span class="step-label">Prompt #4: Draft</span>
        </div>
        <div class="prompt-content" id="p4_out"></div>
        <button class="copy-btn" onclick="copyText('p4_out', this)">
          <span>Copy Draft Prompt</span>
        </button>
      </div>

      <!-- Prompt #5 -->
      <div class="step-card">
        <div class="step-header">
          <span class="step-label">Prompt #5: Finalize</span>
        </div>
        <div class="prompt-content" id="p5_out"></div>
        <button class="copy-btn" onclick="copyText('p5_out', this)">
          <span>Copy Finalize Prompt</span>
        </button>
      </div>
    </div>

    <footer class="footer">
      <p>Copyright &copy; <script>document.write(new Date().getFullYear())</script> Siva Prasad Mukherjee. All Rights Reserved.</p>
    </footer>
  </div>

  <script>
    function updatePrompts() {
      const source = document.getElementById('val1').value || "[PASTE SOURCE HERE]";
      const multipleInsights = document.getElementById('val2').value || "[PASTE MULTIPLE SOURCE INSIGHTS HERE]";
      const themeInsights = document.getElementById('val3').value || "[PASTE THEME & INSIGHTS HERE]";
      const blueprint = document.getElementById('val4').value || "[PASTE BLUEPRINT HERE]";
      const newsletterDraft = document.getElementById('val5').value || "[PASTE NEWSLETTER HERE]";

      // Prompt 1
      const prompt1 = `# Source Intelligence Extractor (Bengali Intellectual Curator Edition)

Act as a world-class researcher, educator, intellectual analyst, curator, essayist, and knowledge synthesizer.

I will provide a source such as:

- Article
- Research paper
- Study
- Video transcript
- Podcast transcript
- Report
- Book chapter
- Essay
- Notes
- Educational lesson

SOURCE

==================================================
${source}
==================================================

Your task is NOT to summarize the source.

Your task is to extract the most valuable ideas, observations, implications, lessons, and insights that would be useful for an intelligent Bengali-speaking audience.

OUTPUT FORMAT

1. Main Idea

What is the central idea of the source?

2. Key Insights

Identify the most important insights.

3. Important Observations

What observations deserve attention?

4. Hidden Implications

What consequences, patterns, or implications are not immediately obvious?

5. Why This Matters

Explain why the source matters.

6. Relevance For Bengali Audience

Explain why readers in Bengal or Bengali-speaking audiences should care.

7. Reflection Questions

Provide 3–5 thought-provoking questions.

8. Newsletter Potential

Explain how this source could contribute to a future newsletter issue.

LANGUAGE REQUIREMENTS

- Write entirely in Bengali (India).
- Use clear, elegant, intellectually rich Bengali.
- Focus on understanding and insight rather than summary.`;

      // Prompt 2
      const prompt2 = `Act as a world-class intellectual strategist, philosopher, educator, trend analyst, and curator.

I will provide insights extracted from multiple sources.

INPUT

==================================================
${multipleInsights}
==================================================

Your task is to identify:

- Patterns
- Themes
- Connections
- Contradictions
- Emerging ideas

Your goal is to discover the larger story hidden inside the sources.

OUTPUT FORMAT

1. Common Theme

What theme connects the sources?

2. Emerging Pattern

What larger pattern is becoming visible?

3. Important Contradictions

Where do the sources disagree?

4. Deeper Insight

What deeper truth emerges?

5. Bigger Lesson

What should readers learn?

6. Most Important Question

What question should readers think about?

7. Recommended Newsletter Angle

What should be the central theme of the newsletter issue?

8. Intellectual Significance

Why does this matter beyond the immediate topic?

LANGUAGE REQUIREMENTS

- Write entirely in Bengali (India).
- Prioritize insight, wisdom, and synthesis.
- Focus on meaning rather than information.`;

      // Prompt 3
      const prompt3 = `Act as a world-class newsletter strategist, editor, educator, essayist, and intellectual communicator.

I will provide a newsletter theme and supporting insights.

INPUT

==================================================
${themeInsights}
==================================================

Design a complete newsletter blueprint.

OUTPUT FORMAT

1. Newsletter Theme

2. Core Message

3. Why This Issue Matters

4. Newsletter Title Ideas

Generate 10 title options.

5. Opening Hook Options

Generate 5 opening hooks.

6. Recommended Newsletter Structure

For each section include:

- Section Purpose
- Key Idea
- Reader Takeaway

7. Source Integration Plan

Explain:

- Which source appears where
- Why it appears there
- How it supports the narrative

8. Commentary Opportunities

Identify places where the curator should add personal interpretation.

9. Reflection Section

Create questions for readers.

10. Closing Reflection

Provide a thoughtful ending.

LANGUAGE REQUIREMENTS

- Write entirely in Bengali (India).
- Focus on intellectual engagement.
- Avoid marketing language.`;

      // Prompt 4
      const prompt4 = `Act as an elite Bengali newsletter writer, essayist, educator, intellectual communicator, and long-form content creator.

I will provide a newsletter blueprint.

INPUT

==================================================
${blueprint}
==================================================

Write the complete newsletter.

GOALS

- Educate
- Clarify
- Engage
- Inspire reflection
- Connect ideas
- Reveal patterns
- Encourage deeper thinking

WRITING STYLE

- Natural Bengali (India)
- Elegant but accessible
- Conversational but thoughtful
- Intellectually rich
- Reader-friendly

STRUCTURE

- Compelling opening
- Clear progression of ideas
- Source insights integrated naturally
- Curator commentary
- Reflection opportunities
- Memorable conclusion

AVOID

- Marketing language
- Corporate tone
- Clickbait
- Empty motivation
- Excessive jargon

OUTPUT

Provide the complete newsletter ready for publication.

LANGUAGE REQUIREMENTS

- Entire output in Bengali (India).`;

      // Prompt 5
      const prompt5 = `Act as an elite Bengali editor, columnist, essayist, storyteller, intellectual communicator, and newsletter specialist.

I will provide a newsletter draft.

DRAFT

==================================================
${newsletterDraft}
==================================

Your task is to strengthen the newsletter without changing its meaning.

PRESERVE

- Core message
- Main arguments
- Key insights
- Conclusions
- Educational value

IMPROVE

- Readability
- Flow
- Clarity
- Engagement
- Curiosity
- Transitions
- Voice
- Personality
- Intellectual depth

MAKE IT FEEL

- More human
- More personal
- More thoughtful
- More conversational
- More reflective
- Less robotic

WHEN APPROPRIATE

Add:

- Personal observations
- Thoughtful transitions
- Reflective questions
- Cultural references familiar to Bengali readers
- Everyday examples

REMOVE

- Repetition
- Weak sections
- Filler
- Generic statements
- Unnecessary complexity

OUTPUT FORMAT

SECTION 1

Editorial Assessment

- Strengths
- Weaknesses
- Improvement Opportunities

SECTION 2

Enhanced Newsletter

Rewrite the newsletter in full.

SECTION 3

Voice Enhancement Summary

Explain the most important improvements.

LANGUAGE REQUIREMENTS

- Write entirely in Bengali (India).
- Sound like a thoughtful human sharing meaningful ideas with another thoughtful human.
- Prioritize authenticity, clarity, and intellectual engagement.`;

      document.getElementById('p1_out').innerText = prompt1;
      document.getElementById('p2_out').innerText = prompt2;
      document.getElementById('p3_out').innerText = prompt3;
      document.getElementById('p4_out').innerText = prompt4;
      document.getElementById('p5_out').innerText = prompt5;
    }

    function copyText(id, btn) {
      const text = document.getElementById(id).innerText;
      navigator.clipboard.writeText(text).then(() => {
        const originalText = btn.innerHTML;
        btn.innerHTML = `<span>Copied!</span>`;
        btn.classList.add('copied');
        
        setTimeout(() => {
          btn.innerHTML = originalText;
          btn.classList.remove('copied');
        }, 2000);
      });
    }

    // Initial setup
    updatePrompts();
  </script>
</body>
</html>
