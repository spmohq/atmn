<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Post Embedded Page Genie</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Source+Code+Pro:wght@400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-gradient-start: #020617;
      --bg-gradient-end: #0f172a;
      --card-bg: rgba(30, 41, 59, 0.4);
      --card-border: rgba(255, 255, 255, 0.08);
      --text-primary: #f8fafc;
      --text-secondary: #94a3b8;
      --accent-primary: #22d3ee;
      --accent-hover: #67e8f9;
      --accent-success: #10b981;
      --code-bg: rgba(0, 0, 0, 0.3);
      --shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.5);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background: fixed linear-gradient(135deg, var(--bg-gradient-start), var(--bg-gradient-end));
      color: var(--text-primary);
      line-height: 1.6;
      padding: 60px 20px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .container {
      max-width: 850px;
      width: 100%;
      margin: 0 auto;
    }

    header {
      text-align: center;
      margin-bottom: 40px;
    }

    h1 {
      font-size: 2rem;
      font-weight: 800;
      letter-spacing: -0.02em;
      color: #fff;
      text-transform: uppercase;
    }

    .workflow {
      display: flex;
      flex-direction: column;
      gap: 25px;
    }

    .step-card {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 24px;
      padding: 35px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(12px);
    }

    .label-container {
      margin-bottom: 15px;
    }

    .step-label {
      font-weight: 800;
      font-size: 0.75rem;
      background: var(--accent-primary);
      color: #020617;
      padding: 4px 12px;
      border-radius: 4px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    textarea {
      width: 100%;
      min-height: 120px;
      background: rgba(0, 0, 0, 0.2);
      border: 1px solid var(--card-border);
      border-radius: 12px;
      padding: 15px;
      color: var(--accent-primary);
      font-family: 'Source Code Pro', monospace;
      font-size: 0.9rem;
      margin-bottom: 10px;
      outline: none;
      resize: vertical;
    }

    textarea:focus {
      border-color: var(--accent-primary);
    }

    .prompt-content {
      background: var(--code-bg);
      padding: 25px;
      border-radius: 12px;
      font-family: 'Source Code Pro', monospace;
      font-size: 0.9rem;
      color: #cbd5e1;
      white-space: pre-wrap;
      border: 1px solid rgba(255,255,255,0.05);
      margin-bottom: 25px;
      max-height: 400px;
      overflow-y: auto;
      word-break: break-all;
    }

    .copy-btn {
      background: rgba(34, 211, 238, 0.1);
      color: var(--accent-primary);
      border: 1px solid var(--accent-primary);
      padding: 14px 32px;
      border-radius: 10px;
      font-weight: 700;
      font-size: 1rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
      width: 100%;
    }

    .copy-btn:hover {
      background: var(--accent-primary);
      color: #020617;
    }

    .copy-btn.copied {
      background: var(--accent-success);
      border-color: var(--accent-success);
      color: white;
    }

    .footer {
      margin-top: 60px;
      text-align: center;
      color: var(--text-secondary);
      font-size: 0.85rem;
      border-top: 1px solid var(--card-border);
      padding-top: 30px;
      width: 100%;
    }
  </style>
</head>
<body>

  <div class="container">
    <header>
      <h1>Post Embedded Page Genie</h1>
    </header>

    <div class="workflow">
      <!-- Input Section -->
      <div class="step-card">
        <div class="label-container">
          <span class="step-label">[IFRAME]</span>
        </div>
        <textarea id="dynamicInput" placeholder="Paste your Facebook Iframe code here..."></textarea>
      </div>

      <!-- Output Section -->
      <div class="step-card">
        <div class="label-container">
          <span class="step-label">Generated Prompt</span>
        </div>
        <div class="prompt-content" id="p1"></div>
        <button class="copy-btn" onclick="copyText('p1', this)">
          <span>Copy Prompt</span>
        </button>
      </div>
    </div>

    <footer class="footer">
      <p>Copyright &copy; <script>document.write(new Date().getFullYear())</script> Siva Prasad Mukherjee. All Rights Reserved.</p>
    </footer>
  </div>

  <script>
    // The raw template string
    const template = `<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Siva's Facebook Post</title>
  <link rel="icon" type="image/x-icon" href="spm.ico" />
  
  <!-- Google Fonts for Luxury Look -->
  <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&display=swap" rel="stylesheet">
  
  <script type='text/javascript' src='https://platform-api.sharethis.com/js/sharethis.js#property=68433345a7cb4a0019841b7c&product=sop' async='async'><\/script>

  <script src="https://ajax.googleapis.com/ajax/libs/jquery/2.2.0/jquery.min.js" type="text/javascript"><\/script>
  
  <!-- Security Scripts (Context Menu and Key Control) -->
  <script type="text/javascript"> 
      $(function () { $(this).bind("contextmenu", function (e) { e.preventDefault(); }); }); 
  <\/script>
  
  <script>
      document.onkeydown = function(e) {
          if (e.ctrlKey && (e.keyCode === 85 )) { return false; }
          if (e.keyCode === 123) { return false; }
      };
  <\/script>

  <style>
    :root {
      --gold: #C89B3C;
      --bronze: #8B5E1A;
      --ivory: #F8F4EC;
      --cream: #FFFDF8;
      --dark-brown: #35271A;
      --warm-neutral: #EFEAE0;
    }

    body {
      font-family: 'Hind Siliguri', sans-serif;
      margin: 0;
      padding: 0;
      background-color: var(--ivory);
      color: var(--dark-brown);
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
    }

    .header-container {
      width: 100%;
      max-width: 550px;
      padding: 30px 15px;
      text-align: center;
      box-sizing: border-box;
    }

    h2 {
      font-size: 1.5rem;
      color: var(--bronze);
      margin-bottom: 20px;
      font-weight: 700;
      letter-spacing: 0.5px;
    }

    .follow-button {
      display: inline-block;
      font-family: 'Hind Siliguri', sans-serif;
      font-weight: 700;
      font-size: 1.1rem;
      text-decoration: none;
      padding: 12px 35px;
      border-radius: 50px;
      cursor: pointer;
      transition: all 0.3s ease;
      background: linear-gradient(145deg, var(--gold), var(--bronze));
      color: white;
      border: none;
      box-shadow: 0 4px 15px rgba(139, 94, 26, 0.3);
      margin-bottom: 10px;
    }

    .follow-button:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(139, 94, 26, 0.4);
    }

    .helper-text {
      font-size: 0.85rem;
      color: var(--bronze);
      opacity: 0.8;
      margin-top: 5px;
      font-style: italic;
    }

    /* Luxury Frame for Facebook Embed */
    .fb-container {
      background: var(--cream);
      border-radius: 20px;
      padding: 15px;
      box-shadow: 0 10px 40px rgba(53, 39, 26, 0.1);
      border: 1px solid rgba(200, 155, 60, 0.2);
      width: 95%;
      max-width: 500px;
      margin: 20px auto;
      box-sizing: border-box;
    }

    .fb-embed-wrapper {
      position: relative;
      width: 100%;
      height: 0;
      padding-top: 130%; /* Balanced aspect ratio for most FB posts */
      overflow: hidden;
      border-radius: 12px;
    }

    .fb-embed-wrapper iframe {
      position: absolute;
      top: 0;
      left: 0;
      width: 100% !important;
      height: 100% !important;
      border: none;
      overflow: hidden;
    }

    /* Mobile adjustments */
    @media (max-width: 480px) {
      .header-container { padding: 20px 10px; }
      h2 { font-size: 1.3rem; }
      .follow-button { width: 80%; padding: 12px 10px; }
    }
  </style>
</head>
<body oncontextmenu="return false;" onselectstart="return false;" ondragstart="return false;">

  <div class="header-container">
    <h2>Siva's Facebook Post</h2>
    
    <button class="follow-button" onclick="openFacebookApp()">ফেসবুকে ফলো করুন</button>
    
    <p class="helper-text">(পুরো পোস্টটা পড়ার জন্যে ছবির উপরের ফেসবুক আইকনটায় ক্লিক করুন)</p>

    <!-- Content Card -->
    <div class="fb-container">
      <div class="fb-embed-wrapper" role="region" aria-label="Embedded Facebook post from Siva">
        [IFRAME]
      </div>
    </div>
  </div>

  <script>
    function openFacebookApp() {
      const pageId = "100026355202194"; 
      const fallbackUrl = "https://www.facebook.com/socjhq/"; 
      
      // Attempt to open in the Facebook app
      window.location = "fb://page/" + pageId;
      
      // Fallback to browser after delay
      setTimeout(() => {
        window.location.href = fallbackUrl;
      }, 1500);
    }
  <\/script> 

</body>
</html>`;

    const inputField = document.getElementById('dynamicInput');
    const outputDiv = document.getElementById('p1');

    function updatePrompt() {
      const userInput = inputField.value.trim();
      const displayValue = userInput || "[IFRAME]";
      
      // Using split/join to replace all occurrences without regex escaping issues
      const finalPrompt = template.split('[IFRAME]').join(displayValue);
      outputDiv.innerText = finalPrompt;
    }

    // Initial load
    updatePrompt();

    // Event listener for real-time update
    inputField.addEventListener('input', updatePrompt);

    // Copy function
    function copyText(id, btn) {
      const text = document.getElementById(id).innerText;
      navigator.clipboard.writeText(text).then(() => {
        const originalText = btn.innerHTML;
        btn.innerHTML = `<span>Copied to Clipboard!</span>`;
        btn.classList.add('copied');
        
        setTimeout(() => {
          btn.innerHTML = originalText;
          btn.classList.remove('copied');
        }, 2000);
      });
    }
  </script>
</body>
</html>
