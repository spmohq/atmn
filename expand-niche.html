<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Expand Niche | Content Strategist Genie</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Source+Code+Pro:wght@400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-gradient-start: #020617;
      --bg-gradient-end: #0f172a;
      --card-bg: rgba(30, 41, 59, 0.4);
      --card-border: rgba(255, 255, 255, 0.08);
      --text-primary: #f8fafc;
      --text-secondary: #94a3b8;
      --accent-primary: #22d3ee;
      --accent-hover: #67e8f9;
      --accent-success: #10b981;
      --code-bg: rgba(0, 0, 0, 0.3);
      --shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.5);
      --input-bg: rgba(15, 23, 42, 0.6);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background: fixed linear-gradient(135deg, var(--bg-gradient-start), var(--bg-gradient-end));
      color: var(--text-primary);
      line-height: 1.6;
      padding: 60px 20px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .container {
      max-width: 850px;
      width: 100%;
      margin: 0 auto;
    }

    header {
      text-align: center;
      margin-bottom: 50px;
    }

    h1 {
      font-size: 2.5rem;
      font-weight: 800;
      letter-spacing: -0.02em;
      color: #fff;
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    .workflow {
      display: flex;
      flex-direction: column;
      gap: 30px;
    }

    .step-card {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 24px;
      padding: 40px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(12px);
    }

    .label-group {
      margin-bottom: 15px;
    }

    .step-label {
      font-weight: 800;
      font-size: 0.75rem;
      background: var(--accent-primary);
      color: #020617;
      padding: 4px 12px;
      border-radius: 4px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      display: inline-block;
      margin-bottom: 10px;
    }

    textarea {
      width: 100%;
      min-height: 100px;
      background: var(--input-bg);
      border: 1px solid var(--card-border);
      border-radius: 12px;
      padding: 20px;
      color: var(--text-primary);
      font-family: 'Inter', sans-serif;
      font-size: 1.1rem;
      resize: vertical;
      outline: none;
      transition: all 0.3s;
    }

    textarea:focus {
      border-color: var(--accent-primary);
      background: rgba(15, 23, 42, 0.8);
    }

    .prompt-output-card {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 24px;
      padding: 40px;
      margin-top: 10px;
    }

    .prompt-content {
      background: var(--code-bg);
      padding: 30px;
      border-radius: 12px;
      font-family: 'Source Code Pro', monospace;
      font-size: 0.95rem;
      color: #cbd5e1;
      white-space: pre-wrap;
      border: 1px solid rgba(255,255,255,0.05);
      margin-bottom: 25px;
      line-height: 1.6;
      max-height: 600px;
      overflow-y: auto;
    }

    /* Custom scrollbar for output */
    .prompt-content::-webkit-scrollbar {
      width: 8px;
    }
    .prompt-content::-webkit-scrollbar-track {
      background: rgba(255, 255, 255, 0.02);
    }
    .prompt-content::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.1);
      border-radius: 4px;
    }

    .copy-btn {
      background: rgba(34, 211, 238, 0.1);
      color: var(--accent-primary);
      border: 1px solid var(--accent-primary);
      padding: 16px 32px;
      border-radius: 12px;
      font-weight: 700;
      font-size: 1.1rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      transition: all 0.2s;
      width: 100%;
    }

    .copy-btn:hover {
      background: var(--accent-primary);
      color: #020617;
    }

    .copy-btn.copied {
      background: var(--accent-success);
      border-color: var(--accent-success);
      color: white;
    }

    .footer {
      margin-top: 80px;
      text-align: center;
      color: var(--text-secondary);
      font-size: 0.85rem;
      border-top: 1px solid var(--card-border);
      padding-top: 40px;
      width: 100%;
    }

    @media (max-width: 600px) {
      h1 { font-size: 1.8rem; }
      .step-card { padding: 25px; }
      .prompt-content { font-size: 0.85rem; }
    }
  </style>
</head>
<body>

  <div class="container">
    <header>
      <h1>Expand Niche</h1>
    </header>

    <div class="workflow">
      
      <!-- Input Section -->
      <div class="step-card">
        <div class="label-group">
          <span class="step-label">Identify Business Niche</span>
        </div>
        <textarea id="nicheInput" placeholder="Enter Niche here (e.g., Organic Skincare, Personal Finance for Students, Pet Grooming...)" oninput="updatePrompt()"></textarea>
      </div>

      <!-- Output Section -->
      <div class="prompt-output-card">
        <div class="label-group">
          <span class="step-label">Generated Strategy Prompt</span>
        </div>
        <div class="prompt-content" id="finalPrompt"></div>
        <button class="copy-btn" onclick="copyText('finalPrompt', this)">
          <span>Copy Full Prompt</span>
        </button>
      </div>

    </div>

    <footer class="footer">
      <p>Copyright &copy; <script>document.write(new Date().getFullYear())</script> Siva Prasad Mukherjee. All Rights Reserved.</p>
    </footer>
  </div>

  <script>
    const baseTemplate = `ROLE

I want to build a business selling "[INSERT NICHE]" products.

My primary customer acquisition platform will be "Facebook", where I want to attract, educate, build trust, and convert potential customers into buyers.

Your role is to act as an experienced content strategist, consumer psychologist, and digital marketing consultant.

Create a complete content strategy for this business.

The objective is to build a long-term Facebook content ecosystem that naturally guides people from discovering their problems to purchasing products from my store.



Phase 1 — Understand the Market

1. Divide the Niche into Major Categories

Break the niche into its primary categories and subcategories.

2. Identify Customer Segments

List the major customer segments.

For each segment, describe:

- Who they are
- Their goals
- Their desires
- Their frustrations
- Their fears
- Their buying motivations



Phase 2 — Build the Problem Database

Instead of listing products, identify every significant problem customers experience.

For each problem, include:

- Why the problem occurs
- Common symptoms
- Common mistakes people make
- Desired outcome
- Emotional frustrations



Phase 3 — Build the Question Database

For every problem, list the questions customers commonly ask.

Include questions related to:

- Beginner knowledge
- Causes
- Prevention
- Product selection
- Product usage
- Safety
- Ingredients
- Comparisons
- Troubleshooting
- Maintenance
- Cost
- Results
- Expectations



Phase 4 — Build the Facebook Content System

For every problem, generate content ideas under the following categories.

Awareness

Help people recognize the problem.

Education

Explain the topic in simple language.

Myth vs Fact

Correct misinformation and common misconceptions.

Quick Tips

Share short, practical, actionable advice.

Ingredient Spotlight

Explain ingredients, technologies, materials, or important components.

Product Selection

Teach people how to choose the right product.

How To Use

Demonstrate the correct way to use products.

Comparison

Compare products, methods, ingredients, or approaches.

Frequently Asked Questions

Answer common customer questions.

Real Experiences

Share customer stories, before-and-after examples, testimonials, and case studies.

Product Showcase

Introduce products naturally by connecting them to the problems already discussed.



Phase 5 — Customer Journey

Map the content according to the customer journey.

Include content for each stage:

1. Problem Unaware
2. Problem Aware
3. Solution Aware
4. Product Aware
5. Ready to Buy
6. Existing Customer
7. Repeat Customer

Explain what type of content should be published at each stage.



Phase 6 — Weekly Publishing Workflow

Design a repeatable Facebook publishing system.

Include:

- Daily post types
- Weekly content mix
- Educational posts
- Storytelling posts
- Engagement posts
- Community posts
- Product posts
- Promotional posts



Phase 7 — Sales Funnel Integration

Explain how every content category supports the sales process.

Show how a reader naturally moves through the following journey:

Problem → Education → Trust → Solution → Product → Purchase → Loyalty → Referral



Phase 8 — Evergreen Content Library

Organize everything into a reusable content library.

Group the ideas into:

- Content Pillars
- Topic Clusters
- Subtopics

The goal is to create a system that can continuously generate new Facebook posts without repeating the same ideas.



Output Requirements

- Use Markdown headings.
- Organize everything hierarchically.
- Think strategically rather than producing random lists.
- Focus on education before promotion.
- Prioritize long-term trust over short-term sales.
- Make the strategy evergreen so it can be reused for years.
- Be comprehensive and detailed.
- Avoid generic advice. Tailor every recommendation specifically to the chosen niche.
Please write the answer in the most spontaneous and natural sounding modern, everyday conversational Bengali as spoken in Kolkata, West Bengal, India that can be understood by an 21 year old but contains the international standards of language.

Strict Rules:

Must subtly reflect Kolkata conversational cadence through sentence rhythm and phrasing by using slightly formal, polite, and smoothly flowing sentence structures, with balanced pacing and no abrupt or overly casual wording — without slang, regional grammar, or loss of conservative authority.

• Always use the formal “আপনি”, not the informal “তুমি.” The address is formal, but the tone should remain warm, conversational, and approachable.
• The voice should be bold, direct, also should feel like a close friend and a trusted authority, speaking one-on-one with the reader in a natural, face-to-face style.`;

    function updatePrompt() {
      const nicheValue = document.getElementById('nicheInput').value || "[INSERT NICHE]";
      
      // Global replace for [INSERT NICHE]
      let updated = baseTemplate.split('[INSERT NICHE]').join(nicheValue);

      document.getElementById('finalPrompt').innerText = updated;
    }

    function copyText(id, btn) {
      const text = document.getElementById(id).innerText;
      navigator.clipboard.writeText(text).then(() => {
        const originalText = btn.innerHTML;
        btn.innerHTML = `<span>Copied to Clipboard!</span>`;
        btn.classList.add('copied');
        
        setTimeout(() => {
          btn.innerHTML = originalText;
          btn.classList.remove('copied');
        }, 2000);
      });
    }

    // Initialize display on page load
    updatePrompt();
  </script>
</body>
</html>
