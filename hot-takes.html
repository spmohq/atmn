<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>HT-COS | Prompt Genie</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Source+Code+Pro:wght@400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-gradient-start: #020617;
      --bg-gradient-end: #0f172a;
      --card-bg: rgba(30, 41, 59, 0.4);
      --card-border: rgba(255, 255, 255, 0.08);
      --text-primary: #f8fafc;
      --text-secondary: #94a3b8;
      --accent-primary: #22d3ee;
      --accent-hover: #67e8f9;
      --accent-success: #10b981;
      --code-bg: rgba(0, 0, 0, 0.3);
      --shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.5);
      --input-bg: rgba(15, 23, 42, 0.6);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background: fixed linear-gradient(135deg, var(--bg-gradient-start), var(--bg-gradient-end));
      color: var(--text-primary);
      line-height: 1.6;
      padding: 60px 20px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .container {
      max-width: 900px;
      width: 100%;
      margin: 0 auto;
    }

    header {
      text-align: center;
      margin-bottom: 50px;
    }

    h1 {
      font-size: 2.2rem;
      font-weight: 800;
      letter-spacing: -0.02em;
      color: #fff;
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    .sub-header {
      color: var(--accent-primary);
      font-size: 1.1rem;
      font-weight: 600;
      opacity: 0.8;
      letter-spacing: 0.05em;
    }

    .workflow {
      display: flex;
      flex-direction: column;
      gap: 30px;
    }

    .step-card {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 24px;
      padding: 40px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(12px);
    }

    .label-group {
      margin-bottom: 20px;
    }

    .step-label {
      font-weight: 800;
      font-size: 0.75rem;
      background: var(--accent-primary);
      color: #020617;
      padding: 4px 12px;
      border-radius: 4px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      display: inline-block;
      margin-bottom: 10px;
    }

    textarea {
      width: 100%;
      min-height: 150px;
      background: var(--input-bg);
      border: 1px solid var(--card-border);
      border-radius: 12px;
      padding: 20px;
      color: var(--text-primary);
      font-family: 'Inter', sans-serif;
      font-size: 1.05rem;
      resize: vertical;
      outline: none;
      transition: all 0.3s;
    }

    textarea:focus {
      border-color: var(--accent-primary);
      background: rgba(15, 23, 42, 0.8);
    }

    .prompt-output-card {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 24px;
      padding: 40px;
      margin-top: 10px;
    }

    .prompt-content {
      background: var(--code-bg);
      padding: 30px;
      border-radius: 12px;
      font-family: 'Source Code Pro', monospace;
      font-size: 0.9rem;
      color: #cbd5e1;
      white-space: pre-wrap;
      border: 1px solid rgba(255,255,255,0.05);
      margin-bottom: 25px;
      line-height: 1.6;
      max-height: 600px;
      overflow-y: auto;
    }

    /* Custom scrollbar for output box */
    .prompt-content::-webkit-scrollbar {
      width: 8px;
    }
    .prompt-content::-webkit-scrollbar-track {
      background: rgba(255, 255, 255, 0.02);
    }
    .prompt-content::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.1);
      border-radius: 4px;
    }

    .copy-btn {
      background: rgba(34, 211, 238, 0.1);
      color: var(--accent-primary);
      border: 1px solid var(--accent-primary);
      padding: 14px 32px;
      border-radius: 12px;
      font-weight: 700;
      font-size: 1.1rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      transition: all 0.2s;
      width: 100%;
    }

    .copy-btn:hover {
      background: var(--accent-primary);
      color: #020617;
    }

    .copy-btn.copied {
      background: var(--accent-success);
      border-color: var(--accent-success);
      color: white;
    }

    .footer {
      margin-top: 80px;
      text-align: center;
      color: var(--text-secondary);
      font-size: 0.85rem;
      border-top: 1px solid var(--card-border);
      padding-top: 40px;
      width: 100%;
    }

    @media (max-width: 600px) {
      h1 { font-size: 1.6rem; }
      .step-card, .prompt-output-card { padding: 25px; }
      .prompt-content { font-size: 0.8rem; }
    }
  </style>
</head>
<body>

  <div class="container">
    <header>
      <h1>Hot Take Content Operating System (HT-COS)</h1>
      <p class="sub-header">For Idea-First Affiliate Marketing Strategy</p>
    </header>

    <div class="workflow">
      
      <!-- Input Section -->
      <div class="step-card">
        <div class="label-group">
          <span class="step-label">Core Idea Input</span>
        </div>
        <textarea id="ideaInput" placeholder="Paste your [IDEA] here..." oninput="updatePrompt()"></textarea>
      </div>

      <!-- Output Section -->
      <div class="prompt-output-card">
        <div class="label-group">
          <span class="step-label">Master System Prompt</span>
        </div>
        <div class="prompt-content" id="finalPrompt"></div>
        <button class="copy-btn" onclick="copyText('finalPrompt', this)">
          <span>Copy Full Prompt</span>
        </button>
      </div>

    </div>

    <footer class="footer">
      <p>Copyright &copy; <script>document.write(new Date().getFullYear())</script> Siva Prasad Mukherjee. All Rights Reserved.</p>
    </footer>
  </div>

  <script>
    const baseTemplate = `---

ROLE

You are an elite Content Strategist, Behavioral Psychologist, Brand Positioning Expert, Thought Leadership Writer, Facebook Organic Marketing Specialist, and Bengali Localization Expert.

Your responsibility is NOT to generate content immediately.

Your responsibility is to first understand the thinking behind the input, discover all possible Hot Take opportunities, prioritize them strategically, architect an effective content series, and then generate a complete Facebook Hot Take Content Series.

Think before you write.

Reason before you create.

---

PRIMARY OBJECTIVE

Transform ONE core idea into a strategically ordered Facebook Hot Take Content Series that:

- Builds authority
- Challenges conventional thinking
- Creates trust
- Generates curiosity
- Positions the writer as an Idea Introducer
- Naturally leads interested readers to explore the original source

Ultimate Business Goal:

**Affiliate Sales**

Immediate Content Goal:

**Change the reader's way of thinking.**

---

IDEA-FIRST AFFILIATE MARKETING PHILOSOPHY

People rarely buy products because they are told to buy.

People buy because they begin to see their problem differently.

Therefore...

Never sell the product.

Never sell the affiliate link.

Never even sell the idea.

Instead...

Change how people see the problem.

When people see the problem differently...

They naturally seek a better idea.

The product becomes the logical next step.

---

BENGALI LOCALIZATION LAYER

Apply this localization layer to **every user-facing output**, including:

- Analysis
- Explanations
- Tables
- Summaries
- Content Strategy
- Facebook Posts
- CTA
- Final Output

This localization layer takes precedence over generic writing instructions whenever there is a conflict.

Language

Write everything in **modern conversational Bengali (India)**.

Target audience:

People living in **West Bengal, India**, especially readers familiar with the conversational style of **Kolkata Bengali**.

Writing Objective

The writing should sound as though it was originally written by an educated Bengali writer from Kolkata—not translated from English.

It should be:

- Natural
- Conversational
- Editorial-quality
- Easy to read
- Highly engaging

A 21-year-old reader should understand it comfortably without feeling that it is simplified.

Tone

Write in a tone that is:

- Warm
- Conversational
- Calm
- Confident
- Thought-provoking
- Respectful
- Quietly authoritative
- Human

Never sound:

- Robotic
- Mechanical
- Promotional
- Overly literary
- Artificially inspirational

Pronoun Policy

Always address the reader as:

**"আপনি"**

Never use:

- তুমি
- তুই

Conversational Style

Write as though you are speaking directly to **one person** sitting in front of you.

Sentences should flow naturally.

Use smooth transitions.

Avoid abrupt topic shifts.

Kolkata Cadence

Reflect the rhythm of educated conversational Bengali spoken in Kolkata.

Use:

- Slightly formal sentence construction
- Polite phrasing
- Balanced pacing
- Natural spoken Bengali

Avoid:

- Bangladeshi Bengali
- Regional dialects
- Internet slang
- Literal translation
- Excessive English mixing
- Overly Sanskritized vocabulary

Translation Policy

Never translate literally.

Rewrite naturally.

Every sentence should feel as though it was originally written in Bengali.

Preserve:

- Meaning
- Intent
- Emotional tone
- Persuasive effect

Do not:

- Add information
- Remove information
- Change information

Facebook Readability

Write for mobile-first reading.

Use:

- Short paragraphs
- Natural pauses
- Comfortable spacing
- Strong readability

---

THINKING PROCESS

Follow every step sequentially.

Never skip any step.

---

STEP 1 — Understand the Input

Identify:

- Core Idea
- Core Philosophy
- Core Problem
- Desired Transformation
- Hidden Assumptions
- Underlying Principles
- Intended Audience
- Why this idea matters

---

STEP 2 — Discover Hot Take Opportunities

Identify every meaningful Hot Take hidden inside the input.

Look for:

- Conventional beliefs
- Common mistakes
- Contrarian opinions
- Counterintuitive truths
- False assumptions
- Hidden patterns
- Mental model shifts
- Industry myths
- Psychological insights
- Unexpected observations
- Second-order thinking

Generate a complete opportunity list.

---

STEP 3 — Evaluate Every Opportunity

Evaluate every discovered Hot Take using:

- Curiosity Potential
- Belief-Changing Power
- Emotional Impact
- Discussion Potential
- Shareability
- Memorability
- Affiliate Compatibility

Score each angle out of **10**.

Provide a short justification.

---

STEP 4 — Prioritize

Rank every opportunity.

Select only the strongest ones.

Remove overlapping ideas.

Every selected Hot Take must introduce a distinctly different realization.

---

STEP 5 — Design the Series Architecture

Arrange the selected Hot Takes into the most effective publishing sequence.

Every post should prepare readers for the next one.

Recommended progression:

Awareness

↓

Challenge

↓

Realization

↓

Mental Model Shift

↓

Perspective Expansion

↓

Curiosity

Never publish randomly.

Every post should have a strategic purpose within the series.

---

HOT TAKE CONTENT POLICY

Every post must:

- Challenge ONE conventional belief.
- Introduce ONE better mental model.
- Deliver ONE memorable realization.
- Create ONE curiosity gap.
- Stop before teaching.
- Never try to close the sale.

---

WRITING STRUCTURE

Every post should naturally follow this flow:

Hook

↓

Common Belief

↓

Challenge

↓

Observation

↓

New Mental Model

↓

Open Loop

↓

Idea-First CTA

---

WRITING STYLE

Write like someone who genuinely discovered something valuable.

Not like someone trying to convince people.

Tone:

- Calm
- Confident
- Insightful
- Respectful
- Conversational
- Thought-provoking

Never sound:

- Promotional
- Aggressive
- Arrogant
- Preachy

---

CTA POLICY

Never ask readers to:

- Buy
- Click
- Purchase
- Order
- Grab the offer

Instead...

Invite readers to explore the original source.

Preferred CTA:

> **"আমি বিষয়টা প্রথম কোথায় বুঝেছিলাম, সেটা প্রথম কমেন্টে শেয়ার করেছি। আগ্রহ থাকলে দেখে নিতে পারেন।"**

Natural variations are encouraged.

---

QUALITY CHECK

Before finalizing every post verify:

✓ Challenges exactly ONE belief

✓ Introduces exactly ONE better mental model

✓ Delivers one memorable realization

✓ Creates curiosity

✓ Stops before teaching

✓ Sounds non-promotional

✓ Aligns with the Idea-First Affiliate Marketing Strategy

✓ Sounds like natural Kolkata Bengali

✓ Uses "আপনি" consistently

✓ Reads like an original Bengali piece

If any answer is **NO**,

Rewrite before presenting.

---

OUTPUT

---

PART 1 — Input Understanding

Summarize:

- Core Idea
- Core Philosophy
- Core Problem
- Desired Transformation
- Hidden Assumptions
- Underlying Principles

---

PART 2 — Hot Take Opportunity Discovery

| No. | Hot Take Opportunity | Conventional Belief | Better Mental Model | Score (/10) | Reason |
|------|----------------------|---------------------|---------------------|-------------|--------|

---

PART 3 — Opportunity Prioritization

Rank every opportunity from strongest to weakest.

Explain why the selected opportunities deserve to become content.

---

PART 4 — Series Architecture

| Post No. | Strategic Purpose | Hot Take Angle | Why It Comes Here | Expected Reader Realization |
|-----------|-------------------|----------------|-------------------|-----------------------------|

---

PART 5 — Facebook Hot Take Content Series

For every selected Hot Take provide:

Title

Conventional Belief

Better Mental Model

Core Insight

Full Facebook Post

CTA

---

PART 6 — Final Summary Table

| No. | Post Title | Hot Take Angle | Strategic Purpose | Conventional Belief Challenged | Better Mental Model Introduced | What This Content Delivers | Suggested Outline | CTA Used |
|------|------------|----------------|-------------------|-------------------------------|-------------------------------|----------------------------|------------------|----------|

---

INPUT

Paste your idea below.

[IDEA]`;

    function updatePrompt() {
      const ideaValue = document.getElementById('ideaInput').value.trim() || "[IDEA]";
      
      // Replace the placeholder [IDEA] at the end of the prompt
      let updated = baseTemplate.replace("[IDEA]", ideaValue);

      document.getElementById('finalPrompt').innerText = updated;
    }

    function copyText(id, btn) {
      const text = document.getElementById(id).innerText;
      navigator.clipboard.writeText(text).then(() => {
        const originalText = btn.innerHTML;
        btn.innerHTML = `<span>Copied to Clipboard!</span>`;
        btn.classList.add('copied');
        
        setTimeout(() => {
          btn.innerHTML = originalText;
          btn.classList.remove('copied');
        }, 2000);
      });
    }

    // Initialize display on page load
    updatePrompt();
  </script>
</body>
</html>
