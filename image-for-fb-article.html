<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Image for Facebook Article - Genie</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Source+Code+Pro:wght@400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-gradient-start: #020617;
      --bg-gradient-end: #0f172a;
      --card-bg: rgba(30, 41, 59, 0.4);
      --card-border: rgba(255, 255, 255, 0.08);
      --text-primary: #f8fafc;
      --text-secondary: #94a3b8;
      --accent-primary: #22d3ee;
      --accent-hover: #67e8f9;
      --accent-success: #10b981;
      --code-bg: rgba(0, 0, 0, 0.3);
      --shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.5);
      --input-bg: rgba(15, 23, 42, 0.6);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background: fixed linear-gradient(135deg, var(--bg-gradient-start), var(--bg-gradient-end));
      color: var(--text-primary);
      line-height: 1.6;
      padding: 60px 20px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .container {
      max-width: 800px;
      width: 100%;
      margin: 0 auto;
    }

    header {
      text-align: center;
      margin-bottom: 50px;
    }

    h1 {
      font-size: 2.2rem;
      font-weight: 800;
      letter-spacing: -0.02em;
      color: #fff;
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    .workflow {
      display: flex;
      flex-direction: column;
      gap: 30px;
    }

    .step-card {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 24px;
      padding: 40px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(12px);
    }

    .step-header {
      display: flex;
      justify-content: flex-start;
      margin-bottom: 20px;
    }

    .step-label {
      font-weight: 800;
      font-size: 0.75rem;
      background: var(--accent-primary);
      color: #020617;
      padding: 4px 12px;
      border-radius: 4px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    textarea {
      width: 100%;
      min-height: 120px;
      background: var(--input-bg);
      border: 1px solid var(--card-border);
      border-radius: 12px;
      padding: 20px;
      color: var(--text-primary);
      font-family: 'Inter', sans-serif;
      font-size: 1rem;
      resize: vertical;
      outline: none;
      transition: all 0.3s;
      margin-bottom: 10px;
    }

    textarea:focus {
      border-color: var(--accent-primary);
      background: rgba(15, 23, 42, 0.8);
    }

    .prompt-content {
      background: var(--code-bg);
      padding: 30px;
      border-radius: 12px;
      font-family: 'Source Code Pro', monospace;
      font-size: 0.9rem;
      color: #cbd5e1;
      white-space: pre-wrap;
      border: 1px solid rgba(255,255,255,0.05);
      margin-bottom: 25px;
      line-height: 1.6;
      max-height: 500px;
      overflow-y: auto;
    }

    .copy-btn {
      background: rgba(34, 211, 238, 0.1);
      color: var(--accent-primary);
      border: 1px solid var(--accent-primary);
      padding: 14px 32px;
      border-radius: 10px;
      font-weight: 700;
      font-size: 1rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      transition: all 0.2s;
      width: 100%;
    }

    .copy-btn:hover {
      background: var(--accent-primary);
      color: #020617;
    }

    .copy-btn.copied {
      background: var(--accent-success);
      border-color: var(--accent-success);
      color: white;
    }

    .footer {
      margin-top: 80px;
      text-align: center;
      color: var(--text-secondary);
      font-size: 0.85rem;
      border-top: 1px solid var(--card-border);
      padding-top: 40px;
      width: 100%;
    }

    @media (max-width: 600px) {
      h1 { font-size: 1.6rem; }
      .step-card { padding: 25px; }
      .prompt-content { font-size: 0.85rem; }
    }
  </style>
</head>
<body>

  <div class="container">
    <header>
      <h1>Image for Facebook Article</h1>
    </header>

    <div class="workflow">
      <!-- Input Section -->
      <div class="step-card">
        <div class="step-header">
          <span class="step-label">Content Input</span>
        </div>
        <textarea id="quoteInput" placeholder="Enter your {{QUOTE}} here..." oninput="updatePrompt()"></textarea>
      </div>

      <!-- Output Section -->
      <div class="step-card">
        <div class="step-header">
          <span class="step-label">Generated Prompt</span>
        </div>
        <div class="prompt-content" id="promptDisplay"></div>
        <button class="copy-btn" onclick="copyText('promptDisplay', this)">
          <span>Copy Full Prompt</span>
        </button>
      </div>
    </div>

    <footer class="footer">
      <p>Copyright &copy; <script>document.write(new Date().getFullYear())</script> Siva Prasad Mukherjee. All Rights Reserved.</p>
    </footer>
  </div>

  <script>
    const basePrompt = `ROLE

You are an award-winning Botanical Photographer, Luxury Creative Director, Editorial Designer, and Typography Expert.

TASK

Create a premium square (1:1) Facebook quote artwork using ONLY the flower from the uploaded image.

Flower Fidelity

The uploaded image is the botanical source.

Use the exact flower from the uploaded image.

Preserve its species, petals, colors, textures, stem, leaves, natural imperfections, and overall appearance exactly. Do not replace, redesign, stylize, or modify the flower in any way.

The flower must look as if it was professionally photographed with a high-end full-frame camera and premium macro lens.

Composition

Create a clean, elegant editorial composition.

Position the flower naturally and leave generous negative space for typography.

The overall layout should feel balanced, sophisticated, and suitable for a premium Facebook post.

Background

Generate a luxurious background that complements the flower.

Choose the background colour dynamically based on the flower so the overall composition feels classy, elegant, and harmonious.

Use soft cinematic bokeh, natural depth of field, subtle gradients, and premium lighting.

Typography

Display the following quote exactly as provided.

Do NOT use quotation marks.

Use an elegant Bengali serif font with premium editorial styling.

Maintain excellent readability and visual hierarchy.

Quote

{{QUOTE}}

Signature

— শিবপ্রসাদ মুখার্জি

Style

Luxury

Minimal

Glossy

Editorial

Timeless

Photorealistic

Ultra-realistic botanical photography

Premium advertising quality

Output

Square (1:1)

8K quality

Glossy finish

Professional colour grading

Balanced composition

Classy colour combination

Museum-quality botanical photography

Facebook-ready premium quote artwork`;

    function updatePrompt() {
      const input = document.getElementById('quoteInput').value;
      const display = document.getElementById('promptDisplay');
      
      // If input is empty, show the placeholder version
      const finalValue = input.trim() || "{{QUOTE}}";
      display.innerText = basePrompt.replace("{{QUOTE}}", finalValue);
    }

    function copyText(id, btn) {
      const text = document.getElementById(id).innerText;
      navigator.clipboard.writeText(text).then(() => {
        const originalText = btn.innerHTML;
        btn.innerHTML = `<span>Copied to Clipboard!</span>`;
        btn.classList.add('copied');
        
        setTimeout(() => {
          btn.innerHTML = originalText;
          btn.classList.remove('copied');
        }, 2000);
      });
    }

    // Initialize with default state
    updatePrompt();
  </script>
</body>
</html>
