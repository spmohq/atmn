<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SivaStudio | 1024x1536 Pro Poster Designer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Hind+Siliguri:wght@400;700&family=Montserrat:wght@700;900&family=Noto+Serif+Bengali:wght@400;700&family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #00D1FF; /* Updated to a Neon Blue for this version */
            --bg-app: #050505;
            --bg-card: #121212;
            --text-main: #e0e0e0;
            --border: #222;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Poppins', 'Hind Siliguri', sans-serif; }
        body { background-color: var(--bg-app); color: var(--text-main); height: 100vh; overflow: hidden; display: flex; flex-direction: column; }

        header {
            background: #000;
            padding: 0 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
            height: 60px;
        }

        .logo-brand { font-weight: 900; color: var(--primary); font-size: 1.2rem; letter-spacing: 1px; }
        .logo-brand span { color: #fff; opacity: 0.7; font-weight: 300; font-size: 0.8rem; margin-left: 5px; }

        main { display: grid; grid-template-columns: 320px 1fr 320px; height: calc(100vh - 60px); overflow: hidden; }

        .sidebar { background: var(--bg-card); overflow-y: auto; padding: 15px; border-right: 1px solid var(--border); }
        .sidebar-right { border-right: none; border-left: 1px solid var(--border); }

        .section-title {
            font-size: 0.7rem; font-weight: 700; text-transform: uppercase; color: var(--primary);
            border-bottom: 1px solid #333; padding-bottom: 5px; margin: 15px 0 10px 0;
            display: flex; justify-content: space-between; align-items: center;
        }

        .control-group { background: #1a1a1a; border: 1px solid #282828; padding: 12px; border-radius: 8px; margin-bottom: 10px; }
        label { font-size: 0.6rem; color: #888; text-transform: uppercase; margin-bottom: 5px; display: block; }
        
        input[type="text"], select {
            width: 100%; padding: 8px; border: 1px solid #333; background: #000; color: #fff;
            border-radius: 5px; font-size: 0.8rem; margin-bottom: 8px; outline: none;
        }

        .slider-row { display: flex; flex-direction: column; margin-bottom: 8px; }
        .slider-row span { font-size: 0.6rem; color: #666; display: flex; justify-content: space-between; }

        input[type="range"] { accent-color: var(--primary); height: 4px; cursor: pointer; width: 100%; margin: 6px 0;}

        .canvas-container { 
            display: flex; align-items: center; justify-content: center; 
            padding: 30px; background: #080808; overflow: hidden; position: relative;
            background-image: radial-gradient(#1a1a1a 1px, transparent 1px);
            background-size: 30px 30px;
        }
        
        #pin-canvas { 
            max-width: 100%; max-height: 100%; 
            aspect-ratio: 1024 / 1536;
            background: #fff; box-shadow: 0 0 50px rgba(0,0,0,0.8); 
            cursor: crosshair; 
        }

        .btn { padding: 8px 16px; border-radius: 5px; font-weight: 600; cursor: pointer; border: none; font-size: 0.75rem; transition: 0.2s; }
        .btn-primary { background: var(--primary); color: #000; }
        .btn-primary:hover { opacity: 0.9; transform: translateY(-1px); }
        .btn-outline { background: transparent; border: 1px solid #444; color: #eee; }
        .btn-danger { background: #331111; color: #ff5555; font-size: 0.6rem; padding: 4px 8px; border-radius: 3px; }

        .para-item { border-left: 3px solid var(--primary); padding: 8px; background: #0c0c0c; margin-bottom: 10px; border-radius: 0 5px 5px 0; }
        .align-group { display: flex; gap: 2px; margin-top: 5px; }
        .align-btn { flex: 1; background: #222; border: 1px solid #333; color: #fff; font-size: 0.65rem; padding: 5px; cursor: pointer; }
        .align-btn.active { background: var(--primary); color: #000; }

        .palette { display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px; }
        .color-swatch { width: 100%; height: 25px; border-radius: 4px; cursor: pointer; border: 1px solid rgba(255,255,255,0.1); }

        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }

        @media (max-width: 1100px) {
            main { grid-template-columns: 250px 1fr 250px; }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo-brand">SivaStudio <span>1024x1536 PRO</span></div>
        <div style="display: flex; gap: 10px;">
            <button class="btn btn-outline" onclick="document.getElementById('bg-upload').click()">Upload Background</button>
            <button class="btn btn-primary" onclick="exportDesign()">Export 1024x1536</button>
        </div>
    </header>

    <main>
        <!-- Left Sidebar: Content -->
        <aside class="sidebar">
            <div class="section-title">Headline Properties</div>
            <div class="control-group">
                <input type="text" value="DESIGN YOUR VISION" oninput="update('headline', this.value)">
                <div class="slider-row">
                    <span>Size <small id="val-headsize">120</small></span>
                    <input type="range" min="40" max="300" value="120" oninput="update('headlineSize', parseInt(this.value)); document.getElementById('val-headsize').innerText=this.value">
                </div>
                <div class="slider-row">
                    <span>Box Width</span>
                    <input type="range" min="200" max="1000" value="900" oninput="update('headlineW', parseInt(this.value))">
                </div>
            </div>

            <div class="section-title">Body Paragraphs <button class="btn-primary" style="padding: 2px 8px; font-size: 0.6rem" onclick="addParagraph()">+ ADD</button></div>
            <div id="para-list"></div>

            <div class="section-title">Footer Branding</div>
            <div class="control-group">
                <input type="text" value="WWW.SIVASTUDIO.PRO" oninput="update('brand', this.value)">
                <div class="slider-row"><span>Size</span><input type="range" min="15" max="100" value="40" oninput="update('brandSize', parseInt(this.value))"></div>
            </div>
        </aside>

        <!-- Preview -->
        <div class="canvas-container">
            <canvas id="pin-canvas" width="1024" height="1536"></canvas>
            <input type="file" id="bg-upload" hidden accept="image/*" onchange="uploadImg(event, 'bgImage')">
        </div>

        <!-- Right Sidebar: Style -->
        <aside class="sidebar sidebar-right">
            <div class="section-title">Logo & Identity</div>
            <div class="control-group">
                <button class="btn btn-outline" style="width:100%; margin-bottom:10px;" onclick="document.getElementById('logo-upload').click()">Upload Logo</button>
                <input type="file" id="logo-upload" hidden accept="image/*" onchange="uploadImg(event, 'logoImage')">
                <div class="slider-row"><span>Logo Size</span><input type="range" min="50" max="500" value="180" oninput="update('logoW', parseInt(this.value))"></div>
                <label style="display:flex; align-items:center; gap:8px;"><input type="checkbox" onchange="update('logoRound', this.checked)"> Enable Circular Crop</label>
            </div>

            <div class="section-title">Overlay Banners</div>
            <div class="control-group">
                <label><input type="checkbox" checked onchange="toggleB('header', this.checked)"> Header Overlay</label>
                <input type="range" min="50" max="500" value="180" oninput="updateB('header', 'h', parseInt(this.value))">
                
                <label style="margin-top:10px;"><input type="checkbox" checked onchange="toggleB('middle', this.checked)"> Text Backdrop (Middle)</label>
                <div class="slider-row"><span>Height</span><input type="range" min="100" max="1000" value="450" oninput="updateB('middle', 'h', parseInt(this.value))"></div>
                <div class="slider-row"><span>Width</span><input type="range" min="100" max="1024" value="920" oninput="updateB('middle', 'w', parseInt(this.value))"></div>
                
                <label style="margin-top:10px;"><input type="checkbox" checked onchange="toggleB('footer', this.checked)"> Footer Overlay</label>
                <input type="range" min="50" max="500" value="150" oninput="updateB('footer', 'h', parseInt(this.value))">
            </div>

            <div class="section-title">Visual Styling</div>
            <div class="control-group">
                <label>Typography</label>
                <select onchange="update('fontFamily', this.value)">
                    <option value="Montserrat">Montserrat (Bold)</option>
                    <option value="Bebas Neue">Bebas Neue</option>
                    <option value="Hind Siliguri">Hind Siliguri</option>
                    <option value="Noto Serif Bengali">Noto Serif</option>
                    <option value="Poppins">Poppins</option>
                </select>
                
                <label>Accent Color</label>
                <div class="palette" id="accent-palette"></div>
                
                <label style="margin-top:10px;">Text Color</label>
                <input type="color" value="#ffffff" oninput="update('textColor', this.value)" style="width:100%; height:30px; border:none; background:none;">

                <div class="slider-row" style="margin-top:10px;">
                    <span>Background Dim</span>
                    <input type="range" min="0" max="100" value="50" oninput="update('overlayOpacity', this.value/100)">
                </div>
            </div>

            <div class="section-title">Alignment Tools</div>
            <div class="control-group">
                <label style="display:flex; align-items:center; gap:8px; color:#00ffff;"><input type="checkbox" onchange="updateG('vActive', this.checked)"> Vertical Guide</label>
                <label style="display:flex; align-items:center; gap:8px; color:#00ffff;"><input type="checkbox" onchange="updateG('hActive', this.checked)"> Horizontal Guide</label>
            </div>
        </aside>
    </main>

    <script>
        // State management for 1024x1536
        let state = {
            canvasW: 1024, canvasH: 1536,
            headline: "DESIGN YOUR VISION", headlineX: 512, headlineY: 450, headlineSize: 120, headlineW: 900,
            brand: "WWW.SIVASTUDIO.PRO", brandX: 512, brandY: 1450, brandSize: 40,
            paragraphs: [{ id: 1, text: "Create high-resolution portrait designs instantly with professional layouts.", x: 512, y: 800, size: 50, align: 'center', w: 850 }],
            banners: {
                header: { active: true, h: 180, opacity: 0.9 },
                middle: { active: true, x: 512, y: 800, w: 920, h: 450, opacity: 0.8 },
                footer: { active: true, h: 150, opacity: 0.9 }
            },
            guides: { vActive: false, vPos: 512, hActive: false, hPos: 768 },
            accentColor: '#00D1FF', textColor: '#ffffff', overlayOpacity: 0.5,
            fontFamily: 'Montserrat', bgImage: null,
            logoImage: null, logoX: 512, logoY: 220, logoW: 180, logoRound: false
        };

        const canvas = document.getElementById('pin-canvas');
        const ctx = canvas.getContext('2d');
        let dragTarget = null, startX, startY, hitZones = [];

        const COLOR_LIST = ['#00D1FF', '#FF0055', '#00FF88', '#FFCC00', '#6C5CE7', '#ffffff', '#000000', '#222222', '#444444', '#888888'];

        window.onload = () => {
            const palette = document.getElementById('accent-palette');
            COLOR_LIST.forEach(c => {
                const d = document.createElement('div');
                d.className = 'color-swatch'; d.style.backgroundColor = c;
                d.onclick = () => update('accentColor', c);
                palette.appendChild(d);
            });
            initDrag();
            refreshParaUI();
            render();
        };

        function update(k, v) { state[k] = v; render(); }
        function updateG(k, v) { state.guides[k] = v; render(); }
        function toggleB(t, v) { state.banners[t].active = v; render(); }
        function updateB(t, p, v) { state.banners[t][p] = v; render(); }

        function addParagraph() {
            state.paragraphs.push({ id: Date.now(), text: "New text line...", x: 512, y: 1000, size: 40, align: 'center', w: 800 });
            refreshParaUI(); render();
        }

        function removePara(id) {
            state.paragraphs = state.paragraphs.filter(p => p.id !== id);
            refreshParaUI(); render();
        }

        function updatePara(id, k, v) {
            const p = state.paragraphs.find(x => x.id === id);
            if(p) p[k] = v; render();
        }

        function refreshParaUI() {
            const container = document.getElementById('para-list');
            container.innerHTML = '';
            state.paragraphs.forEach(p => {
                const div = document.createElement('div');
                div.className = 'para-item';
                div.innerHTML = `
                    <div style="display:flex; gap:5px; margin-bottom:8px">
                        <input type="text" value="${p.text}" oninput="updatePara(${p.id}, 'text', this.value)" style="margin:0">
                        <button class="btn-danger" onclick="removePara(${p.id})">✕</button>
                    </div>
                    <div class="slider-row"><span>Size</span><input type="range" min="15" max="120" value="${p.size}" oninput="updatePara(${p.id}, 'size', parseInt(this.value))"></div>
                    <div class="align-group">
                        <button class="align-btn ${p.align==='left'?'active':''}" onclick="updatePara(${p.id}, 'align', 'left')">Left</button>
                        <button class="align-btn ${p.align==='center'?'active':''}" onclick="updatePara(${p.id}, 'align', 'center')">Center</button>
                        <button class="align-btn ${p.align==='right'?'active':''}" onclick="updatePara(${p.id}, 'align', 'right')">Right</button>
                    </div>
                `;
                container.appendChild(div);
            });
        }

        function render() {
            const w = state.canvasW, h = state.canvasH;
            ctx.clearRect(0, 0, w, h);
            hitZones = [];

            // Background
            if (state.bgImage) {
                const r = state.bgImage.width / state.bgImage.height, cr = w/h;
                let sx, sy, sw, sh;
                if (r > cr) { sh = state.bgImage.height; sw = sh * cr; sx = (state.bgImage.width - sw)/2; sy = 0; }
                else { sw = state.bgImage.width; sh = sw/cr; sx = 0; sy = (state.bgImage.height - sh)/2; }
                ctx.drawImage(state.bgImage, sx, sy, sw, sh, 0, 0, w, h);
            } else {
                ctx.fillStyle = '#111'; ctx.fillRect(0,0,w,h);
            }

            // Global Overlay
            ctx.fillStyle = `rgba(0,0,0,${state.overlayOpacity})`;
            ctx.fillRect(0, 0, w, h);

            // Banners
            if (state.banners.header.active) {
                ctx.fillStyle = state.accentColor; ctx.globalAlpha = state.banners.header.opacity;
                ctx.fillRect(0, 0, w, state.banners.header.h); ctx.globalAlpha = 1;
            }
            if (state.banners.footer.active) {
                ctx.fillStyle = state.accentColor; ctx.globalAlpha = state.banners.footer.opacity;
                ctx.fillRect(0, h - state.banners.footer.h, w, state.banners.footer.h); ctx.globalAlpha = 1;
            }
            if (state.banners.middle.active) {
                const b = state.banners.middle;
                ctx.fillStyle = state.accentColor; ctx.globalAlpha = b.opacity;
                const bx = b.x - b.w/2, by = b.y - b.h/2;
                ctx.fillRect(bx, by, b.w, b.h); ctx.globalAlpha = 1;
                hitZones.push({ id: 'banner-middle', x: bx, y: by, w: b.w, h: b.h });
            }

            // Logo
            if (state.logoImage) {
                const asp = state.logoImage.height / state.logoImage.width;
                const lH = state.logoW * asp;
                const lx = state.logoX - state.logoW/2, ly = state.logoY - lH/2;
                ctx.save();
                if(state.logoRound) { ctx.beginPath(); ctx.arc(state.logoX, state.logoY, state.logoW/2, 0, Math.PI*2); ctx.clip(); }
                ctx.drawImage(state.logoImage, lx, ly, state.logoW, lH);
                ctx.restore();
                hitZones.push({ id: 'logo', x: lx, y: ly, w: state.logoW, h: lH });
            }

            // Guides
            if (state.guides.vActive) {
                ctx.strokeStyle = '#00ffff'; ctx.lineWidth = 2; ctx.beginPath();
                ctx.moveTo(state.guides.vPos, 0); ctx.lineTo(state.guides.vPos, h); ctx.stroke();
                hitZones.push({ id: 'guide-v', x: state.guides.vPos - 25, y: 0, w: 50, h: h });
            }
            if (state.guides.hActive) {
                ctx.strokeStyle = '#00ffff'; ctx.lineWidth = 2; ctx.beginPath();
                ctx.moveTo(0, state.guides.hPos); ctx.lineTo(w, state.guides.hPos); ctx.stroke();
                hitZones.push({ id: 'guide-h', x: 0, y: state.guides.hPos - 25, w: w, h: 50 });
            }

            // Text Elements
            ctx.fillStyle = state.textColor; ctx.textBaseline = 'middle';
            
            // Headline
            ctx.textAlign = 'center'; ctx.font = `900 ${state.headlineSize}px '${state.fontFamily}'`;
            hitZones.push({ id: 'headline', ...drawWrapped(state.headline, state.headlineX, state.headlineY, state.headlineW, state.headlineSize*1.2, 'center') });

            // Paragraphs
            state.paragraphs.forEach(p => {
                ctx.textAlign = p.align; ctx.font = `400 ${p.size}px '${state.fontFamily}'`;
                hitZones.push({ id: `para-${p.id}`, ...drawWrapped(p.text, p.x, p.y, p.w, p.size*1.4, p.align) });
            });

            // Brand
            ctx.textAlign = 'center'; ctx.font = `700 ${state.brandSize}px '${state.fontFamily}'`;
            hitZones.push({ id: 'brand', ...drawWrapped(state.brand, state.brandX, state.brandY, 1000, state.brandSize*1.2, 'center') });
        }

        function drawWrapped(text, x, y, maxW, lineH, align) {
            const words = text.split(' '), lines = []; let curr = '';
            for (let n = 0; n < words.length; n++) {
                let test = curr + words[n] + ' ';
                if (ctx.measureText(test).width > maxW && n > 0) { lines.push(curr); curr = words[n] + ' '; }
                else curr = test;
            }
            lines.push(curr);
            let startY = y - ((lines.length - 1) * lineH) / 2;
            const topY = startY;
            lines.forEach(l => {
                let dx = x;
                if(align === 'left') dx = x - maxW/2;
                if(align === 'right') dx = x + maxW/2;
                ctx.fillText(l.trim(), dx, startY);
                startY += lineH;
            });
            return { x: x - maxW/2, y: topY - lineH/2, w: maxW, h: lines.length * lineH };
        }

        function initDrag() {
            canvas.onmousedown = (e) => {
                const p = getMouse(e);
                for (let i = hitZones.length - 1; i >= 0; i--) {
                    const z = hitZones[i];
                    if (p.x >= z.x && p.x <= z.x + z.w && p.y >= z.y && p.y <= z.y + z.h) {
                        dragTarget = z;
                        if (z.id === 'guide-v') startX = p.x - state.guides.vPos;
                        else if (z.id === 'guide-h') startY = p.y - state.guides.hPos;
                        else if (z.id === 'banner-middle') { startX = p.x - state.banners.middle.x; startY = p.y - state.banners.middle.y; }
                        else if (z.id.startsWith('para-')) { 
                            const para = state.paragraphs.find(px => `para-${px.id}` === z.id); 
                            startX = p.x - para.x; startY = p.y - para.y; 
                        }
                        else if (z.id === 'logo') { startX = p.x - state.logoX; startY = p.y - state.logoY; }
                        else { startX = p.x - state[z.id + 'X']; startY = p.y - state[z.id + 'Y']; }
                        return;
                    }
                }
            };
            window.onmousemove = (e) => {
                if (!dragTarget) return;
                const p = getMouse(e);
                const nx = Math.round(p.x - startX), ny = Math.round(p.y - startY);
                if (dragTarget.id === 'guide-v') state.guides.vPos = nx;
                else if (dragTarget.id === 'guide-h') state.guides.hPos = ny;
                else if (dragTarget.id === 'banner-middle') { state.banners.middle.x = nx; state.banners.middle.y = ny; }
                else if (dragTarget.id.startsWith('para-')) { 
                    const para = state.paragraphs.find(px => `para-${px.id}` === dragTarget.id); 
                    para.x = nx; para.y = ny; 
                }
                else if (dragTarget.id === 'logo') { state.logoX = nx; state.logoY = ny; }
                else { state[dragTarget.id + 'X'] = nx; state[dragTarget.id + 'Y'] = ny; }
                render();
            };
            window.onmouseup = () => { dragTarget = null; };
        }

        function getMouse(e) {
            const r = canvas.getBoundingClientRect();
            return { x: (e.clientX - r.left) * (1024 / r.width), y: (e.clientY - r.top) * (1536 / r.height) };
        }

        function uploadImg(e, target) {
            const f = e.target.files[0]; if(!f) return;
            const reader = new FileReader();
            reader.onload = (ev) => { const i = new Image(); i.onload = () => { state[target] = i; render(); }; i.src = ev.target.result; };
            reader.readAsDataURL(f);
        }

        function exportDesign() {
            const link = document.createElement('a');
            link.download = `SivaStudio-1024x1536-${Date.now()}.png`;
            link.href = canvas.toDataURL('image/png', 1.0);
            link.click();
        }
    </script>
</body>
</html>
