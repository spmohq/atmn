<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Review & Rate An Idea | Prompt Genie</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Source+Code+Pro:wght@400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-gradient-start: #020617;
      --bg-gradient-end: #0f172a;
      --card-bg: rgba(30, 41, 59, 0.4);
      --card-border: rgba(255, 255, 255, 0.08);
      --text-primary: #f8fafc;
      --text-secondary: #94a3b8;
      --accent-primary: #22d3ee;
      --accent-hover: #67e8f9;
      --accent-success: #10b981;
      --code-bg: rgba(0, 0, 0, 0.3);
      --shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.5);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background: fixed linear-gradient(135deg, var(--bg-gradient-start), var(--bg-gradient-end));
      color: var(--text-primary);
      line-height: 1.6;
      padding: 60px 20px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .container {
      max-width: 800px;
      width: 100%;
      margin: 0 auto;
    }

    header {
      text-align: center;
      margin-bottom: 60px;
    }

    h1 {
      font-size: 2.2rem;
      font-weight: 800;
      letter-spacing: -0.02em;
      color: #fff;
      margin-bottom: 10px;
      text-transform: uppercase;
    }

    .prompt-workflow {
      display: flex;
      flex-direction: column;
      gap: 30px;
    }

    .step-card {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 24px;
      padding: 40px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(12px);
    }

    .step-header {
      display: flex;
      justify-content: flex-start;
      margin-bottom: 25px;
    }

    .step-label {
      font-weight: 800;
      font-size: 0.8rem;
      background: var(--accent-primary);
      color: #020617;
      padding: 5px 16px;
      border-radius: 6px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .prompt-content {
      background: var(--code-bg);
      padding: 30px;
      border-radius: 12px;
      font-family: 'Source Code Pro', monospace;
      font-size: 1.05rem;
      color: #cbd5e1;
      white-space: pre-wrap;
      border: 1px solid rgba(255,255,255,0.05);
      margin-bottom: 25px;
      line-height: 1.6;
    }

    .copy-btn {
      background: rgba(34, 211, 238, 0.1);
      color: var(--accent-primary);
      border: 1px solid var(--accent-primary);
      padding: 14px 32px;
      border-radius: 10px;
      font-weight: 700;
      font-size: 1rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      transition: all 0.2s;
      width: 100%;
    }

    .copy-btn:hover {
      background: var(--accent-primary);
      color: #020617;
    }

    .copy-btn.copied {
      background: var(--accent-success);
      border-color: var(--accent-success);
      color: white;
    }

    .footer {
      margin-top: 80px;
      text-align: center;
      color: var(--text-secondary);
      font-size: 0.85rem;
      border-top: 1px solid var(--card-border);
      padding-top: 40px;
      width: 100%;
    }

    @media (max-width: 600px) {
      h1 { font-size: 1.6rem; }
      .step-card { padding: 25px; }
      .prompt-content { font-size: 0.95rem; }
    }
  </style>
</head>
<body>

  <div class="container">
    <header>
      <h1>Review & Rate An Idea</h1>
    </header>

    <div class="prompt-workflow">
      
      <!-- Prompt #1 -->
      <div class="step-card">
        <div class="step-header">
          <span class="step-label">Prompt #1</span>
        </div>
        <div class="prompt-content" id="p1">Siva Prasad Mukherjee</div>
        <button class="copy-btn" onclick="copyText('p1', this)">
          <span>Copy Prompt</span>
        </button>
      </div>

      <!-- Prompt #2 -->
      <div class="step-card">
        <div class="step-header">
          <span class="step-label">Prompt #2</span>
        </div>
        <div class="prompt-content" id="p2">Siva's Facebook Posts</div>
        <button class="copy-btn" onclick="copyText('p2', this)">
          <span>Copy Prompt</span>
        </button>
      </div>

      <!-- Prompt #3 -->
      <div class="step-card">
        <div class="step-header">
          <span class="step-label">Prompt #3</span>
        </div>
        <div class="prompt-content" id="p3">Copyright © Siva Prasad Mukherjee</div>
        <button class="copy-btn" onclick="copyText('p3', this)">
          <span>Copy Prompt</span>
        </button>
      </div>

    </div>

    <footer class="footer">
      <p>Copyright &copy; <script>document.write(new Date().getFullYear())</script> Siva Prasad Mukherjee. All Rights Reserved.</p>
    </footer>
  </div>

  <script>
    function copyText(id, btn) {
      const text = document.getElementById(id).innerText;
      navigator.clipboard.writeText(text).then(() => {
        const originalText = btn.innerHTML;
        btn.innerHTML = `<span>Copied to Clipboard!</span>`;
        btn.classList.add('copied');
        
        setTimeout(() => {
          btn.innerHTML = originalText;
          btn.classList.remove('copied');
        }, 2000);
      });
    }
  </script>
</body>
</html>
