<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Bengali Newsletter System</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Source+Code+Pro:wght@400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-gradient-start: #020617;
      --bg-gradient-end: #0f172a;
      --card-bg: rgba(30, 41, 59, 0.4);
      --card-border: rgba(255, 255, 255, 0.08);
      --text-primary: #f8fafc;
      --text-secondary: #94a3b8;
      --accent-primary: #22d3ee;
      --accent-hover: #67e8f9;
      --accent-success: #10b981;
      --code-bg: rgba(0, 0, 0, 0.3);
      --shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.5);
      --input-bg: rgba(15, 23, 42, 0.6);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background: fixed linear-gradient(135deg, var(--bg-gradient-start), var(--bg-gradient-end));
      color: var(--text-primary);
      line-height: 1.6;
      padding: 60px 20px;
      min-height: 100vh;
    }

    .container {
      max-width: 1100px;
      margin: 0 auto;
    }

    header {
      text-align: center;
      margin-bottom: 40px;
    }

    h1 {
      font-size: 2.5rem;
      font-weight: 800;
      letter-spacing: -0.02em;
      color: #fff;
      margin-bottom: 10px;
      text-transform: uppercase;
    }

    .sub-header {
      color: var(--accent-primary);
      font-size: 1.1rem;
      font-weight: 600;
      letter-spacing: 0.05em;
    }

    .input-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 20px;
      margin-bottom: 40px;
    }

    .input-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    label {
      font-size: 0.75rem;
      font-weight: 800;
      text-transform: uppercase;
      color: var(--accent-primary);
      letter-spacing: 0.08em;
    }

    textarea {
      background: var(--input-bg);
      border: 1px solid var(--card-border);
      border-radius: 12px;
      padding: 12px;
      color: #fff;
      font-family: 'Inter', sans-serif;
      font-size: 0.9rem;
      resize: vertical;
      min-height: 80px;
      transition: all 0.3s;
      outline: none;
    }

    textarea:focus {
      border-color: var(--accent-primary);
      box-shadow: 0 0 0 2px rgba(34, 211, 238, 0.1);
    }

    .prompt-workflow {
      display: flex;
      flex-direction: column;
      gap: 30px;
    }

    .step-card {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 20px;
      padding: 30px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(12px);
    }

    .step-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }

    .step-label {
      font-weight: 800;
      font-size: 0.85rem;
      background: var(--accent-primary);
      color: #020617;
      padding: 4px 14px;
      border-radius: 6px;
      text-transform: uppercase;
    }

    .prompt-content {
      background: var(--code-bg);
      padding: 25px;
      border-radius: 12px;
      font-family: 'Source Code Pro', monospace;
      font-size: 0.95rem;
      color: #cbd5e1;
      white-space: pre-wrap;
      border: 1px solid rgba(255,255,255,0.05);
      margin-bottom: 20px;
      line-height: 1.5;
      max-height: 500px;
      overflow-y: auto;
    }

    .copy-btn {
      background: rgba(34, 211, 238, 0.1);
      color: var(--accent-primary);
      border: 1px solid var(--accent-primary);
      padding: 12px 28px;
      border-radius: 8px;
      font-weight: 700;
      font-size: 1rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      transition: all 0.2s;
      width: 100%;
    }

    .copy-btn:hover {
      background: var(--accent-primary);
      color: #020617;
    }

    .copy-btn.copied {
      background: var(--accent-success);
      border-color: var(--accent-success);
      color: white;
    }

    .footer {
      margin-top: 80px;
      text-align: center;
      color: var(--text-secondary);
      font-size: 0.85rem;
      border-top: 1px solid var(--card-border);
      padding-top: 40px;
    }

    @media (max-width: 850px) {
      h1 { font-size: 1.8rem; }
    }
  </style>
</head>
<body>

  <div class="container">
    <header>
      <h1>Bengali Newsletter</h1>
      <p class="sub-header">Strategic Content Creation & Refinement</p>
    </header>

    <div class="input-grid">
      <div class="input-group">
        <label>Insert Topic Here</label>
        <textarea id="val1" oninput="updatePrompts()"></textarea>
      </div>
      <div class="input-group">
        <label>Paste Newsletter Here</label>
        <textarea id="val2" oninput="updatePrompts()"></textarea>
      </div>
      <div class="input-group">
        <label>Paste Draft Here</label>
        <textarea id="val3" oninput="updatePrompts()"></textarea>
      </div>
    </div>

    <div class="prompt-workflow">
      <!-- Prompt #1 -->
      <div class="step-card">
        <div class="step-header">
          <span class="step-label">Prompt #1: Outline</span>
        </div>
        <div class="prompt-content" id="p1_out"></div>
        <button class="copy-btn" onclick="copyText('p1_out', this)">
          <span>Copy Outline Prompt</span>
        </button>
      </div>

      <!-- Prompt #2 -->
      <div class="step-card">
        <div class="step-header">
          <span class="step-label">Prompt #2: Draft</span>
        </div>
        <div class="prompt-content" id="p2_out"></div>
        <button class="copy-btn" onclick="copyText('p2_out', this)">
          <span>Copy Draft Prompt</span>
        </button>
      </div>

      <!-- Prompt #3 -->
      <div class="step-card">
        <div class="step-header">
          <span class="step-label">Prompt #3: Finalize</span>
        </div>
        <div class="prompt-content" id="p3_out"></div>
        <button class="copy-btn" onclick="copyText('p3_out', this)">
          <span>Copy Finalize Prompt</span>
        </button>
      </div>
    </div>

    <footer class="footer">
      <p>Copyright &copy; <script>document.write(new Date().getFullYear())</script> Siva Prasad Mukherjee. All Rights Reserved.</p>
    </footer>
  </div>

  <script>
    function updatePrompts() {
      const topic = document.getElementById('val1').value || "[INSERT TOPIC HERE]";
      const newsletter = document.getElementById('val2').value || "[PASTE NEWSLETTER HERE]";
      const draft = document.getElementById('val3').value || "[PASTE DRAFT HERE]";

      // Prompt 1
      const prompt1 = `Act as a world-class Bengali newsletter strategist, educator, intellectual communicator, essayist, and audience-building expert.

I will provide a topic, lesson, observation, philosophy, belief, insight, educational concept, historical event, scientific idea, or recurring theme.

TOPIC

==================================================
${topic}
==================================================

Your task is to design a newsletter outline for an intelligent Bengali-speaking audience.

The newsletter should not feel like marketing content.

It should feel like a thoughtful letter that helps readers understand an important idea more deeply.

OUTPUT REQUIREMENTS

Generate:

1. Newsletter Angle

- Identify the most interesting and intellectually compelling angle.
- Explain why this angle matters.

2. Opening Hook

Create 3 alternative opening hooks.

Examples:

- A surprising observation
- A thought-provoking question
- A historical anecdote
- A personal reflection
- A counterintuitive insight

3. Core Sections

Create a recommended newsletter structure.

For each section include:

- Section Purpose
- Key Point
- Reader Takeaway

4. Story Opportunities

Suggest:

- Personal stories
- Historical examples
- Cultural examples
- Everyday-life examples
- Thought experiments

that could help explain the idea.

5. Reflection Opportunities

Suggest questions that encourage readers to think more deeply about the topic.

6. Key Takeaway

Provide the single most important insight readers should remember.

7. Call To Reflection

Instead of a marketing CTA, create a thoughtful reflection, question, challenge, or observation that encourages continued thinking after the newsletter is finished.

LANGUAGE REQUIREMENTS

- Write entirely in Bengali (India).
- Use clear, elegant, intellectually rich Bengali.
- Avoid corporate, marketing, and promotional language.
- Prioritize understanding, wisdom, and reflection.
- Write for educated Bengali readers interested in learning and intellectual growth.`;

      // Prompt 2
      const prompt2 = `Act as an elite Bengali editor, newsletter strategist, intellectual communicator, essayist, and long-form content specialist.

I will provide a newsletter draft intended for a Bengali-speaking audience.

DRAFT

==================================================
${newsletter}
==================================================

Your task is not merely to proofread the draft.

Your task is to strengthen its ability to:

- Educate
- Clarify
- Engage
- Inspire reflection
- Hold attention
- Communicate ideas effectively

IMPROVE

- Readability
- Structure
- Flow
- Clarity
- Engagement
- Curiosity
- Logical progression
- Intellectual depth
- Emotional resonance

PRESERVE

- Original meaning
- Original observations
- Original conclusions
- Original perspective
- Original voice

REMOVE

- Repetition
- Unnecessary complexity
- Weak transitions
- Filler content
- Generic statements

ENHANCE

- Opening hook
- Section transitions
- Examples
- Explanations
- Reflection opportunities
- Closing takeaway

OUTPUT FORMAT

SECTION 1

Editorial Review

Provide:

- Strengths
- Weaknesses
- Improvement Opportunities

SECTION 2

Improved Newsletter

Rewrite the newsletter in full.

SECTION 3

Explanation of Key Improvements

Briefly explain the most important editorial improvements made.

LANGUAGE REQUIREMENTS

- Write entirely in Bengali (India).
- Use natural, elegant Bengali.
- Maintain an intelligent but accessible tone.
- Avoid sounding academic, robotic, or overly formal.
- Prioritize clarity and intellectual engagement.`;

      // Prompt 3
      const prompt3 = `Act as an elite Bengali writer, essayist, columnist, storyteller, newsletter editor, and conversational communicator.

I will provide a newsletter draft.

DRAFT

==================================================
${draft}
==================================================

Your task is to make the writing feel more human, personal, and engaging while preserving the original meaning.

DO NOT change:

- Core message
- Main arguments
- Key observations
- Conclusions
- Educational value

Instead, improve the writing so that it feels:

- More personal
- More conversational
- More reflective
- More engaging
- More emotionally authentic
- More intellectually alive
- Less robotic
- Less mechanical

ENHANCE

- Natural voice
- Storytelling
- Personal observations
- Curiosity
- Warmth
- Reader connection
- Thoughtfulness

WHEN APPROPRIATE

Add:

- Reflective questions
- Gentle humor
- Human observations
- Everyday examples
- Cultural references familiar to Bengali readers

AVOID

- Forced humor
- Clickbait language
- Marketing language
- Overly casual writing
- Excessive emotional language

OUTPUT FORMAT

SECTION 1

Personality Analysis

Explain:

- What currently feels mechanical
- What currently feels human
- What opportunities exist to strengthen the voice

SECTION 2

Enhanced Newsletter

Rewrite the newsletter in full.

SECTION 3

Voice Improvements Summary

Explain how the writing became:

- More personal
- More conversational
- More engaging

without changing the underlying message.

LANGUAGE REQUIREMENTS

- Write entirely in Bengali (India).
- Use natural spoken-written Bengali.
- Maintain intellectual credibility.
- Sound like a thoughtful human being sharing an idea with another thoughtful human being.
- Prioritize authenticity over cleverness.`;

      document.getElementById('p1_out').innerText = prompt1;
      document.getElementById('p2_out').innerText = prompt2;
      document.getElementById('p3_out').innerText = prompt3;
    }

    function copyText(id, btn) {
      const text = document.getElementById(id).innerText;
      navigator.clipboard.writeText(text).then(() => {
        const originalText = btn.innerHTML;
        btn.innerHTML = `<span>Copied!</span>`;
        btn.classList.add('copied');
        
        setTimeout(() => {
          btn.innerHTML = originalText;
          btn.classList.remove('copied');
        }, 2000);
      });
    }

    // Initial setup
    updatePrompts();
  </script>
</body>
</html>
