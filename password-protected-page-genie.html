<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luxury Link Console - Password Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Playfair+Display:ital,wght@0,700;1,700&family=Hind+Siliguri:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --ui-dark: #0f172a;
            --gold: #C89B3C;
            --bronze: #8B5E1A;
            --accent-grad: linear-gradient(135deg, #8B5E1A 0%, #C89B3C 100%);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', 'Hind Siliguri', sans-serif; background-color: #f1f5f9; display: flex; justify-content: center; padding: 40px 20px; }

        .container { width: 100%; max-width: 850px; background: white; border-radius: 24px; overflow: hidden; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.15); }

        .header { background: linear-gradient(135deg, #020617 0%, #1e293b 100%); padding: 50px; color: white; }
        .header h1 { font-family: 'Playfair Display', serif; font-size: 32px; font-weight: 800; margin-bottom: 10px; }
        .header p { color: #94a3b8; font-size: 15px; }

        .content { padding: 40px 50px; }
        .section-label { font-size: 12px; font-weight: 700; color: #94a3b8; text-transform: uppercase; letter-spacing: 2px; display: flex; align-items: center; margin: 30px 0 20px 0; }
        .section-label::after { content: ""; flex: 1; height: 1px; background: #e2e8f0; margin-left: 15px; }

        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 25px; }
        .full { grid-column: span 2; }

        label { display: block; font-size: 14px; font-weight: 600; color: #1e293b; margin-bottom: 10px; }
        input, select, textarea { width: 100%; padding: 15px; border: 1.5px solid #e2e8f0; border-radius: 12px; font-size: 15px; background: #f8fafc; font-family: inherit; }
        input:focus { outline: none; border-color: var(--bronze); background: white; box-shadow: 0 0 0 4px rgba(139, 94, 26, 0.1); }

        .footer { padding: 0 50px 50px; display: flex; justify-content: flex-end; }
        .btn-create { background: var(--accent-grad); color: white; border: none; padding: 16px 35px; border-radius: 14px; font-weight: 700; font-size: 16px; cursor: pointer; transition: 0.3s; box-shadow: 0 10px 20px rgba(139, 94, 26, 0.3); }
        .btn-create:hover { transform: translateY(-2px); box-shadow: 0 15px 30px rgba(139, 94, 26, 0.4); }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>Secure Bengali Bridge</h1>
        <p>পাসওয়ার্ড যুক্ত এবং হাই-কনট্রাস্ট লাক্সারি ল্যান্ডিং পেজ তৈরি করুন।</p>
    </div>

    <div class="content">
        <div class="section-label">Core Settings (মূল সেটিংস)</div>
        <div class="grid">
            <div class="full">
                <label>Target URL (গন্তব্য লিঙ্ক)</label>
                <input type="url" id="targetUrl" placeholder="https://premium-content.com/file" required>
            </div>
            <div>
                <label>Access Password (পাসওয়ার্ড)</label>
                <input type="text" id="accessPass" placeholder="যেমন: 123456" required>
            </div>
            <div>
                <label>Short Code (ফাইলের নাম)</label>
                <input type="text" id="shortCode" placeholder="exclusive-access" required>
            </div>
        </div>

        <div class="section-label">Contact / Payment (যোগাযোগ)</div>
        <div class="full">
            <label>WhatsApp/Telegram/Form Link (পাসওয়ার্ড না থাকলে যেখানে যাবে)</label>
            <input type="url" id="contactUrl" placeholder="https://wa.me/yournumber">
        </div>

        <div class="section-label">Scripts</div>
        <div class="full">
            <label>Pixel/Script Code</label>
            <textarea id="pixelCode" placeholder="<!-- Paste Facebook Pixel or Tracking codes here -->"></textarea>
        </div>
    </div>

    <div class="footer">
        <button class="btn-create" onclick="generateSecureBridge()">
            Generate Password Protected Link
        </button>
    </div>
</div>

<script>
    function generateSecureBridge() {
        const targetUrl = document.getElementById('targetUrl').value;
        const password = document.getElementById('accessPass').value;
        const shortCode = document.getElementById('shortCode').value || 'secure-link';
        const contactUrl = document.getElementById('contactUrl').value || '#';
        const pixel = document.getElementById('pixelCode').value;

        if (!targetUrl || !password) { 
            alert("অনুগ্রহ করে গন্তব্য লিঙ্ক এবং পাসওয়ার্ড উভয়ই প্রদান করুন।"); 
            return; 
        }

        // Simple obfuscation
        const secretTarget = btoa(targetUrl);
        const secretPass = btoa(password);

        const bridgeHTML = `
<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>সুরক্ষিত গেটওয়ে</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Hind+Siliguri:wght@400;600;700&display=swap" rel="stylesheet">
    ${pixel}
    <style>
        :root {
            --deep-bg: #1A140E;
            --gold: #C89B3C;
            --bronze: #8B5E1A;
            --cream: #FFFDF8;
            --deep-text: #2C1E12;
            --muted-text: #5A4A3A;
            --gloss-grad: linear-gradient(135deg, #8B5E1A 0%, #C89B3C 50%, #8B5E1A 100%);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: var(--deep-bg);
            background-image: radial-gradient(circle at 50% 0%, rgba(200, 155, 60, 0.15) 0%, transparent 70%), linear-gradient(180deg, #1A140E 0%, #0D0A07 100%);
            color: var(--deep-text);
            font-family: 'Hind Siliguri', sans-serif;
            display: flex; align-items: center; justify-content: center;
            min-height: 100vh; padding: 20px;
        }

        .luxury-card {
            background: var(--cream);
            width: 100%; max-width: 450px;
            padding: 50px 35px;
            border-radius: 30px;
            text-align: center;
            box-shadow: 0 40px 100px -20px rgba(0, 0, 0, 0.8);
            border: 1px solid rgba(200, 155, 60, 0.3);
            animation: slideUp 0.6s ease-out;
        }

        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .icon-lock {
            width: 60px; height: 60px; background: var(--gloss-grad);
            border-radius: 50%; margin: 0 auto 25px;
            display: flex; align-items: center; justify-content: center;
            color: white; font-size: 24px; box-shadow: 0 10px 20px rgba(139, 94, 26, 0.3);
        }

        h2 { font-size: 28px; margin-bottom: 15px; color: var(--deep-text); }
        p { font-size: 16px; color: var(--muted-text); margin-bottom: 30px; }

        .input-group { margin-bottom: 20px; text-align: left; }
        label { display: block; font-size: 13px; font-weight: 700; color: var(--bronze); margin-bottom: 8px; text-transform: uppercase; }
        
        input[type="password"] {
            width: 100%; padding: 18px; border: 2px solid #EEE3D0; border-radius: 12px;
            font-size: 18px; text-align: center; letter-spacing: 4px; background: #FBFAF8; transition: 0.3s;
        }
        input:focus { outline: none; border-color: var(--gold); background: white; }

        .btn-verify {
            width: 100%; background: var(--gloss-grad); color: white; border: none;
            padding: 18px; border-radius: 12px; font-size: 18px; font-weight: 700;
            cursor: pointer; transition: 0.3s; margin-top: 10px;
            box-shadow: 0 15px 30px rgba(139, 94, 26, 0.3);
        }

        .btn-contact {
            display: inline-block; margin-top: 25px; color: var(--bronze);
            text-decoration: none; font-size: 14px; font-weight: 600;
            border-bottom: 1px solid var(--gold); padding-bottom: 2px;
        }

        .error-msg { color: #d32f2f; font-size: 14px; margin-top: 15px; display: none; }
    </style>
</head>
<body>

    <div class="luxury-card">
        <div class="icon-lock">🔒</div>
        <h2>এক্সেস ভেরিফাই করুন</h2>
        <p>এই লিঙ্কটি সুরক্ষিত। কন্টেন্টটি দেখতে সঠিক পাসওয়ার্ড প্রদান করুন।</p>
        
        <div class="input-group">
            <label>গোপন কোড (Password)</label>
            <input type="password" id="userPass" placeholder="••••••">
        </div>

        <button class="btn-verify" onclick="checkAccess()">ভেরিফাই এবং এগিয়ে যান</button>
        
        <div id="error" class="error-msg">ভুল পাসওয়ার্ড! আবার চেষ্টা করুন।</div>

        <a href="${contactUrl}" class="btn-contact">পাসওয়ার্ড নেই? যোগাযোগ করুন</a>
    </div>

    <script>
        function checkAccess() {
            const input = document.getElementById('userPass').value;
            const vaultPass = "${secretPass}";
            const vaultTarget = "${secretTarget}";

            if (btoa(input) === vaultPass) {
                document.querySelector('.luxury-card').style.opacity = '0.5';
                window.location.href = atob(vaultTarget);
            } else {
                const err = document.getElementById('error');
                err.style.display = 'block';
                document.getElementById('userPass').style.borderColor = '#d32f2f';
                document.getElementById('userPass').value = '';
            }
        }

        // Allow 'Enter' key to submit
        document.getElementById('userPass').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') { checkAccess(); }
        });
    <\/script>
</body>
</html>`;

        const blob = new Blob([bridgeHTML], { type: 'text/html' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `${shortCode}.html`;
        a.click();
    }
</script>

</body>
</html>
