<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Podcast Production Blueprint + Flow Video Planner</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Source+Code+Pro:wght@400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-gradient-start: #020617;
      --bg-gradient-end: #0f172a;
      --card-bg: rgba(30, 41, 59, 0.4);
      --card-border: rgba(255, 255, 255, 0.08);
      --text-primary: #f8fafc;
      --text-secondary: #94a3b8;
      --accent-primary: #22d3ee;
      --accent-hover: #67e8f9;
      --accent-success: #10b981;
      --code-bg: rgba(0, 0, 0, 0.3);
      --shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.5);
      --input-bg: rgba(15, 23, 42, 0.6);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background: fixed linear-gradient(135deg, var(--bg-gradient-start), var(--bg-gradient-end));
      color: var(--text-primary);
      line-height: 1.6;
      padding: 60px 20px;
      min-height: 100vh;
    }

    .container {
      max-width: 1100px;
      margin: 0 auto;
    }

    header {
      text-align: center;
      margin-bottom: 40px;
    }

    h1 {
      font-size: 2.2rem;
      font-weight: 800;
      letter-spacing: -0.02em;
      color: #fff;
      margin-bottom: 10px;
      text-transform: uppercase;
    }

    .sub-header {
      color: var(--accent-primary);
      font-size: 1.1rem;
      font-weight: 600;
      letter-spacing: 0.05em;
    }

    .input-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 20px;
      margin-bottom: 40px;
    }

    .input-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    label {
      font-size: 0.75rem;
      font-weight: 800;
      text-transform: uppercase;
      color: var(--accent-primary);
      letter-spacing: 0.08em;
    }

    textarea {
      background: var(--input-bg);
      border: 1px solid var(--card-border);
      border-radius: 12px;
      padding: 15px;
      color: #fff;
      font-family: 'Inter', sans-serif;
      font-size: 0.95rem;
      resize: vertical;
      min-height: 180px;
      transition: all 0.3s;
      outline: none;
    }

    textarea:focus {
      border-color: var(--accent-primary);
      box-shadow: 0 0 0 2px rgba(34, 211, 238, 0.1);
    }

    .prompt-workflow {
      display: flex;
      flex-direction: column;
      gap: 30px;
    }

    .step-card {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 20px;
      padding: 30px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(12px);
    }

    .step-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }

    .step-label {
      font-weight: 800;
      font-size: 0.85rem;
      background: var(--accent-primary);
      color: #020617;
      padding: 4px 14px;
      border-radius: 6px;
      text-transform: uppercase;
    }

    .prompt-content {
      background: var(--code-bg);
      padding: 25px;
      border-radius: 12px;
      font-family: 'Source Code Pro', monospace;
      font-size: 0.95rem;
      color: #cbd5e1;
      white-space: pre-wrap;
      border: 1px solid rgba(255,255,255,0.05);
      margin-bottom: 20px;
      line-height: 1.5;
      max-height: 600px;
      overflow-y: auto;
    }

    .copy-btn {
      background: rgba(34, 211, 238, 0.1);
      color: var(--accent-primary);
      border: 1px solid var(--accent-primary);
      padding: 12px 28px;
      border-radius: 8px;
      font-weight: 700;
      font-size: 1rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      transition: all 0.2s;
      width: 100%;
    }

    .copy-btn:hover {
      background: var(--accent-primary);
      color: #020617;
    }

    .copy-btn.copied {
      background: var(--accent-success);
      border-color: var(--accent-success);
      color: white;
    }

    .footer {
      margin-top: 80px;
      text-align: center;
      color: var(--text-secondary);
      font-size: 0.85rem;
      border-top: 1px solid var(--card-border);
      padding-top: 40px;
    }

    @media (max-width: 850px) {
      h1 { font-size: 1.6rem; }
    }
  </style>
</head>
<body>

  <div class="container">
    <header>
      <h1>Podcast Production Blueprint + Flow Video Planner</h1>
      <p class="sub-header">Bengali Podcast Content Architecture</p>
    </header>

    <div class="input-grid">
      <div class="input-group">
        <label>Paste Source Text Here</label>
        <textarea id="sourceText" oninput="updatePrompts()" placeholder="Enter the content you want to plan for your podcast..."></textarea>
      </div>
    </div>

    <div class="prompt-workflow">
      <div class="step-card">
        <div class="step-header">
          <span class="step-label">Comprehensive Production Blueprint Prompt</span>
        </div>
        <div class="prompt-content" id="p1_out"></div>
        <button class="copy-btn" onclick="copyText('p1_out', this)">
          <span>Copy Prompt</span>
        </button>
      </div>
    </div>

    <footer class="footer">
      <p>Copyright &copy; <script>document.write(new Date().getFullYear())</script> Siva Prasad Mukherjee. All Rights Reserved.</p>
    </footer>
  </div>

  <script>
    function updatePrompts() {
      const source = document.getElementById('sourceText').value || "[PASTE SOURCE TEXT HERE]";

      const prompt = `Act as an elite Bengali podcast producer, narrative strategist, intellectual communicator, educator, AI video director, visual storytelling expert, audience engagement specialist, and content architect.

Your task is to transform the provided source material into a complete production blueprint for a Bengali AI-avatar podcast episode.

HOST IDENTITY

The podcast host is an AI avatar representing Siva Prasad Mukherjee.

The final podcast script MUST begin with:

"নমস্কার। অনুষ্ঠানে আপনাকে স্বাগত। আমি শিবা প্রসাদ মুখার্জীর AI Avatar। আমি আপনাদের সামনে তুলে ধরি শিবার ভাবনা, পর্যবেক্ষণ, বিশ্লেষণ এবং বিভিন্ন গুরুত্বপূর্ণ বিষয় নিয়ে তাঁর প্রতিফলন। আমি একজন AI-নির্মিত উপস্থাপক হলেও, এখানে প্রকাশিত ধারণা ও দৃষ্টিভঙ্গিগুলি তাঁরই।"

SOURCE MATERIAL

==================================================
${source}
==================================================

HOST VISUAL ASSUMPTIONS & AVATAR INTEGRATION

Assume that a consistent AI Avatar of Siva Prasad Mukherjee will be used throughout the entire podcast episode and will be uploaded separately in Flow during video creation.

The avatar serves as the permanent host, narrator, intellectual guide, and recognizable face of the show.

When planning clips and Flow prompts:

- Treat the avatar as the central storytelling anchor.
- Maintain visual consistency across the episode.
- Assume the avatar's appearance remains consistent.
- Design supporting visuals to reinforce understanding.
- Avoid visual concepts that compete with the avatar.
- Prioritize intellectual communication over visual spectacle.

For each clip determine:

- Presentation Mode
- Avatar Presence Percentage
- Visual Support Strategy

Presentation Modes:

1. Avatar Only
2. Avatar + Supporting Visuals
3. Visual Sequence + Avatar Narration

PRIMARY OBJECTIVE

Extract the deepest ideas, observations, lessons, arguments, principles, implications, and insights.

Then determine the best way to communicate them through:

- Podcast narration
- Visual storytelling
- AI-generated video clips
- Intellectual progression

EPISODE PLANNING REQUIREMENTS

Analyze:

- Topic Complexity
- Core Idea
- Core Thesis
- Core Message
- Number of Major Ideas
- Required Context Level
- Required Reflection Level

Determine:

- Recommended Episode Length
- Recommended Depth Level
- Recommended Number of Video Clips

Optimize for:

- Clarity
- Understanding
- Engagement
- Intellectual depth
- Visual coherence
- Retention

VIDEO CLIP PLANNING REQUIREMENTS

Assume clips will be created in Flow.

Assume each clip may use:

- Text-to-video prompts
- Add Image to Prompt
- Add Video Clip to Prompt

For every clip identify:

- Narrative Purpose
- Key Idea
- Emotional Tone
- Visual Goal
- Estimated Duration

FLOW VIDEO PROMPT REQUIREMENTS

For every clip create:

1. Primary AI Video Prompt

Include:

- Subject
- Environment
- Actions
- Visual symbolism
- Camera behavior
- Mood
- Lighting
- Atmosphere
- Realism level
- Composition

2. Add Image / Clip Guidance

Explain:

- Whether image references help
- Whether video references help
- What type of image should be uploaded
- What type of video should be uploaded
- Why they improve results

3. Visual Continuity Notes

Explain how the clip connects visually to adjacent clips.

OUTPUT FORMAT

SECTION 1

PODCAST PLANNING SUMMARY

Include:

- Topic Complexity
- Core Idea
- Core Thesis
- Core Message
- Major Ideas
- Recommended Depth
- Recommended Episode Length
- Recommended Number of Clips
- Planning Rationale

SECTION 2

VIDEO CLIP STRUCTURE

For each clip:

- Clip Number
- Purpose
- Main Idea
- Emotional Tone
- Estimated Duration
- Narration Coverage
- Presentation Mode
- Avatar Presence %

SECTION 3

FLOW VIDEO GENERATION PROMPTS

For each clip:

- Clip Number
- Primary AI Video Prompt
- Add Image Recommendation
- Add Video Clip Recommendation
- Visual Continuity Notes

SECTION 4

FINAL PODCAST SCRIPT

Provide the complete Bengali narration.

LANGUAGE REQUIREMENTS

- Write everything in Bengali (India).
- AI video prompts may be written in English if that improves generation quality.
- Everything else must be in Bengali.

FINAL DELIVERABLE

End with this table:

| Clip | Purpose | Main Idea | Duration | Presentation Mode | Avatar Presence % | Visual Theme | Image Ref Recommended | Video Ref Recommended |

The table must summarize the entire production plan and be ready for immediate implementation in Flow.`;

      document.getElementById('p1_out').innerText = prompt;
    }

    function copyText(id, btn) {
      const text = document.getElementById(id).innerText;
      navigator.clipboard.writeText(text).then(() => {
        const originalText = btn.innerHTML;
        btn.innerHTML = `<span>Copied to Clipboard!</span>`;
        btn.classList.add('copied');
        
        setTimeout(() => {
          btn.innerHTML = originalText;
          btn.classList.remove('copied');
        }, 2000);
      });
    }

    // Initial setup
    updatePrompts();
  </script>
</body>
</html>
