<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luxury Link Console - Bengali Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Playfair+Display:ital,wght@0,700;1,700&family=Hind+Siliguri:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        /* CREATOR UI STYLES */
        :root {
            --ui-dark: #0f172a;
            --gold: #C89B3C;
            --bronze: #8B5E1A;
            --accent-grad: linear-gradient(135deg, #8B5E1A 0%, #C89B3C 100%);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', sans-serif; background-color: #f1f5f9; display: flex; justify-content: center; padding: 40px 20px; }

        .container { width: 100%; max-width: 850px; background: white; border-radius: 24px; overflow: hidden; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.15); }

        .header { background: linear-gradient(135deg, #020617 0%, #1e293b 100%); padding: 50px; color: white; }
        .header h1 { font-family: 'Playfair Display', serif; font-size: 32px; font-weight: 800; margin-bottom: 10px; }
        .header p { color: #94a3b8; font-size: 15px; }

        .content { padding: 40px 50px; }
        .section-label { font-size: 12px; font-weight: 700; color: #94a3b8; text-transform: uppercase; letter-spacing: 2px; display: flex; align-items: center; margin: 30px 0 20px 0; }
        .section-label::after { content: ""; flex: 1; height: 1px; background: #e2e8f0; margin-left: 15px; }

        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 25px; }
        .full { grid-column: span 2; }

        label { display: block; font-size: 14px; font-weight: 600; color: #1e293b; margin-bottom: 10px; }
        input, select, textarea { width: 100%; padding: 15px; border: 1.5px solid #e2e8f0; border-radius: 12px; font-size: 15px; background: #f8fafc; font-family: inherit; }
        input:focus { outline: none; border-color: var(--bronze); background: white; box-shadow: 0 0 0 4px rgba(139, 94, 26, 0.1); }

        .footer { padding: 0 50px 50px; display: flex; justify-content: flex-end; }
        .btn-create { background: var(--accent-grad); color: white; border: none; padding: 16px 35px; border-radius: 14px; font-weight: 700; font-size: 16px; cursor: pointer; transition: 0.3s; box-shadow: 0 10px 20px rgba(139, 94, 26, 0.3); }
        .btn-create:hover { transform: translateY(-2px); box-shadow: 0 15px 30px rgba(139, 94, 26, 0.4); }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>Create Bengali Bridge</h1>
        <p>Generate a high-contrast, luxury Bengali landing page for your links.</p>
    </div>

    <div class="content">
        <div class="section-label">Core Settings</div>
        <div class="grid">
            <div>
                <label>Target URL (গন্তব্য লিঙ্ক)</label>
                <input type="url" id="targetUrl" placeholder="https://example.com" required>
            </div>
            <div>
                <label>Short Code (নাম)</label>
                <input type="text" id="shortCode" placeholder="exclusive-offer" required>
            </div>
        </div>

        <div class="section-label">Retargeting</div>
        <div class="full">
            <label>Pixel/Script Code</label>
            <textarea id="pixelCode" placeholder="<!-- Paste scripts here -->"></textarea>
        </div>
    </div>

    <div class="footer">
        <button class="btn-create" onclick="generateBengaliBridge()">
            Create Luxury Bengali Link
        </button>
    </div>
</div>

<script>
    function generateBengaliBridge() {
        const targetUrl = document.getElementById('targetUrl').value;
        const shortCode = document.getElementById('shortCode').value || 'link';
        const pixel = document.getElementById('pixelCode').value;

        if (!targetUrl) { alert("অনুগ্রহ করে গন্তব্য লিঙ্কটি প্রদান করুন।"); return; }

        const secret = btoa(targetUrl);

        const bridgeHTML = `
<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>নিরাপদ গেটওয়ে</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Hind+Siliguri:wght@400;600;700&display=swap" rel="stylesheet">
    ${pixel}
    <style>
        :root {
            --deep-bg: #1A140E; /* Deep Cinematic Brown */
            --gold: #C89B3C;
            --bronze: #8B5E1A;
            --ivory: #F8F4EC;
            --cream: #FFFDF8;
            --deep-text: #2C1E12; /* Very Prominent Font Color */
            --muted-text: #5A4A3A;
            --gloss-grad: linear-gradient(135deg, #8B5E1A 0%, #C89B3C 50%, #8B5E1A 100%);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: var(--deep-bg);
            background-image: 
                radial-gradient(circle at 50% 0%, rgba(200, 155, 60, 0.15) 0%, transparent 70%),
                linear-gradient(180deg, #1A140E 0%, #0D0A07 100%);
            color: var(--deep-text);
            font-family: 'Hind Siliguri', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 24px;
        }

        .luxury-card {
            background: var(--cream);
            width: 100%;
            max-width: 480px;
            padding: 60px 40px;
            border-radius: 28px;
            text-align: center;
            position: relative;
            box-shadow: 
                0 40px 100px -20px rgba(0, 0, 0, 0.8),
                inset 0 1px 1px rgba(255, 255, 255, 0.9);
            border: 1px solid rgba(200, 155, 60, 0.3);
            animation: slideUp 0.8s ease-out;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .icon-gloss {
            width: 72px; height: 72px;
            background: var(--gloss-grad);
            border-radius: 22px;
            margin: 0 auto 35px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 34px;
            box-shadow: 0 15px 30px rgba(139, 94, 26, 0.4);
            border: 1px solid rgba(255,255,255,0.2);
        }

        h2 {
            font-size: 30px;
            color: var(--deep-text);
            margin-bottom: 20px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        p {
            font-size: 17px;
            line-height: 1.8;
            color: var(--muted-text);
            margin-bottom: 45px;
            font-weight: 400;
        }

        .btn-glossy {
            display: block;
            width: 100%;
            background: var(--gloss-grad);
            background-size: 200% auto;
            color: white;
            border: none;
            padding: 22px;
            border-radius: 16px;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 20px 40px -10px rgba(139, 94, 26, 0.5);
            text-shadow: 0 1px 2px rgba(0,0,0,0.2);
        }

        .btn-glossy:hover {
            background-position: right center;
            transform: translateY(-4px) scale(1.02);
            box-shadow: 0 25px 50px -10px rgba(139, 94, 26, 0.6);
        }

        .footer-note {
            margin-top: 40px;
            font-size: 12px;
            color: var(--gold);
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 700;
            opacity: 0.8;
        }

        @media (max-width: 480px) {
            .luxury-card { padding: 50px 25px; border-radius: 20px; }
            h2 { font-size: 26px; }
            p { font-size: 16px; }
        }
    </style>
</head>
<body>

    <div class="luxury-card">
        <div class="icon-gloss">✧</div>
        <h2>নিরাপদ গেটওয়ে</h2>
        <p>আপনি ফেসবুকের বাইরের একটি কনটেন্টে স্থানান্তরিত হতে চলেছেন। এগিয়ে যাওয়ার জন্য অনুগ্রহ করে নিচের বোতামটি ক্লিক করে আপনার সম্মতি নিশ্চিত করুন। - শিব প্রসাদ মুখার্জি</p>
        
        <button class="btn-glossy" onclick="go()">গন্তব্যে এগিয়ে যান</button>

        <div class="footer-note">PREMIUM SECURE ACCESS</div>
    </div>

    <script>
        function go() {
            const vault = "${secret}";
            window.location.href = atob(vault);
        }
    <\/script>
</body>
</html>`;

        const blob = new Blob([bridgeHTML], { type: 'text/html' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `${shortCode}.html`;
        a.click();
    }
</script>

</body>
</html>
