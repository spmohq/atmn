  <style>
    :root {
      --bg-gradient-start: #020617;
      --bg-gradient-end: #0f172a;
      --card-bg: rgba(30, 41, 59, 0.4);
      --card-border: rgba(255, 255, 255, 0.08);
      --text-primary: #f8fafc;
      --text-secondary: #94a3b8;
      --accent-primary: #22d3ee;
      --accent-hover: #67e8f9;
      --accent-success: #10b981;
      --code-bg: rgba(0, 0, 0, 0.3);
      --shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.5);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background: fixed linear-gradient(135deg, var(--bg-gradient-start), var(--bg-gradient-end));
      color: var(--text-primary);
      line-height: 1.6;
      padding: 60px 20px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .container {
      max-width: 850px;
      width: 100%;
      margin: 0 auto;
    }

    header {
      text-align: center;
      margin-bottom: 50px;
    }

    h1 {
      font-size: 2.2rem;
      font-weight: 800;
      letter-spacing: -0.02em;
      color: #fff;
      margin-bottom: 10px;
      text-transform: uppercase;
    }

    .prompt-workflow {
      display: flex;
      flex-direction: column;
      gap: 30px;
    }

    .step-card {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 24px;
      padding: 40px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(12px);
    }

    .step-header {
      display: flex;
      justify-content: flex-start;
      margin-bottom: 20px;
    }

    .step-label {
      font-weight: 800;
      font-size: 0.8rem;
      background: var(--accent-primary);
      color: #020617;
      padding: 5px 16px;
      border-radius: 6px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .input-label {
      display: block;
      color: var(--accent-primary);
      font-weight: 700;
      font-size: 0.85rem;
      margin-bottom: 12px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    textarea {
      width: 100%;
      background: var(--code-bg);
      border: 1px solid var(--card-border);
      border-radius: 12px;
      padding: 18px;
      color: #fff;
      font-family: 'Inter', sans-serif;
      font-size: 1rem;
      resize: vertical;
      min-height: 150px;
      transition: all 0.2s;
      line-height: 1.5;
    }

    textarea:focus {
      outline: none;
      border-color: var(--accent-primary);
      box-shadow: 0 0 0 2px rgba(34, 211, 238, 0.1);
    }

    .prompt-content {
      background: var(--code-bg);
      padding: 30px;
      border-radius: 12px;
      font-family: 'Source Code Pro', monospace;
      font-size: 0.95rem;
      color: #cbd5e1;
      white-space: pre-wrap;
      border: 1px solid rgba(255,255,255,0.05);
      margin-bottom: 25px;
      line-height: 1.6;
    }

    .copy-btn {
      background: rgba(34, 211, 238, 0.1);
      color: var(--accent-primary);
      border: 1px solid var(--accent-primary);
      padding: 14px 32px;
      border-radius: 10px;
      font-weight: 700;
      font-size: 1rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      transition: all 0.2s;
      width: 100%;
    }

    .copy-btn:hover {
      background: var(--accent-primary);
      color: #020617;
    }

    .copy-btn.copied {
      background: var(--accent-success);
      border-color: var(--accent-success);
      color: white;
    }

    .footer {
      margin-top: 80px;
      text-align: center;
      color: var(--text-secondary);
      font-size: 0.85rem;
      border-top: 1px solid var(--card-border);
      padding-top: 40px;
      width: 100%;
    }

    .footer1 {
      margin: 50px 0 20px;
      text-align: center;
    }

    .footer1 a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 16px 34px;
      border-radius: 14px;
      text-decoration: none;
      font-family: 'Inter', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      color: var(--accent-primary);
      background: rgba(30,41,59,.45);
      border: 1px solid rgba(34,211,238,.35);
      backdrop-filter: blur(12px);
      transition: all .25s ease;
    }

    .footer1 a:hover {
      background: rgba(34, 211, 238, 0.15);
      transform: translateY(-3px);
    }

    @media (max-width: 600px) {
      h1 { font-size: 1.6rem; }
      .step-card { padding: 25px; }
      .prompt-content { font-size: 0.85rem; }
    }
  </style>
</head>
<body oncontextmenu="return false" onselectstart="return false" ondragstart="return false">
  <div class="container">
    <header>
      <h1>SBS-to-Topic Hierarchy Generator</h1>
    </header>

    <div class="prompt-workflow">
      <!-- Input Section -->
      <div class="step-card">
        <div class="step-header">
          <span class="step-label">Step 1: Input Process</span>
        </div>
        <label class="input-label">[STEP BY STEP PROCESS]</label>
        <textarea id="sbsInput" placeholder="Paste your step-by-step process here..." oninput="updatePrompt()"></textarea>
      </div>

      <!-- Prompt Result Section -->
      <div class="step-card">
        <div class="step-header">
          <span class="step-label">Step 2: Generated Prompt</span>
        </div>
        <div class="prompt-content" id="p1"></div>
        <button class="copy-btn" onclick="copyText('p1', this)">
          <span>Copy Prompt Text</span>
        </button>
      </div>
    </div>

    <div class="footer1">
      <a href="https://ailab.shop" target="_blank">📲 Join Siva's WhatsApp Channel</a>
    </div>

    <footer class="footer">
      <p>Copyright &copy; <script>document.write(new Date().getFullYear())</script> Siva Prasad Mukherjee. All Rights Reserved.</p>
    </footer>
  </div>

  <script>
    function updatePrompt() {
      const sbsValue = document.getElementById('sbsInput').value || '[STEP BY STEP PROCESS]';

      const fullPrompt = `Please read and review the step by step process below.

Now, derive the single umbrella topic from the umbrella activity, its branches, and their sub-branches. Then organize the output hierarchically as follows:

- Umbrella Topic
  - Branch
    - Sub-branch

The umbrella topic must be a single, overarching topic that encompasses the entire hierarchy. Return only the hierarchy.

BENGALI LOCALIZATION LAYER

Please write the output of the PROMPT below in the most spontaneous, natural-sounding modern conversational Bengali as spoken in Kolkata, West Bengal, India.

The writing should be easy for a 21-year-old to understand while maintaining high editorial quality, clarity, precision, and natural readability.

Strict Rules

- Reflect Kolkata conversational cadence through sentence rhythm and phrasing by using slightly formal, polite, and smoothly flowing sentence structures with balanced pacing. Avoid slang, regional grammar, overly literary wording, or awkward literal translations.
- Always use the formal "আপনি", never "তুমি".
- The tone should remain warm, conversational, approachable, confident, and quietly authoritative.
- Write as if speaking directly to one person in a natural face-to-face conversation.
- Do not translate literally. Rewrite naturally so the output feels as though it was originally written in Bengali.
- Preserve the original meaning, intent, emotional tone, and persuasive effect without adding, removing, or changing information.

STEP BY STEP PROCESS

${sbsValue}`;

      document.getElementById('p1').innerText = fullPrompt;
    }

    function copyText(id, btn) {
      const text = document.getElementById(id).innerText;
      navigator.clipboard.writeText(text).then(() => {
        const originalText = btn.innerHTML;
        btn.innerHTML = `<span>Copied to Clipboard!</span>`;
        btn.classList.add('copied');
        
        setTimeout(() => {
          btn.innerHTML = originalText;
          btn.classList.remove('copied');
        }, 2000);
      });
    }

    // Initialize display on load
    window.onload = updatePrompt;
  </script>
</body>
</html>
