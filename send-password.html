<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Send Password | access Genie</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Source+Code+Pro:wght@400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-gradient-start: #020617;
      --bg-gradient-end: #0f172a;
      --card-bg: rgba(30, 41, 59, 0.4);
      --card-border: rgba(255, 255, 255, 0.08);
      --text-primary: #f8fafc;
      --text-secondary: #94a3b8;
      --accent-primary: #22d3ee;
      --accent-hover: #67e8f9;
      --accent-success: #10b981;
      --code-bg: rgba(0, 0, 0, 0.3);
      --shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.5);
      --input-bg: rgba(15, 23, 42, 0.6);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background: fixed linear-gradient(135deg, var(--bg-gradient-start), var(--bg-gradient-end));
      color: var(--text-primary);
      line-height: 1.6;
      padding: 60px 20px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .container {
      max-width: 750px;
      width: 100%;
      margin: 0 auto;
    }

    header {
      text-align: center;
      margin-bottom: 50px;
    }

    h1 {
      font-size: 2.2rem;
      font-weight: 800;
      letter-spacing: -0.02em;
      color: #fff;
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    .workflow {
      display: flex;
      flex-direction: column;
      gap: 30px;
    }

    .step-card {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 24px;
      padding: 40px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(12px);
    }

    .label-group {
      margin-bottom: 20px;
    }

    .step-label {
      font-weight: 800;
      font-size: 0.75rem;
      background: var(--accent-primary);
      color: #020617;
      padding: 4px 12px;
      border-radius: 4px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      display: inline-block;
      margin-bottom: 10px;
    }

    .field-title {
      display: block;
      font-size: 0.9rem;
      font-weight: 600;
      color: var(--text-secondary);
      margin-bottom: 8px;
      text-transform: uppercase;
    }

    textarea {
      width: 100%;
      min-height: 60px;
      background: var(--input-bg);
      border: 1px solid var(--card-border);
      border-radius: 12px;
      padding: 15px;
      color: var(--text-primary);
      font-family: 'Inter', sans-serif;
      font-size: 1rem;
      resize: vertical;
      outline: none;
      transition: all 0.3s;
      margin-bottom: 15px;
    }

    textarea:last-child {
      margin-bottom: 0;
    }

    textarea:focus {
      border-color: var(--accent-primary);
      background: rgba(15, 23, 42, 0.8);
    }

    .prompt-output-card {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 24px;
      padding: 40px;
      margin-top: 10px;
    }

    .prompt-content {
      background: var(--code-bg);
      padding: 30px;
      border-radius: 12px;
      font-family: 'Inter', sans-serif;
      font-size: 1.05rem;
      color: #cbd5e1;
      white-space: pre-wrap;
      border: 1px solid rgba(255,255,255,0.05);
      margin-bottom: 25px;
      line-height: 1.6;
    }

    .copy-btn {
      background: rgba(34, 211, 238, 0.1);
      color: var(--accent-primary);
      border: 1px solid var(--accent-primary);
      padding: 14px 32px;
      border-radius: 12px;
      font-weight: 700;
      font-size: 1.1rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      transition: all 0.2s;
      width: 100%;
    }

    .copy-btn:hover {
      background: var(--accent-primary);
      color: #020617;
    }

    .copy-btn.copied {
      background: var(--accent-success);
      border-color: var(--accent-success);
      color: white;
    }

    .footer {
      margin-top: 80px;
      text-align: center;
      color: var(--text-secondary);
      font-size: 0.85rem;
      border-top: 1px solid var(--card-border);
      padding-top: 40px;
      width: 100%;
    }

    @media (max-width: 600px) {
      h1 { font-size: 1.8rem; }
      .step-card, .prompt-output-card { padding: 25px; }
      .prompt-content { font-size: 0.95rem; }
    }
  </style>
</head>
<body>

  <div class="container">
    <header>
      <h1>Send Password</h1>
    </header>

    <div class="workflow">
      
      <!-- Input Section -->
      <div class="step-card">
        <div class="label-group">
          <span class="step-label">Access Details</span>
        </div>
        
        <label class="field-title">[Content Title]</label>
        <textarea id="titleInput" placeholder="Enter content name..." oninput="updatePrompt()"></textarea>

        <label class="field-title">[URL]</label>
        <textarea id="urlInput" placeholder="Enter target URL..." oninput="updatePrompt()"></textarea>

        <label class="field-title">[Password]</label>
        <textarea id="passInput" placeholder="Enter password..." oninput="updatePrompt()"></textarea>
      </div>

      <!-- Output Section -->
      <div class="prompt-output-card">
        <div class="label-group">
          <span class="step-label">Final Message</span>
        </div>
        <div class="prompt-content" id="finalPrompt"></div>
        <button class="copy-btn" onclick="copyText('finalPrompt', this)">
          <span>Copy Message</span>
        </button>
      </div>

    </div>

    <footer class="footer">
      <p>Copyright &copy; <script>document.write(new Date().getFullYear())</script> Siva Prasad Mukherjee. All Rights Reserved.</p>
    </footer>
  </div>

  <script>
    const baseTemplate = `Hello!

Your access to **[Content Title]** is ready.

🔗 **Link:** [URL]
🔑 **Password:** [Password]

Please keep this password confidential and do not share it with others.

If you experience any issues, simply reply to this message.

Thank you.

— Siva`;

    function updatePrompt() {
      const title = document.getElementById('titleInput').value.trim() || "[Content Title]";
      const url = document.getElementById('urlInput').value.trim() || "[URL]";
      const pass = document.getElementById('passInput').value.trim() || "[Password]";
      
      let updated = baseTemplate.replace("[Content Title]", title);
      updated = updated.replace("[URL]", url);
      updated = updated.replace("[Password]", pass);

      document.getElementById('finalPrompt').innerText = updated;
    }

    function copyText(id, btn) {
      const text = document.getElementById(id).innerText;
      navigator.clipboard.writeText(text).then(() => {
        const originalText = btn.innerHTML;
        btn.innerHTML = `<span>Copied to Clipboard!</span>`;
        btn.classList.add('copied');
        
        setTimeout(() => {
          btn.innerHTML = originalText;
          btn.classList.remove('copied');
        }, 2000);
      });
    }

    // Initialize display on page load
    updatePrompt();
  </script>
</body>
</html>
