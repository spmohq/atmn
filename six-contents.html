<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>6 Specific Content Ideas - Generator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Source+Code+Pro:wght@400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-gradient-start: #020617;
      --bg-gradient-end: #0f172a;
      --card-bg: rgba(30, 41, 59, 0.4);
      --card-border: rgba(255, 255, 255, 0.08);
      --text-primary: #f8fafc;
      --text-secondary: #94a3b8;
      --accent-primary: #22d3ee;
      --accent-hover: #67e8f9;
      --accent-success: #10b981;
      --code-bg: rgba(0, 0, 0, 0.3);
      --shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.5);
      --input-bg: rgba(15, 23, 42, 0.6);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background: fixed linear-gradient(135deg, var(--bg-gradient-start), var(--bg-gradient-end));
      color: var(--text-primary);
      line-height: 1.6;
      padding: 60px 20px;
      min-height: 100vh;
    }

    .container {
      max-width: 1100px;
      margin: 0 auto;
    }

    header {
      text-align: center;
      margin-bottom: 40px;
    }

    h1 {
      font-size: 2.5rem;
      font-weight: 800;
      letter-spacing: -0.02em;
      color: #fff;
      margin-bottom: 10px;
      text-transform: uppercase;
    }

    .sub-header {
      color: var(--accent-primary);
      font-size: 1.1rem;
      font-weight: 600;
      letter-spacing: 0.05em;
    }

    .input-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 20px;
      margin-bottom: 40px;
    }

    .input-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    label {
      font-size: 0.75rem;
      font-weight: 800;
      text-transform: uppercase;
      color: var(--accent-primary);
      letter-spacing: 0.08em;
    }

    textarea {
      background: var(--input-bg);
      border: 1px solid var(--card-border);
      border-radius: 12px;
      padding: 12px;
      color: #fff;
      font-family: 'Inter', sans-serif;
      font-size: 0.9rem;
      resize: vertical;
      min-height: 100px;
      transition: all 0.3s;
      outline: none;
    }

    textarea:focus {
      border-color: var(--accent-primary);
      box-shadow: 0 0 0 2px rgba(34, 211, 238, 0.1);
    }

    .prompt-workflow {
      display: flex;
      flex-direction: column;
      gap: 30px;
    }

    .step-card {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 20px;
      padding: 30px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(12px);
    }

    .step-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }

    .step-label {
      font-weight: 800;
      font-size: 0.85rem;
      background: var(--accent-primary);
      color: #020617;
      padding: 4px 14px;
      border-radius: 6px;
      text-transform: uppercase;
    }

    .prompt-content {
      background: var(--code-bg);
      padding: 25px;
      border-radius: 12px;
      font-family: 'Source Code Pro', monospace;
      font-size: 0.95rem;
      color: #cbd5e1;
      white-space: pre-wrap;
      border: 1px solid rgba(255,255,255,0.05);
      margin-bottom: 20px;
      line-height: 1.5;
      max-height: 800px;
      overflow-y: auto;
    }

    .copy-btn {
      background: rgba(34, 211, 238, 0.1);
      color: var(--accent-primary);
      border: 1px solid var(--accent-primary);
      padding: 12px 28px;
      border-radius: 8px;
      font-weight: 700;
      font-size: 1rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      transition: all 0.2s;
      width: 100%;
    }

    .copy-btn:hover {
      background: var(--accent-primary);
      color: #020617;
    }

    .copy-btn.copied {
      background: var(--accent-success);
      border-color: var(--accent-success);
      color: white;
    }

    .footer {
      margin-top: 80px;
      text-align: center;
      color: var(--text-secondary);
      font-size: 0.85rem;
      border-top: 1px solid var(--card-border);
      padding-top: 40px;
    }

    @media (max-width: 850px) {
      .input-grid { grid-template-columns: 1fr; }
      h1 { font-size: 1.8rem; }
    }
  </style>
</head>
<body>

  <div class="container">
    <header>
      <h1>6 Specific Content Ideas</h1>
      <p class="sub-header">Ecosystem Anchor Strategy Generator</p>
    </header>

    <div class="input-grid">
      <div class="input-group">
        <label>Insert Platform</label>
        <textarea id="val1" oninput="updatePrompts()" placeholder="e.g., X, Newsletter, Solo Podcast..."></textarea>
      </div>
      <div class="input-group">
        <label>Insert Content Idea</label>
        <textarea id="val2" oninput="updatePrompts()" placeholder="Paste the central anchor idea here..."></textarea>
      </div>
    </div>

    <div class="prompt-workflow">
      <div class="step-card">
        <div class="step-header">
          <span class="step-label">Intellectual Ecosystem Prompt</span>
        </div>
        <div class="prompt-content" id="p1_out"></div>
        <button class="copy-btn" onclick="copyText('p1_out', this)">
          <span>Copy Prompt to Clipboard</span>
        </button>
      </div>
    </div>

    <footer class="footer">
      <p>Copyright &copy; <script>document.write(new Date().getFullYear())</script> Siva Prasad Mukherjee. All Rights Reserved.</p>
    </footer>
  </div>

  <script>
    function updatePrompts() {
      const platform = document.getElementById('val1').value || "[INSERT PLATFORM]";
      const contentIdea = document.getElementById('val2').value || "[INSERT CONTENT IDEA]";

      const prompt = `Act as a world-class intellectual strategist, ecosystem designer, writer, educator, and audience-development expert.

You previously created an Intellectual Ecosystem around an idea.

I will now provide:

Selected Platform:
${platform}

Selected Content Idea:
${contentIdea}

Your task is to use the Selected Content Idea as the central anchor of the ecosystem.

The goal is NOT to generate multiple content ideas.

The goal is to generate exactly ONE corresponding content idea for each platform that supports, expands, reinforces, or deepens the Selected Content Idea according to the natural role of that platform.

---

STEP 1 — ANALYZE THE SELECTED CONTENT IDEA

Identify:

* Core Belief
* Core Thesis
* Core Message
* Core Question
* Core Tension
* Core Insight

Explain the deeper intellectual principle behind the content idea.

Do not merely summarize it.

---

STEP 2 — DEFINE THE ROLE OF THE SELECTED CONTENT

Explain:

* Why this content belongs on the Selected Platform
* What job it performs inside the ecosystem
* What audience need it satisfies
* What stage of audience development it serves

---

STEP 3 — BUILD THE SUPPORTING ECOSYSTEM

Create exactly ONE content idea for each of the following platforms:

* X (Twitter/X)
* Newsletter
* Blog
* Solo Podcast
* Community
* Book

INCLUDING the Selected Platform.

For each platform provide:

### Platform

Platform Role:
(Explain the platform's strategic role in the ecosystem.)

How This Content Supports the Selected Content:
(Explain the relationship.)

Content Angle:
(The specific perspective.)

Content Framework:
(The structure best suited to that platform.)

Content Title

Content Outline

IMPORTANT:

The content idea must be unique to that platform.

Do not simply reword the Selected Content Idea.

Instead, adapt it to the platform's natural role.

Examples:

* X should create curiosity, discovery, or intellectual tension.
* Newsletter should deepen understanding and interpretation.
* Blog should provide structured analysis and explanation.
* Solo Podcast should explore the idea through stories, examples, and reflection.
* Community should encourage discussion, participation, and application.
* Book should synthesize the idea into a broader worldview or enduring framework.

Every platform must communicate the same underlying truth while serving a different purpose.

---

STEP 4 — INTELLECTUAL ECOSYSTEM FLOW

Show how a person would naturally move through the ecosystem.

Example:

Discovery
↓
Interest
↓
Understanding
↓
Exploration
↓
Participation
↓
Integration
↓
Legacy

Explain what happens at each stage.

---

STEP 5 — FINAL SYNTHESIS

Answer:

"What is the single unifying idea connecting all these content pieces?"

Explain how every platform expresses the same underlying truth in a different form without changing the message.

MANDATORY RULES

* Generate exactly ONE content idea per platform.
* Every content idea must support the Selected Content Idea.
* Every platform must perform its proper role in the intellectual ecosystem.
* Think like a public intellectual, educator, philosopher, and strategist.
* Avoid generic marketing advice.
* Focus on ideas, wisdom, learning, meaning, society, culture, human behavior, and intellectual influence.

FINAL TABLE

At the end create a table with the following columns:

| Platform | Primary Goal | Content Style | Audience Experience | Content Framework | Content Title | Content Outline |

Include one row for each platform and ensure every row reflects the platform's unique role while supporting the Selected Content Idea.`;

      document.getElementById('p1_out').innerText = prompt;
    }

    function copyText(id, btn) {
      const text = document.getElementById(id).innerText;
      navigator.clipboard.writeText(text).then(() => {
        const originalText = btn.innerHTML;
        btn.innerHTML = `<span>Copied to Clipboard!</span>`;
        btn.classList.add('copied');
        
        setTimeout(() => {
          btn.innerHTML = originalText;
          btn.classList.remove('copied');
        }, 2000);
      });
    }

    // Initial setup
    updatePrompts();
  </script>
</body>
</html>
