<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Solo Podcast Video Script Generator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Source+Code+Pro:wght@400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-gradient-start: #020617;
      --bg-gradient-end: #0f172a;
      --card-bg: rgba(30, 41, 59, 0.4);
      --card-border: rgba(255, 255, 255, 0.08);
      --text-primary: #f8fafc;
      --text-secondary: #94a3b8;
      --accent-primary: #22d3ee;
      --accent-hover: #67e8f9;
      --accent-success: #10b981;
      --code-bg: rgba(0, 0, 0, 0.3);
      --shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.5);
      --input-bg: rgba(15, 23, 42, 0.6);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background: fixed linear-gradient(135deg, var(--bg-gradient-start), var(--bg-gradient-end));
      color: var(--text-primary);
      line-height: 1.6;
      padding: 60px 20px;
      min-height: 100vh;
    }

    .container {
      max-width: 1100px;
      margin: 0 auto;
    }

    header {
      text-align: center;
      margin-bottom: 40px;
    }

    h1 {
      font-size: 2.5rem;
      font-weight: 800;
      letter-spacing: -0.02em;
      color: #fff;
      margin-bottom: 10px;
      text-transform: uppercase;
    }

    .sub-header {
      color: var(--accent-primary);
      font-size: 1.1rem;
      font-weight: 600;
      letter-spacing: 0.05em;
    }

    .input-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 20px;
      margin-bottom: 40px;
    }

    .input-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    label {
      font-size: 0.75rem;
      font-weight: 800;
      text-transform: uppercase;
      color: var(--accent-primary);
      letter-spacing: 0.08em;
    }

    textarea {
      background: var(--input-bg);
      border: 1px solid var(--card-border);
      border-radius: 12px;
      padding: 15px;
      color: #fff;
      font-family: 'Inter', sans-serif;
      font-size: 0.95rem;
      resize: vertical;
      min-height: 150px;
      transition: all 0.3s;
      outline: none;
    }

    textarea:focus {
      border-color: var(--accent-primary);
      box-shadow: 0 0 0 2px rgba(34, 211, 238, 0.1);
    }

    .prompt-workflow {
      display: flex;
      flex-direction: column;
      gap: 30px;
    }

    .step-card {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 20px;
      padding: 30px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(12px);
    }

    .step-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }

    .step-label {
      font-weight: 800;
      font-size: 0.85rem;
      background: var(--accent-primary);
      color: #020617;
      padding: 4px 14px;
      border-radius: 6px;
      text-transform: uppercase;
    }

    .prompt-content {
      background: var(--code-bg);
      padding: 25px;
      border-radius: 12px;
      font-family: 'Source Code Pro', monospace;
      font-size: 0.95rem;
      color: #cbd5e1;
      white-space: pre-wrap;
      border: 1px solid rgba(255,255,255,0.05);
      margin-bottom: 20px;
      line-height: 1.5;
      max-height: 600px;
      overflow-y: auto;
    }

    .copy-btn {
      background: rgba(34, 211, 238, 0.1);
      color: var(--accent-primary);
      border: 1px solid var(--accent-primary);
      padding: 12px 28px;
      border-radius: 8px;
      font-weight: 700;
      font-size: 1rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      transition: all 0.2s;
      width: 100%;
    }

    .copy-btn:hover {
      background: var(--accent-primary);
      color: #020617;
    }

    .copy-btn.copied {
      background: var(--accent-success);
      border-color: var(--accent-success);
      color: white;
    }

    .footer {
      margin-top: 80px;
      text-align: center;
      color: var(--text-secondary);
      font-size: 0.85rem;
      border-top: 1px solid var(--card-border);
      padding-top: 40px;
    }

    @media (max-width: 850px) {
      h1 { font-size: 1.8rem; }
    }
  </style>
</head>
<body>

  <div class="container">
    <header>
      <h1>SOLO PODCAST VIDEO SCRIPT GENERATOR</h1>
      <p class="sub-header">AI AVATAR HOST ENGINE</p>
    </header>

    <div class="input-grid">
      <div class="input-group">
        <label>Paste Source Text Here</label>
        <textarea id="sourceText" oninput="updatePrompts()" placeholder="Enter the content you want to transform into a script..."></textarea>
      </div>
    </div>

    <div class="prompt-workflow">
      <!-- Main Script Prompt -->
      <div class="step-card">
        <div class="step-header">
          <span class="step-label">Solo Podcast Script Prompt</span>
        </div>
        <div class="prompt-content" id="p1_out"></div>
        <button class="copy-btn" onclick="copyText('p1_out', this)">
          <span>Copy Prompt</span>
        </button>
      </div>
    </div>

    <footer class="footer">
      <p>Copyright &copy; <script>document.write(new Date().getFullYear())</script> Siva Prasad Mukherjee. All Rights Reserved.</p>
    </footer>
  </div>

  <script>
    function updatePrompts() {
      const sourceText = document.getElementById('sourceText').value || "[PASTE SOURCE TEXT HERE]";

      const prompt = `Act as an elite podcast writer, narrative strategist, long-form content editor, and audience engagement expert.

Your task is to transform the provided source material into a compelling solo podcast video script presented by an AI avatar.

Host Identity

The podcast host is an AI avatar representing Siva Prasad Mukherjee.

The script MUST begin with the following introduction exactly as written:

"Welcome to the show. I'm the AI avatar of Siva Prasad Mukherjee. I bring you Siva's reflections, observations, and analyses on topics that matter. While I'm an AI-generated presenter, the ideas and viewpoints discussed here are his."

SOURCE MATERIAL

==================================================
${sourceText}
==================================================

Objective

Transform the source material into a natural, engaging, thought-provoking solo podcast episode.

The podcast should sound as if the AI avatar is speaking directly to the audience while presenting Siva Prasad Mukherjee's observations, reflections, reasoning, and conclusions.

Writing Requirements

- Write entirely in spoken-language format.
- Do not write like an article, essay, report, blog post, or academic paper.
- Make the script sound natural when read aloud.
- Maintain a conversational but intellectually thoughtful tone.
- Preserve the original meaning, reasoning, observations, and insights from the source material.
- Expand, connect, clarify, and organize ideas where necessary to improve flow and listener engagement.
- Remove repetition, fluff, and unnecessary complexity.
- Use smooth transitions between ideas.
- Build curiosity and maintain audience attention throughout the episode.
- Explain concepts clearly without oversimplifying them.
- Ensure the script feels like a coherent podcast episode rather than a collection of disconnected points.
- Keep the language clear, concise, and listener-friendly.
- Prioritize clarity, insight, and depth over sensationalism.

Structure

Opening

- Begin with the required host introduction exactly as provided.
- Immediately follow with a compelling hook that introduces the central idea and creates curiosity.

Main Discussion

- Present the key observations, ideas, arguments, and insights from the source material.
- Develop the reasoning step by step.
- Explain cause-and-effect relationships where relevant.
- Use examples, analogies, and clarifications when helpful.
- Maintain a logical flow from one idea to the next.
- Create a sense of intellectual discovery throughout the discussion.

Reflection

- Summarize the most important observations and implications.
- Highlight the deeper meaning or broader significance of the ideas discussed.

Closing

- End with a thoughtful concluding reflection.
- Leave the audience with a meaningful idea, question, or perspective to consider after the episode ends.

Important Constraints

- Do NOT include section headings.
- Do NOT include stage directions.
- Do NOT include camera instructions.
- Do NOT include visual descriptions.
- Do NOT include editing notes.
- Do NOT include production notes.
- Do NOT include music cues.
- Do NOT mention the prompt, source material, or writing process.
- Do NOT break character.
- The AI avatar should remain the sole speaker throughout the script.

Output Requirement

Output only the final podcast script, ready for narration by the AI avatar.`;

      document.getElementById('p1_out').innerText = prompt;
    }

    function copyText(id, btn) {
      const text = document.getElementById(id).innerText;
      navigator.clipboard.writeText(text).then(() => {
        const originalText = btn.innerHTML;
        btn.innerHTML = `<span>Copied to Clipboard!</span>`;
        btn.classList.add('copied');
        
        setTimeout(() => {
          btn.innerHTML = originalText;
          btn.classList.remove('copied');
        }, 2000);
      });
    }

    // Initial setup
    updatePrompts();
  </script>
</body>
</html>
