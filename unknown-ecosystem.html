<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Personal Reflection & Belief Clarification</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Source+Code+Pro:wght@400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-gradient-start: #020617;
      --bg-gradient-end: #0f172a;
      --card-bg: rgba(30, 41, 59, 0.4);
      --card-border: rgba(255, 255, 255, 0.08);
      --text-primary: #f8fafc;
      --text-secondary: #94a3b8;
      --accent-primary: #22d3ee;
      --accent-hover: #67e8f9;
      --accent-success: #10b981;
      --code-bg: rgba(0, 0, 0, 0.3);
      --shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.5);
      --input-bg: rgba(15, 23, 42, 0.6);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background: fixed linear-gradient(135deg, var(--bg-gradient-start), var(--bg-gradient-end));
      color: var(--text-primary);
      line-height: 1.6;
      padding: 60px 20px;
      min-height: 100vh;
    }

    .container {
      max-width: 1100px;
      margin: 0 auto;
    }

    header {
      text-align: center;
      margin-bottom: 40px;
    }

    h1 {
      font-size: 2.2rem;
      font-weight: 800;
      letter-spacing: -0.02em;
      color: #fff;
      margin-bottom: 15px;
      text-transform: uppercase;
    }

    .sub-header {
      color: var(--accent-primary);
      font-size: 1rem;
      font-weight: 600;
      max-width: 900px;
      margin: 0 auto;
      line-height: 1.5;
      opacity: 0.9;
    }

    .input-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 20px;
      margin: 40px 0;
    }

    .input-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    label {
      font-size: 0.75rem;
      font-weight: 800;
      text-transform: uppercase;
      color: var(--accent-primary);
      letter-spacing: 0.08em;
    }

    textarea {
      background: var(--input-bg);
      border: 1px solid var(--card-border);
      border-radius: 12px;
      padding: 15px;
      color: #fff;
      font-family: 'Inter', sans-serif;
      font-size: 0.95rem;
      resize: vertical;
      min-height: 180px;
      transition: all 0.3s;
      outline: none;
    }

    textarea:focus {
      border-color: var(--accent-primary);
      box-shadow: 0 0 0 2px rgba(34, 211, 238, 0.1);
    }

    .prompt-workflow {
      display: flex;
      flex-direction: column;
      gap: 30px;
    }

    .step-card {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 20px;
      padding: 30px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(12px);
    }

    .step-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }

    .step-label {
      font-weight: 800;
      font-size: 0.85rem;
      background: var(--accent-primary);
      color: #020617;
      padding: 4px 14px;
      border-radius: 6px;
      text-transform: uppercase;
    }

    .prompt-content {
      background: var(--code-bg);
      padding: 25px;
      border-radius: 12px;
      font-family: 'Source Code Pro', monospace;
      font-size: 0.95rem;
      color: #cbd5e1;
      white-space: pre-wrap;
      border: 1px solid rgba(255,255,255,0.05);
      margin-bottom: 20px;
      line-height: 1.5;
      max-height: 600px;
      overflow-y: auto;
    }

    .copy-btn {
      background: rgba(34, 211, 238, 0.1);
      color: var(--accent-primary);
      border: 1px solid var(--accent-primary);
      padding: 12px 28px;
      border-radius: 8px;
      font-weight: 700;
      font-size: 1rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      transition: all 0.2s;
      width: 100%;
    }

    .copy-btn:hover {
      background: var(--accent-primary);
      color: #020617;
    }

    .copy-btn.copied {
      background: var(--accent-success);
      border-color: var(--accent-success);
      color: white;
    }

    .footer {
      margin-top: 80px;
      text-align: center;
      color: var(--text-secondary);
      font-size: 0.85rem;
      border-top: 1px solid var(--card-border);
      padding-top: 40px;
    }

    @media (max-width: 850px) {
      h1 { font-size: 1.6rem; }
      .sub-header { font-size: 0.9rem; }
    }
  </style>
</head>
<body>

  <div class="container">
    <header>
      <h1>Personal Reflection & Belief Clarification</h1>
      <p class="sub-header">Helps transform borrowed ideas into personally examined beliefs by separating agreement, disagreement, uncertainty, and lived experience.</p>
    </header>

    <div class="input-grid">
      <div class="input-group">
        <label>Paste Core Belief(s) Here</label>
        <textarea id="val1" oninput="updatePrompts()" placeholder="Enter the extracted Core Beliefs, Core Theses, or Core Messages..."></textarea>
      </div>
    </div>

    <div class="prompt-workflow">
      <div class="step-card">
        <div class="step-header">
          <span class="step-label">Reflection & Clarification Prompt</span>
        </div>
        <div class="prompt-content" id="p1_out"></div>
        <button class="copy-btn" onclick="copyText('p1_out', this)">
          <span>Copy Prompt</span>
        </button>
      </div>
    </div>

    <footer class="footer">
      <p>Copyright &copy; <script>document.write(new Date().getFullYear())</script> Siva Prasad Mukherjee. All Rights Reserved.</p>
    </footer>
  </div>

  <script>
    function updatePrompts() {
      const beliefs = document.getElementById('val1').value || "[PASTE CORE BELIEF(S) HERE]";

      const prompt = `Act as a world-class philosopher, mentor, and intellectual coach.

I will provide one or more Core Beliefs, Core Theses, or Core Messages extracted from authors or texts.

Your task is NOT to tell me whether they are correct.

Instead, help me determine my own position.

INPUT:

${beliefs}

ANALYSIS FRAMEWORK

1. What is the strongest argument in favor of this belief?

2. What is the strongest argument against this belief?

3. What evidence would support this belief?

4. What evidence would challenge this belief?

5. What real-life experiences might make someone adopt this belief?

6. What real-life experiences might make someone reject this belief?

7. What questions should I ask myself before accepting this belief?

8. Which parts seem convincing?

9. Which parts remain doubtful?

10. What assumptions am I personally making?

11. Where might my biases influence my judgment?

12. What position could a thoughtful person hold if they only partially agreed?

13. What would intellectual humility look like regarding this belief?

14. Based on this reflection:
    - What do I currently believe?
    - What am I uncertain about?
    - What do I need to learn or observe next?

IMPORTANT:
- Do not pressure me toward any conclusion.
- Help me think, not agree.
- Encourage intellectual honesty.`;

      document.getElementById('p1_out').innerText = prompt;
    }

    function copyText(id, btn) {
      const text = document.getElementById(id).innerText;
      navigator.clipboard.writeText(text).then(() => {
        const originalText = btn.innerHTML;
        btn.innerHTML = `<span>Copied to Clipboard!</span>`;
        btn.classList.add('copied');
        
        setTimeout(() => {
          btn.innerHTML = originalText;
          btn.classList.remove('copied');
        }, 2000);
      });
    }

    // Initial setup
    updatePrompts();
  </script>
</body>
</html>
