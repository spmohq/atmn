<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>YouTube Assets Genie</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Source+Code+Pro:wght@400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-gradient-start: #020617;
      --bg-gradient-end: #0f172a;
      --card-bg: rgba(30, 41, 59, 0.4);
      --card-border: rgba(255, 255, 255, 0.08);
      --text-primary: #f8fafc;
      --text-secondary: #94a3b8;
      --accent-primary: #22d3ee;
      --accent-hover: #67e8f9;
      --accent-success: #10b981;
      --code-bg: rgba(0, 0, 0, 0.3);
      --shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.5);
      --input-bg: rgba(15, 23, 42, 0.6);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background: fixed linear-gradient(135deg, var(--bg-gradient-start), var(--bg-gradient-end));
      color: var(--text-primary);
      line-height: 1.6;
      padding: 60px 20px;
      min-height: 100vh;
    }

    .container {
      max-width: 1100px;
      margin: 0 auto;
    }

    header {
      text-align: center;
      margin-bottom: 40px;
    }

    h1 {
      font-size: 2.5rem;
      font-weight: 800;
      letter-spacing: -0.02em;
      color: #fff;
      margin-bottom: 10px;
      text-transform: uppercase;
    }

    .sub-header {
      color: var(--accent-primary);
      font-size: 1.1rem;
      font-weight: 600;
      letter-spacing: 0.05em;
    }

    .input-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 20px;
      margin-bottom: 40px;
    }

    .input-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    label {
      font-size: 0.75rem;
      font-weight: 800;
      text-transform: uppercase;
      color: var(--accent-primary);
      letter-spacing: 0.08em;
    }

    textarea {
      background: var(--input-bg);
      border: 1px solid var(--card-border);
      border-radius: 12px;
      padding: 15px;
      color: #fff;
      font-family: 'Inter', sans-serif;
      font-size: 0.95rem;
      resize: vertical;
      min-height: 200px;
      transition: all 0.3s;
      outline: none;
    }

    textarea:focus {
      border-color: var(--accent-primary);
      box-shadow: 0 0 0 2px rgba(34, 211, 238, 0.1);
    }

    .prompt-workflow {
      display: flex;
      flex-direction: column;
      gap: 30px;
    }

    .step-card {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 20px;
      padding: 30px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(12px);
    }

    .step-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }

    .step-label {
      font-weight: 800;
      font-size: 0.85rem;
      background: var(--accent-primary);
      color: #020617;
      padding: 4px 14px;
      border-radius: 6px;
      text-transform: uppercase;
    }

    .prompt-content {
      background: var(--code-bg);
      padding: 25px;
      border-radius: 12px;
      font-family: 'Source Code Pro', monospace;
      font-size: 0.95rem;
      color: #cbd5e1;
      white-space: pre-wrap;
      border: 1px solid rgba(255,255,255,0.05);
      margin-bottom: 20px;
      line-height: 1.5;
      max-height: 600px;
      overflow-y: auto;
    }

    .copy-btn {
      background: rgba(34, 211, 238, 0.1);
      color: var(--accent-primary);
      border: 1px solid var(--accent-primary);
      padding: 12px 28px;
      border-radius: 8px;
      font-weight: 700;
      font-size: 1rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      transition: all 0.2s;
      width: 100%;
    }

    .copy-btn:hover {
      background: var(--accent-primary);
      color: #020617;
    }

    .copy-btn.copied {
      background: var(--accent-success);
      border-color: var(--accent-success);
      color: white;
    }

    .footer {
      margin-top: 80px;
      text-align: center;
      color: var(--text-secondary);
      font-size: 0.85rem;
      border-top: 1px solid var(--card-border);
      padding-top: 40px;
    }

    @media (max-width: 850px) {
      h1 { font-size: 1.8rem; }
    }
  </style>
</head>
<body>

  <div class="container">
    <header>
      <h1>YouTube Assets Genie</h1>
      <p class="sub-header">Strategy & Visual Packaging Engine</p>
    </header>

    <div class="input-grid">
      <div class="input-group">
        <label>Bengali Podcast Script</label>
        <textarea id="val1" oninput="updatePrompts()" placeholder="Paste your full Bengali script here..."></textarea>
      </div>
    </div>

    <div class="prompt-workflow">
      <!-- Prompt #1 -->
      <div class="step-card">
        <div class="step-header">
          <span class="step-label">Prompt #1: YouTube Positioning & Strategy</span>
        </div>
        <div class="prompt-content" id="p1_out"></div>
        <button class="copy-btn" onclick="copyText('p1_out', this)">
          <span>Copy Prompt #1</span>
        </button>
      </div>

      <!-- Prompt #2 -->
      <div class="step-card">
        <div class="step-header">
          <span class="step-label">Prompt #2: Visual Thumbnail Creator</span>
        </div>
        <div class="prompt-content" id="p2_out"></div>
        <button class="copy-btn" onclick="copyText('p2_out', this)">
          <span>Copy Prompt #2</span>
        </button>
      </div>
    </div>

    <footer class="footer">
      <p>Copyright &copy; <script>document.write(new Date().getFullYear())</script> Siva Prasad Mukherjee. All Rights Reserved.</p>
    </footer>
  </div>

  <script>
    function updatePrompts() {
      const script = document.getElementById('val1').value || "[BENGALI PODCAST_SCRIPT]";

      // Prompt 1
      const prompt1 = `Act as a YouTube Content Positioning Strategist, a YouTube Search & Audience Intelligence Specialist, and a Direct-Response Thumbnail Creative Director working as a single elite growth team. Your task is to analyze the following Bengali solo podcast script: 

${script}. 

Before generating any output, deeply study the script to identify its central thesis, strongest insights, emotional drivers, intellectual tensions, audience pain points, hidden assumptions, surprising observations, transformational takeaways, memorable phrases, controversial elements, and the most compelling reason someone would choose to watch the video. Think like a world-class YouTube strategist whose objective is maximizing click-through rate, viewer retention, audience satisfaction, relevance, credibility, discoverability, and long-term channel growth while remaining completely faithful to the actual content of the script. Do not summarize the script. Instead, extract the most powerful positioning, narrative angle, curiosity gap, emotional hook, and audience promise hidden within it. Generate 15 English YouTube title options specifically optimized for a Bengali-language audience and clearly indicate that the video is in Bengali when appropriate. Rank the titles from strongest to weakest based on expected performance potential. Each title must be unique, highly clickable, intellectually credible, emotionally engaging, curiosity-driven, and specifically tailored to the script rather than using generic YouTube formulas. After ranking the titles, select the single strongest title and explain in one concise paragraph why it is expected to outperform the others. Then create one fully optimized long-form YouTube description in English between 300 and 500 words that is designed to improve search visibility, attract the right viewers, communicate value clearly, encourage watch time, and drive engagement while naturally incorporating relevant keywords without keyword stuffing. The description must explicitly state that the episode is presented in Bengali and must include the following section exactly as shown, preserving the labels and inserting the provided links: "Stay Connected" followed by "📱 WhatsApp Channel: [WHATSAPP_CHANNEL_URL]", "📘 Facebook Page: [FACEBOOK_PAGE_URL]", and "📝 Blog: [BLOG_URL]". Then create one short-form YouTube description in English between 100 and 150 words optimized for concise presentation while maintaining strong audience appeal and including the same Stay Connected section. Next, generate 15 high-converting thumbnail concepts. For each concept, provide: the exact Bengali thumbnail text, visual composition, emotional trigger, curiosity gap, psychological mechanism, and a detailed explanation of why it would attract clicks from the target audience. The Bengali thumbnail text must be short, instantly readable on mobile devices, emotionally powerful, and designed to complement rather than repeat the title. After generating the thumbnail concepts, rank them from strongest to weakest based on expected click-through performance and identify the single best thumbnail recommendation. Then generate 20 additional standalone Bengali thumbnail text options that are concise, memorable, curiosity-inducing, and optimized for high click-through rates. Finally, generate a comprehensive set of YouTube SEO assets consisting of the most relevant hashtags, searchable keywords, video tags, topic clusters, and audience-interest signals derived directly from the script. Throughout the entire response, avoid clichés, generic creator advice, vague observations, recycled marketing language, clickbait deception, formulaic structures, shallow analysis, and interchangeable recommendations. Every recommendation must demonstrate nuanced judgment, strategic thinking, originality, audience awareness, and deep understanding of how Bengali-language educational, intellectual, self-improvement, business, technology, philosophy, and solo podcast content competes and succeeds on YouTube. Treat every output as if a single title, description, and thumbnail combination could determine whether the video reaches thousands of viewers or millions.`;

      // Prompt 2
      const prompt2 = `Act as a world-class YouTube Thumbnail Designer, Visual Persuasion Expert, and Click-Through-Rate Optimization Specialist. Using my uploaded photo and the previously selected thumbnail concept, create a high-converting YouTube thumbnail image.

Video Title:
[TITLE]

Selected Thumbnail Concept:
[PASTE THE CHOSEN THUMBNAIL CONCEPT]

Uploaded Image:
[MY PHOTO]

Additional Context:
[OPTIONAL NOTES]

Use my uploaded photo as the primary subject while preserving my identity, facial features, age, skin tone, and overall appearance. Design the thumbnail around the selected concept's psychological trigger, curiosity gap, and emotional promise. Create a premium, modern, high-authority YouTube thumbnail optimized for Bengali audiences and mobile viewing.

The design must use a 16:9 aspect ratio, strong visual hierarchy, bold Bengali typography, high contrast, emotional facial expression, cinematic lighting, professional color grading, clean composition, and a single unmistakable focal point. The thumbnail text must be large enough to remain readable on a smartphone and should complement the title rather than duplicate it. Avoid clutter, visual noise, stock-photo aesthetics, generic AI-art styles, tiny text, excessive effects, low contrast, weak expressions, and distracting background elements.

Generate the final image directly rather than explaining the design.`;

      document.getElementById('p1_out').innerText = prompt1;
      document.getElementById('p2_out').innerText = prompt2;
    }

    function copyText(id, btn) {
      const text = document.getElementById(id).innerText;
      navigator.clipboard.writeText(text).then(() => {
        const originalText = btn.innerHTML;
        btn.innerHTML = `<span>Copied to Clipboard!</span>`;
        btn.classList.add('copied');
        
        setTimeout(() => {
          btn.innerHTML = originalText;
          btn.classList.remove('copied');
        }, 2000);
      });
    }

    // Initial setup
    updatePrompts();
  </script>
</body>
</html>
